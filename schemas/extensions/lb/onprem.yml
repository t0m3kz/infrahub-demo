---
version: "1.0"

nodes:
  - name: Loadbalancer
    namespace: Onprem
    description: |
      On-premises load balancer (e.g., HAProxy, Nginx, F5)
      hosting multiple VIP services (listeners).
    label: "On-Prem Load Balancer"
    icon: carbon:floating-ip
    include_in_menu: false
    human_friendly_id:
      - name__value
    display_label: "{{ name__value }}"
    inherit_from:
      - ManagedLoadBalancer
      - ManagedGeneric
      - CoreArtifactTarget
    relationships:
      - name: deployment
        peer: TopologyDeployment
        cardinality: one
        kind: Attribute
        order_weight: 500
        optional: false
        on_delete: no-action
        description: "The deployment location for this load balancer"
      - name: frontend_servers
        peer: DcimDevice
        label: Frontend Servers
        cardinality: many
        kind: Component
        optional: true
        order_weight: 1000
        identifier: load_balancer__frontend_servers
        description: >
          "Cluster members (HA/VPX instances) hosting the LB software"
