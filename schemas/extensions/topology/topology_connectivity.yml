---
version: "1.0"

generics:
  - name: ConnectableLocation
    namespace: Topology
    description: "Topology location that can participate in circuit connectivity (physical or virtual)"
    label: "Connectable Location"
    include_in_menu: false
    human_friendly_id:
      - name__value
    attributes:
      - name: name
        kind: Text
        order_weight: 100

  - name: Connector
    namespace: Topology
    description: "Managed endpoint that terminates a circuit (physical or virtual)"
    label: "Circuit Connector"
    include_in_menu: false
    human_friendly_id:
      - name__value
    attributes:
      - name: name
        kind: Text
        order_weight: 50
      - name: description
        kind: Text
        order_weight: 100

  - name: Circuit
    namespace: Topology
    description: "Point-to-point connectivity between two topology locations"
    label: "Circuit"
    include_in_menu: false
    human_friendly_id:
      - name__value
    attributes:
      - name: name
        kind: Text
        order_weight: 100
      - name: description
        kind: Text
        optional: true
        order_weight: 200
      - name: bandwidth
        kind: Number
        label: "Bandwidth (Mbps)"
        optional: true
        order_weight: 400
        description: "Link bandwidth in megabits per second"
      - name: status
        kind: Dropdown
        order_weight: 500
        default_value: provisioning
        choices:
          - name: provisioning
            label: Provisioning
            color: "#ffff7f"
          - name: active
            label: Active
            color: "#7fbf7f"
          - name: maintenance
            label: Maintenance
            color: "#ffd27f"
          - name: down
            label: Down
            color: "#ff7f7f"
          - name: decommissioned
            label: Decommissioned
            color: "#bfbfbf"
    relationships:
      - name: provider
        peer: OrganizationProvider
        cardinality: one
        optional: false
        identifier: "circuit__provider"
        order_weight: 1000
        description: "Service provider for this connectivity"

      - name: locations
        label: "Endpoint Locations"
        peer: TopologyConnectableLocation
        cardinality: many
        max_count: 2
        optional: false
        identifier: "circuit__location"
        order_weight: 3000
        description: "Topology locations where this circuit terminates"

nodes:
  - name: PhysicalCircuit
    namespace: Topology
    description: "Physical connectivity circuit (dark fiber, cross connect, metro ethernet, etc.)"
    label: "Physical Circuit"
    icon: "mdi:transit-connection-variant"
    include_in_menu: false
    inherit_from:
      - TopologyCircuit
      - ManagedGeneric
      - GeneratorTarget
    human_friendly_id:
      - circuit_id__value
    display_label: "{{ circuit_id__value }} - {{ provider__name__value }}"
    uniqueness_constraints:
      - [circuit_id__value]
    attributes:
      - name: circuit_id
        kind: Text
        label: "Circuit ID"
        description: "Provider circuit identifier"
        order_weight: 50

      - name: circuit_type
        kind: Dropdown
        label: "Circuit Type"
        order_weight: 300
        choices:
          - name: dark_fiber
            label: "Dark Fiber"
            description: "Unlit fiber optic circuit"
            color: "#2c3e50"
          - name: cross_connect
            label: "Cross Connect"
            description: "Physical cross-connect within facility"
            color: "#3498db"
          - name: metro_ethernet
            label: "Metro Ethernet"
            description: "Layer 2 metro Ethernet service"
            color: "#9b59b6"
          - name: mpls
            label: "MPLS"
            description: "MPLS VPN circuit"
            color: "#e74c3c"
          - name: dia
            label: "DIA"
            description: "Dedicated Internet Access"
            color: "#f39c12"
          - name: wavelength
            label: "Wavelength"
            description: "DWDM wavelength service"
            color: "#1abc9c"

      - name: committed_rate
        kind: Number
        label: "CIR (Mbps)"
        optional: true
        order_weight: 410

      - name: install_date
        kind: Text
        optional: true
        order_weight: 600

      - name: contract_end_date
        kind: Text
        optional: true
        order_weight: 610

    relationships:
      - name: interfaces
        label: "Customer Interfaces"
        peer: DcimInterface
        cardinality: many
        optional: true
        identifier: "physical_circuit__interfaces"
        order_weight: 1100
        description: "Customer-side A and Z interfaces (each cabled to a provider port)"

      - name: provider_a
        label: "Provider A-Side Port"
        peer: DcimInterface
        cardinality: one
        optional: true
        identifier: "physical_circuit__provider_a"
        order_weight: 1150
        description: "Provider handoff port on A side (on a provider device)"

      - name: provider_z
        label: "Provider Z-Side Port"
        peer: DcimInterface
        cardinality: one
        optional: true
        identifier: "physical_circuit__provider_z"
        order_weight: 1250
        description: "Provider handoff port on Z side (on a provider device)"

  - name: VirtualCircuit
    namespace: Topology
    description: "Virtual/overlay connectivity (VPN, cloud interconnect, SD-WAN, etc.)"
    label: "Virtual Circuit"
    icon: "mdi:cloud-sync"
    include_in_menu: false
    inherit_from:
      - TopologyCircuit
      - ManagedGeneric
      - GeneratorTarget
    human_friendly_id:
      - name__value
    display_label: "{{ name__value }} ({{ link_type__value|upper }})"
    uniqueness_constraints:
      - [name__value]
    attributes:
      - name: link_type
        kind: Dropdown
        label: "Link Type"
        order_weight: 300
        choices:
          - name: vpn_ipsec
            label: "IPsec VPN"
            description: "IPsec encrypted VPN tunnel"
            color: "#e74c3c"
          - name: vpn_ssl
            label: "SSL VPN"
            description: "SSL/TLS VPN connection"
            color: "#c0392b"
          - name: gre
            label: "GRE Tunnel"
            description: "Generic Routing Encapsulation"
            color: "#95a5a6"
          - name: vxlan
            label: "VXLAN"
            description: "Virtual Extensible LAN"
            color: "#3498db"
          - name: geneve
            label: "GENEVE"
            description: "Generic Network Virtualization Encapsulation"
            color: "#2980b9"
          - name: mpls_l3vpn
            label: "MPLS L3VPN"
            description: "MPLS Layer 3 VPN"
            color: "#e67e22"
          - name: direct_connect_aws
            label: "AWS Direct Connect"
            description: "AWS Direct Connect"
            color: "#ff9900"
          - name: express_route_azure
            label: "Azure ExpressRoute"
            description: "Azure ExpressRoute"
            color: "#0078d4"
          - name: interconnect_gcp
            label: "GCP Cloud Interconnect"
            description: "Google Cloud Interconnect"
            color: "#4285f4"
          - name: fast_connect_oracle
            label: "Oracle FastConnect"
            description: "Oracle Cloud FastConnect"
            color: "#f80000"
          - name: sd_wan
            label: "SD-WAN"
            description: "Software-Defined WAN"
            color: "#9b59b6"
          - name: equinix_fabric
            label: "Equinix Fabric"
            description: "Equinix Fabric Virtual Connection"
            color: "#e30613"
          - name: megaport
            label: "Megaport"
            description: "Megaport Virtual Cross Connect"
            color: "#0066cc"
          - name: packetfabric
            label: "PacketFabric"
            description: "PacketFabric Virtual Circuit"
            color: "#00a0df"
          - name: console_connect
            label: "Console Connect"
            description: "PCCW Console Connect"
            color: "#ff6600"

      - name: encryption
        kind: Boolean
        label: "Encrypted"
        optional: true
        default_value: false
        order_weight: 410

      - name: vni
        kind: Number
        optional: true
        order_weight: 420
        description: "VXLAN Network Identifier (if applicable)"

      - name: tunnel_id
        kind: Number
        optional: true
        order_weight: 430
        description: "Tunnel ID (for GRE/IPSec, if applicable)"

      - name: cloud_resource_id
        kind: Text
        label: "Cloud Resource ID"
        optional: true
        order_weight: 600
        description: "Provider resource ID (e.g., dxcon-xxxxx for AWS)"

    relationships:
      - name: interfaces
        label: "Endpoint Interfaces"
        peer: DcimInterface
        cardinality: many
        optional: true
        identifier: "virtual_circuit__interfaces"
        order_weight: 1100
        description: "A-side and Z-side interfaces this circuit terminates on"

      - name: cloud_endpoints
        label: "Cloud Endpoints"
        peer: CloudResource
        cardinality: many
        max_count: 2
        optional: true
        identifier: "virtual_circuit__cloud_endpoints"
        order_weight: 1200
        description: "Cloud-side termination points (CloudDirectConnect, CloudVPNGateway, CloudTransitGateway, etc.)"

extensions:
  nodes:
    - kind: TopologyConnectableLocation
      relationships:
        - name: circuits
          label: "Circuits"
          peer: TopologyCircuit
          cardinality: many
          identifier: "circuit__location"
          order_weight: 5000
          description: "All circuits (physical and virtual) terminating at this location"

    - kind: CloudResource
      relationships:
        - name: virtual_circuits
          label: "Virtual Circuits"
          peer: TopologyVirtualCircuit
          cardinality: many
          optional: true
          identifier: "virtual_circuit__cloud_endpoints"
          order_weight: 5000
          description: "Virtual circuits where this cloud resource is an endpoint"
