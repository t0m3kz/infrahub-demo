---
version: "1.0"

# ============================================================================
# AppDependency — directional edge between two AppComponents
#
# Replaces the bare depends_on relationship (AppComponent → AppComponent) with
# a proper intermediary node so that port, port range, and protocol can be
# stored on the edge itself.
#
# When port_start / port_end / protocol are left unset the security-rules
# generator falls back to the built-in PORT_MAP heuristic (component type pair
# lookup). Explicit values always take priority over the heuristic.
# ============================================================================

nodes:
  - name: Dependency
    namespace: App
    description: "Directional dependency edge between two application components"
    label: "App Dependency"
    icon: "mdi:arrow-right-bold-circle-outline"
    include_in_menu: false
    human_friendly_id:
      - name__value
    order_by:
      - name__value
    display_label: "{{ name__value }}"
    uniqueness_constraints:
      - ["name__value"]
    attributes:
      - name: name
        kind: Text
        optional: false
        order_weight: 100
        description: "Unique name for this dependency edge (auto-set by loader)"
      - name: protocol
        kind: Dropdown
        optional: true
        order_weight: 300
        description: "IP protocol for this dependency (overrides PORT_MAP when set)"
        choices:
          - name: tcp
            label: "TCP"
            color: "#3498DB"
          - name: udp
            label: "UDP"
            color: "#E67E22"
          - name: icmp
            label: "ICMP"
            color: "#95A5A6"
          - name: any
            label: "Any"
            color: "#BDC3C7"
      - name: port_start
        kind: Number
        optional: true
        order_weight: 400
        description: "Destination port (or start of port range); overrides PORT_MAP"
      - name: port_end
        kind: Number
        optional: true
        order_weight: 500
        description: "End of destination port range (omit for single port)"
      - name: description
        kind: Text
        optional: true
        order_weight: 600
    relationships:
      - name: source
        peer: AppComponent
        label: "Source Component"
        description: "Component that initiates the connection"
        cardinality: one
        kind: Attribute
        optional: false
        identifier: "app_dependency__source"
        order_weight: 200
      - name: target
        peer: AppComponent
        label: "Target Component"
        description: "Component that receives the connection"
        cardinality: one
        kind: Attribute
        optional: false
        identifier: "app_dependency__target"
        order_weight: 210

extensions:
  nodes:
    - kind: AppComponent
      relationships:
        - name: depends_on
          peer: AppDependency
          cardinality: many
          kind: Attribute
          optional: true
          identifier: "app_component__depends_on"
          order_weight: 900
          label: "Depends On"
          description: "Outbound dependency edges originating from this component"
          direction: outbound
