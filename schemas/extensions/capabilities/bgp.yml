---
version: "1.0"

# ============================================================================
# Routing — BGP schema
# Autonomous Systems, BGP address families, BGP processes, peerings,
# external peers and BGP connectivity services.
# ============================================================================

nodes:
  - name: AutonomousSystem
    namespace: Routing
    description: "Autonomous System (AS) with routable IP prefixes."
    label: Autonomous System
    icon: mdi:bank-circle-outline
    include_in_menu: false
    menu_placement: RoutingBGPSession
    uniqueness_constraints:
      - ["name__value"]
    human_friendly_id:
      - "name__value"
    order_by:
      - asn__value
      - name__value
    display_label: "{{asn__value}} {{name__value}}"
    attributes:
      - name: name
        kind: Text
        computed_attribute:
          kind: Jinja2
          jinja2_template: "AS{{asn__value}}"
        read_only: true
        optional: false
      - name: asn
        kind: Number
        description: "Autonomous System Number"
      - name: description
        kind: Text
        optional: true
        description: "Description of the Autonomous System"
    relationships:
      - name: owner
        peer: OrganizationProvider
        optional: true
        cardinality: one
        kind: Attribute
      - name: location
        peer: LocationGeneric
        optional: true
        cardinality: one
        kind: Attribute

  - name: BGPAddressFamily
    namespace: Routing
    description: "BGP address family configuration (AFI/SAFI)"
    label: "BGP Address Family"
    icon: "mdi:family-tree"
    include_in_menu: false
    human_friendly_id:
      - "afi__value"
      - "safi__value"
    display_label: "{{ afi__value }} {{ safi__value }}"
    uniqueness_constraints:
      - [afi__value, safi__value]
    attributes:
      - name: afi
        kind: Dropdown
        label: "Address Family Identifier"
        description: "Address Family Identifier (AFI)"
        order_weight: 1000
        optional: false
        choices:
          - name: ipv4
            label: IPv4
            description: "IPv4 Address Family"
            color: "#3498db"
          - name: ipv6
            label: IPv6
            description: "IPv6 Address Family"
            color: "#2ecc71"
          - name: l2vpn
            label: L2VPN
            description: "Layer 2 VPN Address Family"
            color: "#e74c3c"
          - name: vpnv4
            label: VPNv4
            description: "VPN IPv4 Address Family"
            color: "#f39c12"
          - name: vpnv6
            label: VPNv6
            description: "VPN IPv6 Address Family"
            color: "#9b59b6"
      - name: safi
        kind: Dropdown
        label: "SAFI"
        description: "Subsequent Address Family Identifier (SAFI)"
        order_weight: 1100
        optional: false
        choices:
          - name: unicast
            label: Unicast
            description: "Unicast routing"
            color: "#3498db"
          - name: multicast
            label: Multicast
            description: "Multicast routing"
            color: "#2ecc71"
          - name: evpn
            label: EVPN
            description: "Ethernet VPN (RFC 7432)"
            color: "#e74c3c"
          - name: vpn
            label: VPN
            description: "MPLS VPN"
            color: "#f39c12"
          - name: flowspec
            label: Flowspec
            description: "Flow Specification"
            color: "#9b59b6"
          - name: labeled_unicast
            label: Labeled Unicast
            description: "Labeled Unicast (RFC 8277)"
            color: "#1abc9c"
      - name: advertise_all_vni
        kind: Boolean
        label: "Advertise All VNI"
        description: "Advertise all VNIs (EVPN specific)"
        optional: true
        default_value: false
        order_weight: 1200
      - name: advertise_default_gw
        kind: Boolean
        label: "Advertise Default Gateway"
        description: "Advertise default gateway (EVPN specific)"
        optional: true
        default_value: false
        order_weight: 1300
      - name: advertise_svi_ip
        kind: Boolean
        label: "Advertise SVI IP"
        description: "Advertise SVI IP addresses (EVPN specific)"
        optional: true
        default_value: false
        order_weight: 1400
      - name: description
        kind: Text
        label: "Description"
        description: "Address family description"
        optional: true
        order_weight: 1500

  - name: BGP
    namespace: Managed
    description: "BGP routing process configuration (device-level)"
    label: BGP Process
    icon: "carbon:network-4-reference"
    menu_placement: ManagedGeneric
    include_in_menu: false
    inherit_from:
      - ManagedGeneric
      - ManagedGenericDevice
      - ManagedRouting
    human_friendly_id:
      - "name__value"
    attributes:
      - name: multipath
        kind: Boolean
        description: "Whether BGP multipath is enabled"
        default_value: false
        optional: true
        order_weight: 1500
      - name: graceful_restart
        kind: Boolean
        description: "Whether graceful restart is enabled"
        default_value: true
        optional: true
        order_weight: 1600
      - name: confederation_identifier
        kind: Number
        description: "BGP confederation identifier (if using confederation)"
        optional: true
        order_weight: 1700
    relationships:
      - name: router_id
        peer: IpamIPAddress
        optional: false
        cardinality: one
        kind: Attribute
        order_weight: 1500
        identifier: bgp_router_id
        description: "Router ID for this BGP process (namespace derived from this IP)"
      - name: local_as
        peer: RoutingAutonomousSystem
        optional: false
        cardinality: one
        kind: Attribute
        order_weight: 1600
        identifier: bgp_local_as
        description: "Local autonomous system for this BGP process"

  # Note: Peer-specific configuration (remote AS, IPs, sessions) is in ManagedBGPPeering
  - name: BGPPeering
    namespace: Managed
    description: "BGP peering session — internal device-to-device or external to a provider"
    label: BGP Peering
    icon: "carbon:network-4-reference"
    include_in_menu: false
    human_friendly_id:
      - "name__value"
    inherit_from:
      - ManagedGeneric
      - ManagedPeering
    attributes:
      - name: session_type
        kind: Dropdown
        description: "Type of BGP session"
        choices:
          - name: "IBGP"
            label: "iBGP"
            description: "Internal BGP session within the same AS"
            color: "#74B9FF"
          - name: "EBGP"
            label: "eBGP"
            description: "External BGP session between different ASs"
            color: "#FD79A8"
          - name: "EBGP_MULTIHOP"
            label: "eBGP Multihop"
            description: "External BGP session over multiple hops"
            color: "#FDCB6E"
          - name: "EBGP_UNNUMBERED"
            label: "eBGP Unnumbered"
            description: "eBGP session using IPv6 link-local (RFC 5549)"
            color: "#A29BFE"
        default_value: "EBGP"
        order_weight: 1400
      - name: maximum_routes
        kind: Number
        description: "Maximum routes to accept from peer"
        optional: true
        order_weight: 1500
        regex: "^[0-9]+$"
      - name: local_pref
        kind: Number
        description: "Local preference for routes from this peer"
        optional: true
        order_weight: 1600
        regex: "^[0-9]+$"
      - name: med
        kind: Number
        description: "Multi-Exit Discriminator value"
        optional: true
        order_weight: 1700
        regex: "^[0-9]+$"
      - name: send_community
        kind: Checkbox
        description: "Send standard community attributes"
        default_value: true
        optional: true
        order_weight: 1800
      - name: send_extended_community
        kind: Checkbox
        description: "Send extended community attributes"
        default_value: false
        optional: true
        order_weight: 1900
      - name: remove_private_as
        kind: Checkbox
        description: "Remove private AS numbers from AS path"
        default_value: false
        optional: true
        order_weight: 2000
      - name: bfd_enabled
        kind: Checkbox
        description: "Enable BFD for fast convergence"
        default_value: true
        optional: true
        order_weight: 2100
      - name: password
        kind: Password
        description: "BGP session authentication password"
        optional: true
        order_weight: 2200
      - name: ttl
        kind: Number
        description: "Maximum TTL hops for eBGP multihop or GTSM (0 = disabled, 1 = direct connection)"
        default_value: 1
        optional: true
        order_weight: 2300
        regex: "^[0-9]+$"
      - name: route_reflector_client
        kind: Boolean
        label: Route Reflector Client
        description: >-
          Mark remote peer as a route-reflector client.
          True on leaf→spine iBGP when super-spine acts as EVPN route reflector.
        default_value: false
        optional: true
        order_weight: 2400
    relationships:
      - name: bgp_processes
        peer: ManagedBGP
        label: "BGP Processes"
        kind: Generic
        cardinality: many
        optional: false
        identifier: "bgppeering__processes"
        order_weight: 3100
        description: "BGP processes participating in this peering (1-2 devices)"
      - name: remote_peer
        peer: ManagedExternalPeer
        label: "Remote External Peer"
        kind: Attribute
        cardinality: one
        optional: true
        identifier: "bgppeering__remote_peer"
        order_weight: 3200
        description: "External peer endpoint (for peering with non-managed devices)"
      - name: namespace
        peer: IpamNamespace
        label: "IP Namespace"
        kind: Attribute
        cardinality: one
        optional: true
        identifier: "bgppeering__namespace"
        order_weight: 3300
        description: "IP namespace (VRF) in which this BGP session runs — important for PoP/SaaS VRF separation"

extensions:
  nodes:
    - kind: OrganizationGeneric
      relationships:
        - name: asn
          label: Autonomous System
          cardinality: many
          optional: true
          peer: RoutingAutonomousSystem
          order_weight: 2000

    - kind: OrganizationProvider
      relationships:
        - name: asns
          label: ASNs
          peer: RoutingAutonomousSystem
          optional: true
          cardinality: many
          kind: Component

    - kind: ManagedBGP
      relationships:
        - name: address_families
          label: "Address Families"
          peer: RoutingBGPAddressFamily
          cardinality: many
          optional: true
          identifier: "bgp_process__address_families"
          order_weight: 1700
          description: "BGP address families enabled on this process"
        - name: peerings
          peer: ManagedBGPPeering
          label: "BGP Peerings"
          kind: Generic
          cardinality: many
          optional: true
          identifier: "bgppeering__processes"
          order_weight: 5000
          description: "BGP peerings this process participates in"

    - kind: ManagedBGPPeering
      relationships:
        - name: address_families
          label: "Address Families"
          peer: RoutingBGPAddressFamily
          cardinality: many
          optional: true
          identifier: "bgp_peering__address_families"
          order_weight: 2500
          description: "Address families activated for this BGP neighbor (overrides process-level derivation)"
