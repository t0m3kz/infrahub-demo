---
# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
version: "1.0"

# ============================================================================
# Forwarding Proxy — Common schema
# Shared base generic, policy objects, and supporting nodes used by both
# on-prem (OnpremProxy) and SaaS (SaasProxy: Zscaler, Prisma, Netskope).
#
# Architecture mirrors the Load Balancer pattern:
#   ManagedForwardingProxy  — vendor-agnostic generic (status, type, vendor)
#   ServiceProxyPolicy         — ordered rule set applied to a traffic flow
#   ServiceProxyRule           — individual forwarding/bypass/block rule
#   ServiceProxyURLCategory    — reusable URL category for rule matching
# ============================================================================

generics:
  - name: ForwardingProxy
    namespace: Managed
    description: "Base for all forwarding proxies — cloud SASE or on-premises"
    label: Forwarding Proxy
    icon: "mdi:web"
    include_in_menu: false
    human_friendly_id:
      - name__value
    attributes:
      - name: name
        kind: Text
        optional: false
        unique: true
        order_weight: 100
        description: "Name of the forwarding proxy"
      - name: description
        kind: Text
        optional: true
        order_weight: 110
      - name: status
        kind: Dropdown
        optional: false
        order_weight: 200
        default_value: active
        choices:
          - name: provisioning
            label: Provisioning
            color: "#7f7fff"
          - name: active
            label: Active
            color: "#7FBF7F"
          - name: maintenance
            label: Maintenance
            color: "#FFF2CC"
          - name: decommissioned
            label: Decommissioned
            color: "#BFBFBF"
      - name: proxy_type
        kind: Dropdown
        optional: false
        order_weight: 250
        default_value: explicit
        description: "Proxy deployment model"
        choices:
          - name: explicit
            label: Explicit
            description: "Clients use PAC file or manual proxy setting"
            color: "#3498DB"
          - name: transparent
            label: Transparent
            description: "Inline interception — no client configuration"
            color: "#2ECC71"
          - name: wccp
            label: WCCP
            description: "Router redirects traffic via WCCP protocol"
            color: "#F39C12"
          - name: zia
            label: ZIA
            description: "Zscaler Internet Access — cloud SWG/firewall"
            color: "#0066CC"
          - name: zpa
            label: ZPA
            description: "Zscaler Private Access — zero-trust app access"
            color: "#004B99"
          - name: sase
            label: SASE
            description: "Generic cloud SASE/SSE service"
            color: "#9B59B6"
      - name: vendor
        kind: Dropdown
        optional: false
        order_weight: 260
        default_value: other
        description: "Proxy vendor or software"
        choices:
          - name: zscaler
            label: Zscaler
            color: "#0066CC"
          - name: palo_alto_prisma
            label: Palo Alto Prisma
            color: "#FA582D"
          - name: netskope
            label: Netskope
            color: "#00A1E0"
          - name: iboss
            label: iboss
            color: "#E74C3C"
          - name: squid
            label: Squid
            color: "#F39C12"
          - name: bluecoat
            label: BlueCoat / Symantec
            color: "#FFCC00"
          - name: cisco_wsa
            label: Cisco WSA
            color: "#1BA0D7"
          - name: other
            label: Other
            color: "#95A5A6"
    relationships:
      - name: policies
        peer: ServiceProxyPolicy
        cardinality: many
        optional: true
        order_weight: 2000
        description: "Forwarding policies applied by this proxy"
      - name: tags
        peer: BuiltinTag
        cardinality: many
        optional: true
        order_weight: 3000
        description: "Tags for automation and grouping"

nodes:
  # ── URL Category ──────────────────────────────────────────────────────────
  - name: ProxyURLCategory
    namespace: Service
    label: Proxy URL Category
    description: "Reusable URL category for rule destination matching"
    icon: "mdi:tag-multiple"
    include_in_menu: false
    human_friendly_id:
      - name__value
    display_label: "{{ name__value }}"
    uniqueness_constraints:
      - [name__value]
    attributes:
      - name: name
        kind: Text
        optional: false
        unique: true
        order_weight: 100
        description: "Category name (e.g. social-media, malware, streaming)"
      - name: description
        kind: Text
        optional: true
        order_weight: 110
      - name: url_patterns
        kind: TextArea
        optional: false
        order_weight: 200
        description: "Newline-separated URL/FQDN patterns or wildcards (e.g. *.facebook.com)"
      - name: builtin
        kind: Boolean
        optional: true
        default_value: false
        order_weight: 300
        description: "Vendor-provided built-in category (read-only in practice)"

  # ── Proxy Policy ─────────────────────────────────────────────────────────
  - name: ProxyPolicy
    namespace: Service
    label: Proxy Policy
    description: "Ordered forwarding policy applied by a proxy — container for rules"
    icon: "mdi:file-document-outline"
    include_in_menu: false
    human_friendly_id:
      - name__value
    display_label: "{{ name__value }}"
    uniqueness_constraints:
      - [name__value]
    attributes:
      - name: name
        kind: Text
        optional: false
        order_weight: 100
      - name: description
        kind: Text
        optional: true
        order_weight: 110
      - name: default_action
        kind: Dropdown
        optional: false
        default_value: forward
        order_weight: 200
        description: "Action for traffic not matching any rule"
        choices:
          - name: forward
            label: Forward
            description: "Send to proxy / connector group"
            color: "#2ECC71"
          - name: bypass
            label: Bypass
            description: "Allow direct — skip proxy"
            color: "#F39C12"
          - name: block
            label: Block
            description: "Drop and optionally respond with block page"
            color: "#E74C3C"
      - name: enabled
        kind: Boolean
        optional: true
        default_value: true
        order_weight: 300
    relationships:
      - name: proxy
        peer: ManagedForwardingProxy
        cardinality: one
        optional: false
        kind: Attribute
        order_weight: 900
        identifier: "proxy__policy"
        description: "Proxy this policy is attached to"
      - name: cloud_zone
        peer: TopologyCloudZone
        cardinality: one
        optional: true
        kind: Attribute
        order_weight: 1000
        identifier: "proxy_policy__cloud_zone"
        description: "Cloud zone used as forwarding/egress target"
      - name: colo_zone
        peer: TopologyColocationZone
        cardinality: one
        optional: true
        kind: Attribute
        order_weight: 1010
        identifier: "proxy_policy__colo_zone"
        description: "Colocation zone used as forwarding/egress target"
      - name: backend_pool
        peer: ServiceBackendPool
        cardinality: one
        optional: true
        kind: Attribute
        order_weight: 1020
        identifier: "proxy_policy__backend_pool"
        description: "Backend pool that realizes policy forwarding"
      - name: cloud_instances
        peer: CloudInstance
        cardinality: many
        optional: true
        kind: Attribute
        order_weight: 1030
        identifier: "proxy_policy__cloud_instances"
        description: "Cloud instances implementing this policy target"
      - name: onprem_devices
        peer: DcimDevice
        cardinality: many
        optional: true
        kind: Attribute
        order_weight: 1040
        identifier: "proxy_policy__onprem_devices"
        description: "On-prem devices implementing this policy target"
      - name: rules
        peer: ServiceProxyRule
        cardinality: many
        kind: Component
        optional: true
        order_weight: 2000
        description: "Ordered rules in this policy (lower index = first match)"

  # ── Proxy Rule ───────────────────────────────────────────────────────────
  - name: ProxyRule
    namespace: Service
    label: Proxy Rule
    description: "Individual forwarding rule — match criteria and action"
    icon: "mdi:file-document-edit-outline"
    include_in_menu: false
    human_friendly_id:
      - name__value
    display_label: "{{ name__value }}"
    order_by:
      - index__value
    uniqueness_constraints:
      - [policy, index__value]
    attributes:
      - name: index
        kind: Number
        optional: false
        order_weight: 100
        description: "Rule priority — lower numbers matched first"
        parameters:
          min_value: 1
          max_value: 65535
      - name: name
        kind: Text
        optional: false
        order_weight: 110
      - name: action
        kind: Dropdown
        optional: false
        default_value: forward
        order_weight: 200
        choices:
          - name: forward
            label: Forward
            description: "Send to proxy / connector group"
            color: "#2ECC71"
          - name: bypass
            label: Bypass
            description: "Allow direct — skip proxy"
            color: "#F39C12"
          - name: block
            label: Block
            description: "Drop traffic"
            color: "#E74C3C"
          - name: redirect
            label: Redirect
            description: "Redirect to alternate proxy or URL"
            color: "#3498DB"
      - name: destination_type
        kind: Dropdown
        optional: false
        default_value: any
        order_weight: 300
        description: "What the destination match criteria refers to"
        choices:
          - name: any
            label: Any
            color: "#95A5A6"
          - name: internet
            label: Internet
            description: "All internet-bound traffic"
            color: "#3498DB"
          - name: fqdn
            label: FQDN / Wildcard
            description: "Specific hostname or wildcard pattern"
            color: "#2ECC71"
          - name: prefix
            label: IP Prefix
            description: "Destination IP prefix or range"
            color: "#9B59B6"
          - name: url_category
            label: URL Category
            description: "Named URL category (social, malware, streaming, etc.)"
            color: "#F39C12"
      - name: destination_value
        kind: Text
        optional: true
        order_weight: 310
        description: "FQDN pattern, IP prefix, or category name — when destination_type is fqdn/prefix/url_category"
      - name: protocol
        kind: Dropdown
        optional: true
        order_weight: 400
        default_value: any
        choices:
          - name: any
            label: Any
            color: "#95A5A6"
          - name: http
            label: HTTP
            color: "#3498DB"
          - name: https
            label: HTTPS
            color: "#2ECC71"
          - name: ftp
            label: FTP
            color: "#F39C12"
      - name: log
        kind: Boolean
        optional: true
        default_value: false
        order_weight: 500
      - name: description
        kind: Text
        optional: true
        order_weight: 600
      - name: disabled
        kind: Boolean
        optional: true
        default_value: false
        order_weight: 700
    relationships:
      - name: policy
        peer: ServiceProxyPolicy
        cardinality: one
        optional: false
        kind: Attribute
        order_weight: 900
        identifier: "proxy_policy__rule"
        description: "Policy this rule belongs to"
      - name: source_segments
        peer: ManagedNetworkSegment
        cardinality: many
        optional: true
        order_weight: 1000
        identifier: "proxy_rule__source_segments"
        description: "Source network segments this rule applies to (empty = any source)"
      - name: url_categories
        peer: ServiceProxyURLCategory
        cardinality: many
        optional: true
        order_weight: 1100
        identifier: "proxy_rule__url_categories"
        description: "URL categories matched when destination_type is url_category"

extensions:
  nodes: []
