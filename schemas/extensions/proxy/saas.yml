---
# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
version: "1.0"

# ============================================================================
# SaaS Proxy — Cloud-hosted forwarding proxy (Zscaler, Prisma, Netskope, …)
# Inherits ManagedForwardingProxy + CoreArtifactTarget.
# Adds cloud-specific fields: cloud_node, provisioning_key_ref.
# ============================================================================

nodes:
  - name: Proxy
    namespace: Saas
    label: SaaS Proxy
    description: >
      Cloud-hosted forwarding proxy or SASE service (Zscaler ZIA/ZPA,
      Palo Alto Prisma, Netskope, iboss, etc.)
    icon: "mdi:cloud-lock"
    include_in_menu: false
    human_friendly_id:
      - name__value
    display_label: "{{ name__value }}"
    uniqueness_constraints:
      - [name__value]
    inherit_from:
      - ManagedForwardingProxy
      - CoreArtifactTarget
    attributes:
      - name: cloud_node
        kind: Text
        optional: true
        order_weight: 1000
        description: "Cloud service node FQDN (e.g. zscaler.net, zscloud.net, prismaaccess.com)"
      - name: provisioning_key_ref
        kind: Text
        optional: true
        order_weight: 1100
        description: "Opaque reference to provisioning key in secrets manager — do NOT store the key itself here"
    relationships:
      - name: customer
        peer: OrganizationCustomer
        cardinality: one
        optional: true
        kind: Attribute
        order_weight: 1200
        identifier: "saas_proxy__customer"
        description: "Customer organisation that owns this proxy deployment"
      - name: saas_topology
        peer: TopologySaas
        cardinality: one
        optional: true
        kind: Attribute
        order_weight: 900
        identifier: "saas_proxy__topology"
        description: "SaaS topology this proxy is part of"
