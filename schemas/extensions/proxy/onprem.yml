---
# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
version: "1.0"

# ============================================================================
# On-Prem Proxy — Physical or virtual proxy appliance (Squid, BlueCoat, WSA)
# Inherits ManagedForwardingProxy + ManagedGeneric + CoreArtifactTarget.
# Adds on-prem-specific fields: proxy_port, auth_type, forwarding_method.
#
# forwarding_method drives which devices get generated config:
#   explicit     → only the proxy device (squid.conf / policy file)
#   transparent  → proxy device + upstream firewall (redirect ACL)
#   wccp         → proxy device + upstream edge router (ip wccp redirect)
# ============================================================================

nodes:
  - name: Proxy
    namespace: Onprem
    label: On-Prem Proxy
    description: >
      On-premises forwarding proxy appliance or software
      (Squid, BlueCoat/Symantec, Cisco WSA, etc.)
    icon: "mdi:server-security"
    include_in_menu: false
    human_friendly_id:
      - name__value
    display_label: "{{ name__value }}"
    uniqueness_constraints:
      - [name__value]
    inherit_from:
      - ManagedForwardingProxy
      - ManagedGeneric
      - CoreArtifactTarget
    attributes:
      - name: proxy_port
        kind: Number
        optional: true
        order_weight: 1000
        description: "Listening port for explicit proxy (default 3128 for Squid)"
        parameters:
          min_value: 1
          max_value: 65535
      - name: forwarding_method
        kind: Dropdown
        optional: false
        default_value: explicit
        order_weight: 1100
        description: "How clients are directed to this proxy — determines which devices get generated config"
        choices:
          - name: explicit
            label: Explicit
            description: "Clients configured via PAC file or manual setting — only proxy gets config"
            color: "#3498DB"
          - name: transparent
            label: Transparent
            description: "Inline interception — proxy + upstream firewall get config"
            color: "#2ECC71"
          - name: wccp
            label: WCCP
            description: "Router-based redirection — proxy + upstream edge router get config"
            color: "#F39C12"
      - name: auth_type
        kind: Dropdown
        optional: true
        order_weight: 1200
        default_value: none
        description: "Authentication method required from clients"
        choices:
          - name: none
            label: None
            color: "#95A5A6"
          - name: basic
            label: Basic
            color: "#3498DB"
          - name: kerberos
            label: Kerberos
            color: "#9B59B6"
          - name: ntlm
            label: NTLM
            color: "#E67E22"
          - name: saml
            label: SAML
            color: "#2ECC71"
      - name: ssl_inspection
        kind: Boolean
        optional: true
        default_value: false
        order_weight: 1300
        description: "SSL/TLS inspection enabled on this proxy"
      - name: wccp_service_id
        kind: Number
        optional: true
        order_weight: 1400
        description: "WCCP service group ID (required when forwarding_method is wccp)"
        parameters:
          min_value: 0
          max_value: 255
    relationships:
      - name: deployment
        peer: TopologyDeployment
        cardinality: one
        optional: false
        kind: Attribute
        order_weight: 900
        identifier: "onprem_proxy__deployment"
        description: "Deployment location for this proxy"
      - name: devices
        peer: DcimDevice
        cardinality: many
        optional: true
        order_weight: 950
        identifier: "onprem_proxy__devices"
        description: "Physical or virtual devices running this proxy software (HA pair or cluster)"
