---
# DC Fabric Security — Zero-Trust Micro-Segmentation
#
# 4-node model for segment-to-segment policy enforcement:
#   SecurityZone          — macro trust classification
#   SecuritySecurityProfile — threat prevention inspection flags
#   SecurityPolicy        — segment contract (default deny)
#   SecurityPolicyRule    — per-flow rules with inline protocol/port
#
# Cloud security (Zscaler, Prisma, etc.) will be a separate schema.
version: "1.0"

nodes:
  # ==========================================
  # Security Zones
  # ==========================================
  - name: Zone
    namespace: Security
    description: "Security zone — macro trust classification for network segments"
    label: Security Zone
    icon: "mdi:shield-lock"
    include_in_menu: false
    order_by:
      - name__value
    display_label: "{{ name__value }}"
    attributes:
      - name: name
        kind: Text
        label: Name
        optional: false
        unique: true
        order_weight: 1000
      - name: description
        kind: Text
        label: Description
        optional: true
        order_weight: 1100
      - name: trust_level
        kind: Number
        label: Trust Level
        description: "Trust level (0-100), higher is more trusted"
        optional: false
        order_weight: 1200
      - name: zone_type
        kind: Dropdown
        label: Zone Type
        description: "Type of security zone"
        choices:
          - name: internal
            label: Internal
            description: "Internal trusted network"
            color: "#2ECC71"
          - name: dmz
            label: DMZ
            description: "Demilitarized zone"
            color: "#F39C12"
          - name: external
            label: External
            description: "External untrusted network"
            color: "#E74C3C"
          - name: management
            label: Management
            description: "Management network"
            color: "#3498DB"
        default_value: internal
        optional: false
        order_weight: 1300
    relationships:
      - name: firewall_interface
        peer: DcimFirewallInterface
        label: Firewall Interface
        cardinality: one
        kind: Attribute
        optional: true
        order_weight: 1350
        identifier: firewall_interface__security_zone
        description: "FW interface serving this zone — defines the VRF gateway"
      - name: network_segments
        peer: ManagedNetworkSegment
        label: Network Segments
        cardinality: many
        kind: Generic
        optional: true
        order_weight: 2100
        identifier: network_segment__security_zone
        description: "Network segments assigned to this security zone"
      - name: rules_as_source
        peer: SecurityPolicyRule
        label: Rules as Source
        cardinality: many
        kind: Generic
        optional: true
        order_weight: 2200
        identifier: policyrule_source_zone
        description: "Policy rules where this zone is the source"
      - name: rules_as_dest
        peer: SecurityPolicyRule
        label: Rules as Destination
        cardinality: many
        kind: Generic
        optional: true
        order_weight: 2300
        identifier: policyrule_destination_zone
        description: "Policy rules where this zone is the destination"

  # ==========================================
  # Security Profiles — Threat Prevention
  # ==========================================
  - name: SecurityProfile
    namespace: Security
    description: "Threat prevention profile — applied per policy rule"
    label: Security Profile
    icon: "mdi:shield-check"
    include_in_menu: false
    order_by:
      - name__value
    display_label: "{{ name__value }}"
    attributes:
      - name: name
        kind: Text
        label: Name
        optional: false
        unique: true
        order_weight: 1000
      - name: description
        kind: Text
        label: Description
        optional: true
        order_weight: 1100
      - name: antivirus_enabled
        kind: Boolean
        label: Antivirus Enabled
        description: "Enable antivirus scanning"
        default_value: false
        optional: true
        order_weight: 1200
      - name: ips_enabled
        kind: Boolean
        label: IPS Enabled
        description: "Enable intrusion prevention system"
        default_value: false
        optional: true
        order_weight: 1300
      - name: url_filtering_enabled
        kind: Boolean
        label: URL Filtering Enabled
        description: "Enable URL filtering"
        default_value: false
        optional: true
        order_weight: 1400
      - name: ssl_inspection_enabled
        kind: Boolean
        label: SSL Inspection Enabled
        description: "Enable SSL/TLS inspection"
        default_value: false
        optional: true
        order_weight: 1500
      - name: data_loss_prevention_enabled
        kind: Boolean
        label: DLP Enabled
        description: "Enable data loss prevention"
        default_value: false
        optional: true
        order_weight: 1600

  # ==========================================
  # Security Policies — Segment Contracts
  # ==========================================
  - name: Policy
    namespace: Security
    description: "Security policy — zero-trust contract for segment traffic"
    label: Security Policy
    icon: "mdi:file-document-outline"
    include_in_menu: false
    inherit_from:
      - ManagedGenericDevice
    order_by:
      - name__value
    display_label: "{{ name__value }}"
    attributes:
      - name: name
        kind: Text
        label: Name
        optional: false
        unique: true
        order_weight: 1000
      - name: description
        kind: Text
        label: Description
        optional: true
        order_weight: 1100
      - name: default_action
        kind: Dropdown
        label: Default Action
        description: "Default action for unmatched traffic (zero-trust = deny)"
        choices:
          - name: permit
            label: Permit
            description: "Allow by default"
            color: "#2ECC71"
          - name: deny
            label: Deny
            description: "Block by default"
            color: "#E74C3C"
        default_value: deny
        optional: false
        order_weight: 1200
      - name: enabled
        kind: Boolean
        label: Policy Enabled
        description: "Whether this policy is active"
        default_value: true
        optional: true
        order_weight: 1300
    relationships:
      - name: rules
        peer: SecurityPolicyRule
        label: Policy Rules
        cardinality: many
        kind: Component
        optional: true
        order_weight: 2000
        description: "Ordered rules in this policy"

  # ==========================================
  # Policy Rules — Per-Flow Enforcement
  # ==========================================
  - name: PolicyRule
    namespace: Security
    description: "Policy rule with segment-level micro-segmentation and inline protocol/port"
    label: Security Policy Rule
    icon: "mdi:file-document-edit-outline"
    include_in_menu: false
    order_by:
      - index__value
    display_label: "{{ name__value }}"
    human_friendly_id:
      - name__value
    uniqueness_constraints:
      - [policy, index__value]
    attributes:
      - name: index
        kind: Number
        label: Rule Index
        description: "Rule index for ordering (lower numbers processed first)"
        optional: false
        order_weight: 1000
      - name: name
        kind: Text
        label: Name
        optional: false
        order_weight: 1100
      - name: action
        kind: Dropdown
        label: Action
        description: "Action to take when rule matches"
        choices:
          - name: permit
            label: Permit
            description: "Allow the traffic"
            color: "#2ECC71"
          - name: deny
            label: Deny
            description: "Block the traffic"
            color: "#E74C3C"
          - name: drop
            label: Drop
            description: "Silently drop the traffic"
            color: "#95A5A6"
          - name: reject
            label: Reject
            description: "Reject with ICMP response"
            color: "#E67E22"
        default_value: deny
        optional: false
        order_weight: 1200
      - name: protocol
        kind: Dropdown
        label: Protocol
        description: "Transport protocol"
        choices:
          - name: tcp
            label: TCP
            description: "Transmission Control Protocol"
            color: "#3498DB"
          - name: udp
            label: UDP
            description: "User Datagram Protocol"
            color: "#2ECC71"
          - name: icmp
            label: ICMP
            description: "Internet Control Message Protocol"
            color: "#F39C12"
          - name: any
            label: Any
            description: "Any protocol"
            color: "#9B59B6"
        default_value: any
        optional: false
        order_weight: 1300
      - name: port_start
        kind: Number
        label: Port Start
        description: "Starting port number (1-65535). Omit for protocol-only rules."
        optional: true
        order_weight: 1400
        parameters:
          min_value: 1
          max_value: 65535
      - name: port_end
        kind: Number
        label: Port End
        description: "Ending port number for ranges. Omit for single-port rules."
        optional: true
        order_weight: 1500
        parameters:
          min_value: 1
          max_value: 65535
      - name: log
        kind: Boolean
        label: Log
        description: "Enable logging for this rule"
        default_value: false
        optional: true
        order_weight: 1600
      - name: description
        kind: Text
        label: Description
        optional: true
        order_weight: 1700
      - name: disabled
        kind: Boolean
        label: Rule Disabled
        description: "Disable this rule without deleting it"
        default_value: false
        optional: true
        order_weight: 1800
    relationships:
      - name: policy
        peer: SecurityPolicy
        label: Policy
        cardinality: one
        kind: Attribute
        optional: false
        order_weight: 2000
      # Macro-segmentation: zone-level match
      - name: source_zone
        peer: SecurityZone
        label: Source Zone
        cardinality: one
        kind: Attribute
        optional: true
        identifier: policyrule_source_zone
        order_weight: 2100
        description: "Source security zone (macro-segmentation)"
      - name: destination_zone
        peer: SecurityZone
        label: Destination Zone
        cardinality: one
        kind: Attribute
        optional: true
        identifier: policyrule_destination_zone
        order_weight: 2200
        description: "Destination security zone (macro-segmentation)"
      # Micro-segmentation: segment-level match
      - name: source_segment
        peer: ManagedNetworkSegment
        label: Source Segment
        cardinality: one
        kind: Attribute
        optional: true
        order_weight: 2300
        identifier: policyrule_source_segment
        description: "Source network segment (micro-segmentation)"
      - name: destination_segment
        peer: ManagedNetworkSegment
        label: Destination Segment
        cardinality: one
        kind: Attribute
        optional: true
        order_weight: 2400
        identifier: policyrule_destination_segment
        description: "Destination network segment (micro-segmentation)"
      # Inspection profile
      - name: security_profile
        peer: SecuritySecurityProfile
        label: Security Profile
        cardinality: one
        kind: Attribute
        optional: true
        order_weight: 2500
        description: "Threat prevention profile for matched traffic"

extensions:
  nodes:
    - kind: DcimFirewallInterface
      relationships:
        - name: security_zone
          peer: SecurityZone
          label: Security Zone
          cardinality: one
          kind: Attribute
          optional: true
          identifier: firewall_interface__security_zone
          order_weight: 1500
          description: "Security zone this interface belongs to"

    - kind: ManagedNetworkSegment
      relationships:
        - name: security_zone
          peer: SecurityZone
          cardinality: one
          kind: Attribute
          optional: true
          order_weight: 900
          description: "Security zone assignment (macro trust classification)"
          identifier: network_segment__security_zone
        - name: security_policies
          peer: SecurityPolicy
          label: Security Policies
          cardinality: many
          kind: Generic
          optional: true
          order_weight: 920
          identifier: network_segment__security_policies
          description: "Security policies governing this segment (zero-trust contracts)"
