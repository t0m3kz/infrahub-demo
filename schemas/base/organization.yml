---
version: "1.0"

generics:
  - name: Entity
    namespace: Organization
    description: An organization with a unique identifier (customer or provider).
    include_in_menu: false
    attributes:
      - name: org_id
        kind: Text
        unique: true
        optional: true
        description: "Unique organization identifier (e.g. C001, P001)"
        order_weight: 900
    relationships:
      - name: network_segments
        peer: ManagedNetworkSegment
        cardinality: many
        kind: Component
        on_delete: cascade
        optional: true
        description: "Owned network segments"
        order_weight: 2200
        identifier: network_segment__owner

  - name: Generic
    namespace: Organization
    label: Organization
    description: An organization represent a legal entity, a company.
    human_friendly_id:
      - name__value
    order_by:
      - name__value
    display_label: "{{name__value}}"
    icon: mdi:domain
    include_in_menu: false
    attributes:
      - name: name
        kind: Text
        unique: true
        order_weight: 1000
      - name: description
        kind: Text
        optional: true
        order_weight: 1200
    relationships:
      - name: tags
        peer: BuiltinTag
        cardinality: many
        kind: Attribute
        optional: true
        order_weight: 3000

nodes:
  - name: Manufacturer
    namespace: Organization
    description: Device Manufacturer
    icon: mdi:domain
    include_in_menu: true
    menu_placement: OrganizationGeneric
    human_friendly_id:
      - name__value
    order_by:
      - name__value
    display_label: "{{name__value}}"
    attributes:
      - name: name
        kind: Text
        unique: true
        order_weight: 1000
      - name: description
        kind: Text
        optional: true
        order_weight: 1200
    relationships:
      - name: device_type
        peer: DcimDeviceType
        cardinality: many
        optional: true
      - name: platform
        peer: DcimPlatform
        cardinality: many
        optional: true

  - name: Provider
    namespace: Organization
    description: Circuit or Location Provider
    icon: mdi:domain
    inherit_from:
      - OrganizationGeneric
      - OrganizationEntity
    include_in_menu: true
    menu_placement: OrganizationGeneric
    human_friendly_id:
      - name__value
    display_label: "{{name__value}} ({{org_id__value}})"

  - name: Customer
    namespace: Organization
    description: Customer with dedicated network namespace
    icon: mdi:account-group
    inherit_from:
      - OrganizationGeneric
      - OrganizationEntity
    include_in_menu: true
    menu_placement: OrganizationGeneric
    human_friendly_id:
      - org_id__value
    display_label: "{{name__value}} ({{org_id__value}})"
