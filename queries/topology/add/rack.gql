fragment TemplateDeviceFields on TemplateDcimPhysicalDevice {
  platform {
    node {
      id
      name {
        value
      }
    }
  }
  device_type {
    node {
      id
    }
  }
  interfaces(role__value: "uplink") {
    edges {
      node {
        name {
          value
        }
        role {
          value
        }
      }
    }
  }
}

fragment FabricTemplateFields on TopologyElement {
  role {
    value
  }
  quantity {
    value
  }
  template {
    node {
      id
      ...TemplateDeviceFields
    }
  }
}

fragment SpineInterfaceFields on DcimPhysicalInterface {
  id
  name { value }
  cable {
    node {
      id
      name { value }
    }
  }
}

fragment SpineDeviceFields on DcimPhysicalDevice {
  id
  name { value }
  interfaces(role__value: "downlink") {
    edges {
      node {
        ...SpineInterfaceFields
      }
    }
  }
}

fragment PodDesignFields on TopologyPodDesign {
  id
  name { value }
  rows { value }
  compute_racks_per_row { value }
  network_racks_per_row { value }
  max_leafs_per_network_rack { value }
  max_tors_per_compute_rack { value }
  max_spines_per_pod { value }
}

fragment PodFields on TopologyPod {
  id
  name {
    value
  }
  index {
    value
  }
  # New three-layer architecture
  design { node { ...PodDesignFields } }
  # Legacy attributes (for backward compatibility)
  deployment_type {
    value
  }
  parent {
    node {
      ... on TopologyDataCenter {
        id
        name {
          value
        }
        index {
          value
        }
        naming_convention {
          value
        }
        management_pool {
          node {
            id
            name { value }
          }
        }
        design {
          node {
            id
            routing_strategy {
              value
            }
            underlay_protocol {
              value
            }
          }
        }
      }
    }
  }
  amount_of_spines {
    value
  }
  leaf_interface_sorting_method {
    value
  }
  spine_interface_sorting_method {
    value
  }
  loopback_pool {
    node {
      id
    }
  }
  prefix_pool {
    node {
      id
    }
  }
  asn_pool {
    node {
      id
      name { value }
    }
  }
  spine_template {
    node {
      id
      interfaces(role__value: "downlink") {
        edges {
          node {
            name {
              value
            }
          }
        }
      }
    }
  }
  # Spine devices with cable info — used by rack generator to detect
  # already-cabled spine ports and avoid duplicate relationship upserts
  devices(role__value: "spine") {
    edges {
      node {
        ...SpineDeviceFields
      }
    }
  }
}

query RackGenerator($name: String) {
  LocationRack(name__value: $name) {
    edges {
      node {
        id
        name {
          value
        }
        checksum {
          value
        }
        index {
          value
        }
        rack_type {
          value
        }
        checksum {
          value
        }
        row_index {
          value
        }
        parent {
          node {
            ... on LocationSuite {
              index {
                value
              }
            }
          }
        }
        leafs: fabric_templates(role__value: "leaf") {
          edges {
            node {
              ...FabricTemplateFields
            }
          }
        }
        tors: fabric_templates(role__value: "tor") {
          edges {
            node {
              ...FabricTemplateFields
            }
          }
        }
        border_leafs: fabric_templates(role__value: "border-leaf") {
          edges {
            node {
              ...FabricTemplateFields
            }
          }
        }
        pod {
          node {
            ...PodFields
          }
        }
      }
    }
  }
}
