query leaf_config($device: String!) {
  DcimDevice(name__value: $device) {
    edges {
      node {
        __typename
        id
        name { value }
        role { value }
        platform {
          node {
            name { value }
            netmiko_device_type { value }
          }
        }
        primary_address {
          node {
            address { value }
            ip_namespace { node { name { value } } }
          }
        }
        tags {
          edges {
            node { name { value } }
          }
        }

        # Device Services (BGP, OSPF) with nested peerings
        ... on DcimCapabilities {
        capabilities {
          edges {
            node {
              __typename

              ... on ManagedGeneric {
                name { value }
                status { value }
              }

              ... on ManagedBGP {
                multipath { value }
                graceful_restart { value }
                confederation_identifier { value }
                local_as { node { asn { value } } }
                router_id { node { address { value } } }
                address_families {
                  edges {
                    node {
                      afi { value }
                      safi { value }
                    }
                  }
                }
                peerings {
                  edges {
                    node {
                      id
                      name { value }
                      session_type { value }
                      bfd_enabled { value }
                      send_community { value }
                      ttl { value }
                      route_reflector_client { value }
                      address_families {
                        edges {
                          node {
                            afi { value }
                            safi { value }
                          }
                        }
                      }
                      interface_capabilities {
                        edges {
                          node {
                            name { value }
                            ... on DcimPhysicalInterface {
                              ip_address { node { address { value } } }
                            }
                            ... on DcimVirtualInterface {
                              ip_address { node { address { value } } }
                            }
                            device { node { name { value } } }
                          }
                        }
                      }
                      bgp_processes {
                        edges {
                          node {
                            router_id { node { address { value } } }
                            local_as { node { asn { value } } }
                          }
                        }
                      }
                    }
                  }
                }
              }

              ... on ManagedOSPF {
                process_id { value }
                version { value }
                router_type { value }
                reference_bandwidth { value }
                router_id { node { address { value } } }
              }


              ... on ManagedNTP {
                timezone { value }
                servers {
                  edges {
                    node {
                      address { node { address { value } } }
                      prefer { value }
                      version { value }
                    }
                  }
                }
              }

              ... on ManagedSyslog {
                servers {
                  edges {
                    node {
                      address { node { address { value } } }
                      port { value }
                      severity { value }
                    }
                  }
                }
              }

              ... on ManagedSNMP {
                version { value }
                community_ro { value }
                location { value }
                contact { value }
                trap_targets {
                  edges {
                    node {
                      address { node { address { value } } }
                      port { value }
                    }
                  }
                }
              }

              ... on ManagedAAA {
                authentication_order { value }
                authorization_commands { value }
                accounting_enabled { value }
                servers {
                  edges {
                    node {
                      address { node { address { value } } }
                      protocol { value }
                      port { value }
                      timeout { value }
                    }
                  }
                }
              }

              ... on ManagedMLAG {
                domain_id { value }
                reload_delay { value }
                reload_delay_non_mlag { value }
                capabilities { edges { node { name { value } } } }
              }
            }
          }
        }
        }

        # Interface Information
        interfaces {
          edges {
            node {
              __typename
              name { value }
              description { value }
              status { value }
              role { value }
              ... on DcimPhysicalInterface {
                interface_type { value }
                mtu { value }
                ip_address {
                  node {
                    address { value }
                    ip_namespace { node { name { value } } }
                  }
                }
                cable {
                  node {
                    id
                    endpoints {
                      edges {
                        node {
                          __typename
                          ... on DcimPhysicalInterface {
                            name { value }
                            ip_address {
                              node {
                                address { value }
                              }
                            }
                            device {
                              node {
                                name { value }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }

              ... on DcimVirtualInterface {
                ip_address {
                  node {
                    address { value }
                    ip_namespace { node { name { value } } }
                  }
                }
              }

              ... on DcimLAGInterface {
                lag_id { value }
                lacp_mode { value }
                mtu { value }
                minimum_links { value }
                ip_address {
                  node {
                    address { value }
                    ip_namespace { node { name { value } } }
                  }
                }
                member_interfaces {
                  edges {
                    node {
                      name { value }
                    }
                  }
                }
              }
              interface_capabilities {
                edges {
                  node {
                    __typename
                    ... on RoutingOSPFInterface {
                      name { value }
                      ospf_process { node { router_id { node { address { value } } } } }
                      area { node { area { value } area_type { value } } }
                      mode { value }
                      metric { value }
                    }
                    ...NetworkSegmentFields
                  }
                }
              }
            }
          }
        }
      }
    }
  }

}

fragment NetworkSegmentFields on ManagedNetworkSegment {
  ... on ManagedVlanSegment {
    name { value }
    description { value }
    status { value }
    segment_deployments(status__values: ["active", "provisioning"]) {
      edges {
        node {
          vlan_id { value }
          vni { value }
        }
      }
    }
    prefix {
      edges {
        node {
          prefix { value }
          gateway_ip { value }
          ip_namespace {
            node {
              name { value }
              l3_vni { value }
              owner { node { name { value } } }
            }
          }
        }
      }
    }
    ...SecurityPolicyFields
  }
  ... on ManagedVxlanSegment {
    name { value }
    description { value }
    status { value }
    arp_suppression { value }
    segment_deployments(status__values: ["active", "provisioning"]) {
      edges {
        node {
          vlan_id { value }
          vni { value }
        }
      }
    }
    prefix {
      edges {
        node {
          prefix { value }
          gateway_ip { value }
          ip_namespace {
            node {
              name { value }
              l3_vni { value }
              owner { node { name { value } } }
            }
          }
        }
      }
    }
    ...SecurityPolicyFields
  }
}

# SecurityPolicyFields is spread inside each concrete segment type (ManagedVlan/VxlanSegment)
# because security_policies lives on ManagedNetworkSegment — all segment types inherit it.
fragment SecurityPolicyFields on ManagedNetworkSegment {
  inline_service {
    node { id name { value } }
  }
  isolation_mode { value }
  security_tag {
    node {
      name { value }
      group_id { value }
      rules_as_source {
        edges {
          node {
            action { value }
            log { value }
            destination_tag {
              node {
                name { value }
                group_id { value }
              }
            }
          }
        }
      }
    }
  }
  security_policies {
    edges {
      node {
        name { value }
        default_action { value }
        enabled { value }
        rules {
          edges {
            node {
              index { value }
              name { value }
              action { value }
              protocol { value }
              port_start { value }
              port_end { value }
              log { value }
              disabled { value }
              apply_on_switch { value }
              source_zone { node { name { value } } }
              destination_zone { node { name { value } } }
              source_segment {
                node {
                  id
                  ... on ManagedVlanSegment { name { value } prefix { edges { node { prefix { value } } } } }
                  ... on ManagedVxlanSegment { name { value } prefix { edges { node { prefix { value } } } } }
                }
              }
              destination_segment {
                node {
                  id
                  ... on ManagedVlanSegment { name { value } prefix { edges { node { prefix { value } } } } }
                  ... on ManagedVxlanSegment { name { value } prefix { edges { node { prefix { value } } } } }
                }
              }
            }
          }
        }
      }
    }
  }
}
