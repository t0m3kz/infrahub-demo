---
# Security Policy Rules — Per-flow enforcement
#
# Rules demonstrate both macro (zone-level) and micro (segment-level) matching.
# Inline protocol/port replaces ServiceObject/ServiceGroup references.
#
# Architecture tested:
#   DMZ → Web Tier → App Tier → Database Tier
#   Management → all tiers (SSH/SNMP)
#   Guest → internet only (no internal)
#   Tenant A ←✗→ Tenant B (isolation)

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: SecurityPolicyRule
  data:
    # ==========================================
    # Zone-Level Rules (macro-segmentation)
    # ==========================================

    # Management SSH access to all production zones
    - index: 100
      name: "mgmt-ssh-to-prod"
      description: "Allow SSH from management to production workloads"
      action: "permit"
      protocol: "tcp"
      port_start: 22
      log: true
      policy: "management-access"
      source_zone: "INFRA-ZONE"
      destination_zone: "PROD-ZONE"
      security_profile: "standard"

    # Management SNMP polling
    - index: 110
      name: "mgmt-snmp-polling"
      description: "Allow SNMP from management to all infrastructure"
      action: "permit"
      protocol: "udp"
      port_start: 161
      log: false
      policy: "management-access"
      source_zone: "INFRA-ZONE"
      destination_zone: "PROD-ZONE"

    # Management syslog collection
    - index: 120
      name: "mgmt-syslog-collect"
      description: "Allow syslog from production to management collectors"
      action: "permit"
      protocol: "udp"
      port_start: 514
      log: false
      policy: "management-access"
      source_zone: "PROD-ZONE"
      destination_zone: "INFRA-ZONE"

    # DMZ HTTPS ingress to web tier
    - index: 200
      name: "dmz-https-to-web"
      description: "Allow HTTPS from DMZ reverse proxies to web tier"
      action: "permit"
      protocol: "tcp"
      port_start: 443
      log: true
      policy: "dmz-ingress"
      source_zone: "DMZ-ZONE"
      destination_zone: "PROD-ZONE"
      security_profile: "strict"

    # DMZ HTTP redirect
    - index: 210
      name: "dmz-http-to-web"
      description: "Allow HTTP from DMZ (redirect to HTTPS)"
      action: "permit"
      protocol: "tcp"
      port_start: 80
      log: false
      policy: "dmz-ingress"
      source_zone: "DMZ-ZONE"
      destination_zone: "PROD-ZONE"

    # Guest DNS only
    - index: 300
      name: "guest-dns"
      description: "Allow DNS resolution for guest network"
      action: "permit"
      protocol: "udp"
      port_start: 53
      log: false
      policy: "guest-restricted"
      source_zone: "GUEST-ZONE"
      destination_zone: "DMZ-ZONE"

    # Guest DHCP
    - index: 310
      name: "guest-dhcp"
      description: "Allow DHCP for guest network"
      action: "permit"
      protocol: "udp"
      port_start: 67
      port_end: 68
      log: false
      policy: "guest-restricted"
      source_zone: "GUEST-ZONE"
      destination_zone: "INFRA-ZONE"

    # Block guest to internal
    - index: 390
      name: "deny-guest-to-internal"
      description: "Block guest network from all internal resources"
      action: "deny"
      protocol: "any"
      log: true
      policy: "guest-restricted"
      source_zone: "GUEST-ZONE"
      destination_zone: "PROD-ZONE"

    # Block guest to tenant
    - index: 391
      name: "deny-guest-to-tenant"
      description: "Block guest network from tenant segments"
      action: "deny"
      protocol: "any"
      log: true
      policy: "guest-restricted"
      source_zone: "GUEST-ZONE"
      destination_zone: "TENANT-ZONE"

    # ==========================================
    # Segment-Level Rules (micro-segmentation)
    # These use source_segment / destination_segment
    # for per-segment contract enforcement.
    #
    # Segment names reference ManagedVlanSegment /
    # ManagedVxlanSegment HFID values. Uncomment and
    # adjust once segments are created.
    # ==========================================

    # # Web tier → App tier: HTTPS API calls only
    # - index: 500
