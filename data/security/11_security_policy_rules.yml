    # - index: 600
    #   name: "app-to-db-postgres"
    #   description: "Allow app segment to access PostgreSQL database"
    #   action: "permit"
    #   protocol: "tcp"
    #   port_start: 5432
    #   log: true
    #   policy: "3tier-app-to-db"
    #   source_segment: "ACME__production__app-backend"
    #   destination_segment: "ACME__production__database"
    #   security_profile: "strict"

    # # App tier → Database: MySQL
    # - index: 610
    #   name: "app-to-db-mysql"
    #   description: "Allow app segment to access MySQL database"
    #   action: "permit"
    #   protocol: "tcp"
    #   port_start: 3306
    #   log: true
    #   policy: "3tier-app-to-db"
    #   source_segment: "ACME__production__app-backend"
    #   destination_segment: "ACME__production__database"
    #   security_profile: "strict"

    # # App tier → Database: Redis cache
    # - index: 620
    #   name: "app-to-db-redis"
    #   description: "Allow app segment to access Redis cache"
    #   action: "permit"
    #   protocol: "tcp"
    #   port_start: 6379
    #   log: false
    #   policy: "3tier-app-to-db"
    #   source_segment: "ACME__production__app-backend"
    #   destination_segment: "ACME__production__database"

    # ==========================================
    # Tenant Isolation (micro-segmentation)
    # ==========================================

    # # Block Tenant A → Tenant B (same zone, different segments)
    # - index: 900
    #   name: "deny-acme-to-globex"
    #   description: "Block ACME production from accessing Globex production"
    #   action: "deny"
    #   protocol: "any"
    #   log: true
    #   policy: "tenant-isolation"
    #   source_segment: "ACME__production__app-backend"
    #   destination_segment: "Globex__production__app-backend"

    # # Block Tenant B → Tenant A
    # - index: 910
    #   name: "deny-globex-to-acme"
    #   description: "Block Globex production from accessing ACME production"
    #   action: "deny"
    #   protocol: "any"
    #   log: true
    #   policy: "tenant-isolation"
    #   source_segment: "Globex__production__app-backend"
    #   destination_segment: "ACME__production__app-backend"

    # Catch-all: deny all inter-tenant traffic at zone level
    - index: 999
      name: "deny-tenant-to-tenant"
      description: "Default deny all inter-tenant traffic"
      action: "deny"
      protocol: "any"
      log: true
      policy: "tenant-isolation"
      source_zone: "TENANT-ZONE"
      destination_zone: "TENANT-ZONE"
