---
# Security Zones — Macro trust classification for DC fabric segments
#
# Trust Level Scale:
#   0-25:  Untrusted (guest, external)
#   26-50: DMZ (public-facing services)
#   51-75: Internal (application workloads, tenant segments)
#   76-100: Highly trusted (management, infrastructure)

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: SecurityZone
  data:
    - name: "INFRA-ZONE"
      description: "Infrastructure zone — management, monitoring, fabric control plane"
      trust_level: 95
      zone_type: "management"

    - name: "PROD-ZONE"
      description: "Production workload zone — web, app, and database tiers"
      trust_level: 70
      zone_type: "internal"

    - name: "NONPROD-ZONE"
      description: "Non-production zone — dev, staging, QA environments"
      trust_level: 50
      zone_type: "internal"

    - name: "DMZ-ZONE"
      description: "DMZ zone — public-facing services, reverse proxies"
      trust_level: 30
      zone_type: "dmz"

    - name: "GUEST-ZONE"
      description: "Guest zone — untrusted visitor network"
      trust_level: 10
      zone_type: "external"

    - name: "TENANT-ZONE"
      description: "Multi-tenant zone — isolated per-customer segments"
      trust_level: 60
      zone_type: "internal"
