---
# Security Policies — Zero-trust segment contracts
#
# All policies default to deny. Rules explicitly permit allowed flows.
# Policies are assigned to segments via the security_policies relationship.

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: SecurityPolicy
  data:
    # Zone-level policies (macro-segmentation)
    - name: "dc-fabric-baseline"
      description: "Baseline DC fabric policy — zone-to-zone traffic control"
      default_action: "deny"
      enabled: true

    - name: "management-access"
      description: "Management access policy — SSH, SNMP, syslog to infrastructure"
      default_action: "deny"
      enabled: true

    - name: "dmz-ingress"
      description: "DMZ ingress policy — external traffic to DMZ services"
      default_action: "deny"
      enabled: true

    # Segment-level policies (micro-segmentation)
    - name: "3tier-web-to-app"
      description: "Micro-segmentation contract: web tier → application tier"
      default_action: "deny"
      enabled: true

    - name: "3tier-app-to-db"
      description: "Micro-segmentation contract: application tier → database tier"
      default_action: "deny"
      enabled: true

    - name: "tenant-isolation"
      description: "Tenant isolation policy — block inter-tenant traffic"
      default_action: "deny"
      enabled: true

    - name: "guest-restricted"
      description: "Guest network policy — internet only, no internal access"
      default_action: "deny"
      enabled: true
