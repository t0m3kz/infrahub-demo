---
# Per-customer VRF namespaces for multi-tenant VXLAN-EVPN
#
# Each customer gets a dedicated BuiltinIPNamespace (= VRF):
#   - l3_vni: unique L3 VNI for symmetric IRB
#   - owner: customer organization
#   - deployments: DCs where this VRF is active
#
# Convention:
#   - "default" namespace = underlay/infrastructure (no l3_vni, no owner)
#   - Any namespace with l3_vni = active EVPN VRF
#
# Note: `deployments` is a cardinality-many relationship and cannot
# be set via YAML object loader. Use the SDK or UI to link namespaces
# to their target deployments after loading.

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: IpamNamespace
  data:
    # Nordix Ltd. — production VRF
    - name: "C001-PROD"
      description: "Nordix production VRF"
      l3_vni: 50001
      status: "active"
      owner: "Nordix Ltd."

    # Nordix Ltd. — non-production VRF
    - name: "C001-NONPROD"
      description: "CNRD non-production VRF (dev/staging)"
      l3_vni: 50002
      status: "active"
      owner: "Nordix Ltd."

    # CSWM — production VRF
    - name: "C002-PROD"
      description: "SwiftGo production VRF"
      l3_vni: 50003
      status: "active"
      owner: "SwiftGo GmbH"

    # Shared services VRF (DNS, NTP, monitoring — accessible from all tenants)
    - name: "SHARED-SERVICES"
      description: "Shared infrastructure services VRF"
      l3_vni: 50100
      status: "active"
