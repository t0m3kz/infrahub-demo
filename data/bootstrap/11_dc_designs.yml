---
# Data Center Design Templates - Fabric Architecture Principles
# These define the logical network architecture for data center fabrics
# Loaded at bootstrap time, referenced by DC instances at deployment time
#
# Pool prefix lengths are auto-calculated from max_pods (t-shirt sizing):
#   S (<=2 pods):  technical=/21, loopback=/24, management=/26
#   M (<=4 pods):  technical=/19, loopback=/23, management=/25
#   L (<=8 pods):  technical=/18, loopback=/22, management=/24
#   XL (<=16 pods): technical=/17, loopback=/21, management=/23
# P2P addressing: /31 for IPv4, /127 for IPv6 (auto-derived from underlay_protocol)
#
# Naming convention: {SIZE}_{UNDERLAY}_{OVERLAY}
#   size:    S(2 pods), M(4 pods), L(8 pods), XL(16 pods)
#   underlay: EBGP, OSPF
#   overlay:  EBGP, IBGP
#
# naming_convention and overlay_technology live on TopologyDataCenter (per-DC choice),
# not on the design (which defines routing architecture only).

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: TopologyDataCenterDesign
  data:
    # Small Designs (2 pods)
    - name: "S_OSPF_IBGP"
      description: >
        Small DC Design with OSPF underlay and iBGP overlay.
        Up to 2 pods. OSPF provides fast convergence for underlay while iBGP
        distributes EVPN routes via spine route reflectors.
        Typical platforms: Cisco NX-OS, Dell SONiC.
      routing_strategy: "ospf-ibgp"
      underlay_protocol: "ipv4"
      max_pods: 2
      max_super_spines_per_fabric: 2
      max_spines_per_pod: 4

    - name: "S_EBGP_IBGP"
      description: >
        Small DC Design with eBGP underlay and iBGP overlay.
        Up to 2 pods. eBGP handles underlay reachability while iBGP distributes
        EVPN routes via spine route reflectors.
        Typical platforms: Cisco NX-OS, SONiC (FRRouting).
      routing_strategy: "ebgp-ibgp"
      underlay_protocol: "ipv6"
      max_pods: 2
      max_super_spines_per_fabric: 2
      max_spines_per_pod: 4

    - name: "S_EBGP_EBGP"
      description: >
        Small DC Design with eBGP underlay and eBGP overlay (RFC 7938).
        Up to 2 pods. Pure eBGP routing with IPv6 addressing for underlay
        point-to-point links and loopbacks.
        Typical platforms: Arista EOS, Cisco NX-OS.
      routing_strategy: "ebgp-ebgp"
      underlay_protocol: "ipv6"
      max_pods: 2
      max_super_spines_per_fabric: 2
      max_spines_per_pod: 4

    # Medium Designs (4 pods)
    - name: "M_OSPF_IBGP"
      description: >
        Medium DC Design with OSPF underlay and iBGP overlay.
        Up to 4 pods. OSPF provides fast IGP convergence while iBGP distributes
        EVPN routes via route reflectors on super-spines.
        Typical platforms: Cisco NX-OS, Dell SONiC.
      routing_strategy: "ospf-ibgp"
      underlay_protocol: "ipv6"
      max_pods: 4
      max_super_spines_per_fabric: 2
      max_spines_per_pod: 4

    - name: "M_EBGP_EBGP"
      description: >
        Medium DC Design with eBGP underlay and eBGP overlay (RFC 7938).
        Up to 4 pods. Sized for medium pod designs (4 rows, ~72 tors max).
        Typical platforms: Arista EOS, Cisco NX-OS.
      routing_strategy: "ebgp-ebgp"
      underlay_protocol: "ipv6"
      max_pods: 4
      max_super_spines_per_fabric: 2
      max_spines_per_pod: 4

    - name: "M_EBGP_IBGP"
      description: >
        Medium DC Design with eBGP underlay and iBGP overlay.
        Up to 4 pods. eBGP handles underlay reachability while iBGP distributes
        EVPN routes via route reflectors on super-spines.
        Typical platforms: Cisco NX-OS, SONiC (FRRouting).
      routing_strategy: "ebgp-ibgp"
      underlay_protocol: "ipv6"
      max_pods: 4
      max_super_spines_per_fabric: 2
      max_spines_per_pod: 4

    # Large Designs (8 pods)
    - name: "L_EBGP_EBGP"
      description: >
        Large DC Design with eBGP underlay and eBGP overlay (RFC 7938).
        Up to 8 pods. Sized for large pod designs.
        Typical platforms: Arista EOS, Cisco NX-OS.
      routing_strategy: "ebgp-ebgp"
      underlay_protocol: "ipv6"
      max_pods: 8
      max_super_spines_per_fabric: 4
      max_spines_per_pod: 4

    # Extra Large Designs (16 pods)
    - name: "XL_EBGP_EBGP"
      description: >
        Extra Large DC Design with eBGP underlay and eBGP overlay (RFC 7938).
        Up to 16 pods. Sized for hyperscale deployments.
        Typical platforms: Arista EOS, Cisco NX-OS.
      routing_strategy: "ebgp-ebgp"
      underlay_protocol: "ipv6"
      max_pods: 16
      max_super_spines_per_fabric: 4
      max_spines_per_pod: 4
