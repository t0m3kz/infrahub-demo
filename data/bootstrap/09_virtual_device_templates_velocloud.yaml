---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: TemplateDcimVirtualDevice
  data:
    - template_name: VCG-VA_CLOUD
      device_type: VCG-VA
      platform: velocloud
      role: edge
      status: active
      cpu: 4
      memory: 8
      storage: 20
      interfaces:
        kind: TemplateDcimPhysicalInterface
        data:
          - template_name: VCG-VA_CLOUD_eth0
            name: eth0
            role: management
            interface_type: 1000base-t
          - template_name: VCG-VA_CLOUD_eth1
            name: eth1
            role: uplink
            interface_type: 1000base-t
          - template_name: VCG-VA_CLOUD_eth2
            name: eth2
            role: downlink
            interface_type: 1000base-t
      member_of_groups:
        - sdwan_gateways
    - template_name: VCO-VA_ORCHESTRATOR
      device_type: VCO-VA
      platform: velocloud
      role: edge
      status: active
      cpu: 8
      memory: 32
      storage: 100
      interfaces:
        kind: TemplateDcimPhysicalInterface
        data:
          - template_name: VCO-VA_ORCHESTRATOR_eth0
            name: eth0
            role: management
            interface_type: 1000base-t
          - template_name: VCO-VA_ORCHESTRATOR_eth1
            name: eth1
            role: uplink
            interface_type: 1000base-t
      member_of_groups:
        - sdwan_orchestrators
