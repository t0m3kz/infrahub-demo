---
# SGT Pool — globally unique Security Group Tag IDs
# Range 2-65535 (0=unknown, 1=any reserved by Cisco TrustSec)
# Allocated to SecurityTag.group_id

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: CoreNumberPool
  data:
    - name: SGT-POOL
      description: "Global Security Group Tag ID pool — Cisco SGT / Arista security-group"
      node: SecurityTag
      node_attribute: group_id
      start_range: 2
      end_range: 65535
