      description: All border leafs
    - name: spines
      description: All spines
    - name: super-spines
      description: All super spines
    - name: firewalls
      description: All firewalls
    - name: loadbalancers
      description: All load balancers
    - name: loadbalancer_devices
      description: Physical devices running load balancer software
    - name: cloud_loadbalancers
      description: All cloud load balancers (AWS/Azure/GCP)
    - name: oobs
      description: All OOB devices
    - name: consoles
      description: All console devices
    - name: edges
      description: All edge devices
    - name: endpoints
      description: All endpoint devices (servers)
    - name: provisioning_circuits
      description: Provisioning Circuits
    - name: topologies_dc
      description: Data Center
    - name: topologies_pod
      description: Data Center Pod
    - name: topologies_rack
      description: Data Center Rack
