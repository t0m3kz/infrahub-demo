---
# Squid WCCP rules — corp internet traffic
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ServiceProxyRule
  data:
    - index: 10
      name: "squid-bypass-saas-productivity"
      description: "Bypass proxy for sanctioned SaaS — direct internet breakout reduces latency"
      action: bypass
      destination_type: url_category
      destination_value: saas-productivity
      protocol: https
      log: false
      disabled: false
      policy: ["squid-wccp-internet-policy"]
      url_categories: ["saas-productivity"]

    - index: 20
      name: "squid-block-malware"
      description: "Block malware C2 domains"
      action: block
      destination_type: url_category
      destination_value: malware-c2
      protocol: any
      log: true
      disabled: false
      policy: ["squid-wccp-internet-policy"]
      url_categories: ["malware-c2"]

    - index: 30
      name: "squid-block-streaming"
      description: "Block video streaming — bandwidth policy"
      action: block
      destination_type: url_category
      destination_value: streaming-video
      protocol: any
      log: true
      disabled: false
      policy: ["squid-wccp-internet-policy"]
      url_categories: ["streaming-video"]

    - index: 40
      name: "squid-block-social-media"
      description: "Block social media"
      action: block
      destination_type: url_category
      destination_value: social-media
      protocol: any
      log: true
      disabled: false
      policy: ["squid-wccp-internet-policy"]
      url_categories: ["social-media"]

    - index: 100
      name: "squid-forward-internet"
      description: "Forward all remaining HTTP/HTTPS through Squid"
      action: forward
      destination_type: internet
      protocol: any
      log: false
      disabled: false
      policy: ["squid-wccp-internet-policy"]

---
# Squid explicit rules — admin VLAN
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ServiceProxyRule
  data:
    - index: 10
      name: "squid-admin-allow-mgmt-fqdn"
      description: "Allow access to internal management hostnames"
      action: bypass
      destination_type: fqdn
      destination_value: "*.mgmt.corp"
      protocol: https
      log: true
      disabled: false
      policy: ["squid-explicit-admin-policy"]

    - index: 20
      name: "squid-admin-block-cloud-storage"
      description: "Block cloud storage upload from admin VLAN — DLP"
      action: block
      destination_type: url_category
      destination_value: cloud-storage
      protocol: any
      log: true
      disabled: false
      policy: ["squid-explicit-admin-policy"]
      url_categories: ["cloud-storage"]

    - index: 100
      name: "squid-admin-forward-internet"
      description: "Authenticated forward for all remaining admin VLAN traffic"
      action: forward
      destination_type: internet
      protocol: any
      log: true
      disabled: false
      policy: ["squid-explicit-admin-policy"]
