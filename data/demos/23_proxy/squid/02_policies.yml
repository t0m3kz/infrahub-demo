---
# Squid forwarding policies — one per proxy instance
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ServiceProxyPolicy
  data:
    - name: squid-wccp-internet-policy
      description: "Squid WCCP internet policy — corp user subnets intercepted at edge"
      default_action: forward
      enabled: true
      proxy: ["dc1-squid-wccp"]

    - name: squid-explicit-admin-policy
      description: "Squid explicit policy — admin VLAN, authenticated access only"
      default_action: forward
      enabled: true
      proxy: ["dc1-squid-explicit"]
