---
# Zscaler ZIA rules — internet forwarding policy
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ServiceProxyRule
  data:
    - index: 10
      name: "zia-block-malware"
      description: "Block known malware C2 destinations"
      action: block
      destination_type: url_category
      destination_value: malware-c2
      protocol: any
      log: true
      disabled: false
      policy: ["zscaler-zia-internet-policy"]
      url_categories: ["malware-c2"]

    - index: 20
      name: "zia-bypass-saas-productivity"
      description: "Bypass ZIA inspection for sanctioned Microsoft/Google/Slack — reduces latency"
      action: bypass
      destination_type: url_category
      destination_value: saas-productivity
      protocol: https
      log: false
      disabled: false
      policy: ["zscaler-zia-internet-policy"]
      url_categories: ["saas-productivity"]

    - index: 30
      name: "zia-block-social-media"
      description: "Block social media on corporate devices"
      action: block
      destination_type: url_category
      destination_value: social-media
      protocol: any
      log: true
      disabled: false
      policy: ["zscaler-zia-internet-policy"]
      url_categories: ["social-media"]

    - index: 40
      name: "zia-block-streaming"
      description: "Block video streaming on corporate network"
      action: block
      destination_type: url_category
      destination_value: streaming-video
      protocol: any
      log: true
      disabled: false
      policy: ["zscaler-zia-internet-policy"]
      url_categories: ["streaming-video"]

    - index: 100
      name: "zia-forward-internet"
      description: "Forward all remaining internet traffic through ZIA"
      action: forward
      destination_type: internet
      protocol: any
      log: false
      disabled: false
      policy: ["zscaler-zia-internet-policy"]

---
# Zscaler ZPA rules — private app access policy
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ServiceProxyRule
  data:
    - index: 10
      name: "zpa-route-private-apps"
      description: "Send all *.internal.corp and *.apps.corp through ZPA tunnel"
      action: forward
      destination_type: url_category
      destination_value: private-apps-ztna
      protocol: any
      log: true
      disabled: false
      policy: ["zscaler-zpa-private-apps-policy"]
      url_categories: ["private-apps-ztna"]

    - index: 20
      name: "zpa-block-direct-private-fqdn"
      description: "Block any direct access attempt to private FQDNs not routed via ZPA"
      action: block
      destination_type: fqdn
      destination_value: "*.corp"
      protocol: any
      log: true
      disabled: false
      policy: ["zscaler-zpa-private-apps-policy"]
