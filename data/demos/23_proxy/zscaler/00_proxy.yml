---
# Zscaler proxy instances — ZIA and ZPA service heads
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: SaasProxy
  data:
    - name: zscaler-zia
      description: "Zscaler Internet Access — cloud SWG and firewall"
      status: active
      proxy_type: zia
      vendor: zscaler
      cloud_node: zscaler.net
      customer: ["Customer 1"]
      provisioning_key_ref: "vault:secret/zscaler/zia/provisioning_key"
      saas_topology: ["Zscaler"]
      member_of_groups:
        - ["saas_proxies"]

    - name: zscaler-zpa
      description: "Zscaler Private Access — zero-trust app access (ZTNA)"
      status: active
      proxy_type: zpa
      vendor: zscaler
      cloud_node: private.zscaler.com
      customer: ["Customer 1"]
      provisioning_key_ref: "vault:secret/zscaler/zpa/provisioning_key"
      saas_topology: ["Zscaler"]
      member_of_groups:
        - ["saas_proxies"]
