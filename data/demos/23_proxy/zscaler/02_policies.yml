---
# Zscaler forwarding policies — one per service head
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ServiceProxyPolicy
  data:
    - name: zscaler-zia-internet-policy
      description: "ZIA internet forwarding policy — corp users and branch offices"
      default_action: forward
      enabled: true
      proxy: ["zscaler-zia"]
      cloud_zone: ["eu-central-1", "eu-central-1a"]
      backend_pool: ["zscaler-aws-cc-pool"]
      cloud_instances:
        - ["zscaler-aws-cc-01"]

    - name: zscaler-zpa-private-apps-policy
      description: "ZPA policy — route private app traffic through ZPA connector"
      default_action: bypass
      enabled: true
      proxy: ["zscaler-zpa"]
      cloud_zone: ["eu-central-1", "eu-central-1b"]
      backend_pool: ["zscaler-aws-cc-pool"]
      cloud_instances:
        - ["zscaler-aws-ac-01"]
        - ["zscaler-aws-ac-02"]
