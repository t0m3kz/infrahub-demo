---
# Shared URL categories — reused across all proxy vendors
# Load this first; policies and rules reference these by name.
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ServiceProxyURLCategory
  data:
    - name: social-media
      description: "Social media platforms"
      builtin: false
      url_patterns: |
        *.facebook.com
        *.instagram.com
        *.twitter.com
        *.x.com
        *.linkedin.com
        *.tiktok.com
        *.snapchat.com

    - name: streaming-video
      description: "Video streaming services"
      builtin: false
      url_patterns: |
        *.youtube.com
        *.netflix.com
        *.twitch.tv
        *.primevideo.com
        *.disneyplus.com
        *.hulu.com

    - name: malware-c2
      description: "Known malware command-and-control domains"
      builtin: false
      url_patterns: |
        *.malwaredomains.com
        *.phishtank.com

    - name: saas-productivity
      description: "Sanctioned SaaS productivity apps — fast-path bypass"
      builtin: false
      url_patterns: |
        *.office.com
        *.microsoftonline.com
        *.sharepoint.com
        *.teams.microsoft.com
        *.google.com
        *.googleapis.com
        *.slack.com
        *.zoom.us

    - name: cloud-storage
      description: "Cloud storage and file sharing"
      builtin: false
      url_patterns: |
        *.dropbox.com
        *.box.com
        *.onedrive.live.com
        *.drive.google.com

    - name: private-apps-ztna
      description: "Internal applications accessed via ZPA / ZTNA"
      builtin: false
      url_patterns: |
        *.internal.corp
        *.apps.corp
        erp.corp
        hr.corp
        *.dev.corp
