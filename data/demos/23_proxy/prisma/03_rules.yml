---
# Prisma Access rules — internet security policy
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ServiceProxyRule
  data:
    - index: 10
      name: "prisma-block-malware"
      description: "Block malware C2 — Prisma Threat Prevention profile handles inspection"
      action: block
      destination_type: url_category
      destination_value: malware-c2
      protocol: any
      log: true
      disabled: false
      policy: ["prisma-internet-policy"]
      url_categories: ["malware-c2"]

    - index: 20
      name: "prisma-bypass-saas-productivity"
      description: "Direct internet breakout for sanctioned SaaS — optimised via Prisma SD-WAN"
      action: bypass
      destination_type: url_category
      destination_value: saas-productivity
      protocol: https
      log: false
      disabled: false
      policy: ["prisma-internet-policy"]
      url_categories: ["saas-productivity"]

    - index: 30
      name: "prisma-block-social-media"
      description: "Block social media"
      action: block
      destination_type: url_category
      destination_value: social-media
      protocol: any
      log: true
      disabled: false
      policy: ["prisma-internet-policy"]
      url_categories: ["social-media"]

    - index: 40
      name: "prisma-allow-cloud-storage"
      description: "Allow sanctioned cloud storage with SSL inspection"
      action: forward
      destination_type: url_category
      destination_value: cloud-storage
      protocol: https
      log: true
      disabled: false
      policy: ["prisma-internet-policy"]
      url_categories: ["cloud-storage"]

    - index: 100
      name: "prisma-forward-internet"
      description: "Forward all remaining internet traffic via Prisma"
      action: forward
      destination_type: internet
      protocol: any
      log: false
      disabled: false
      policy: ["prisma-internet-policy"]
