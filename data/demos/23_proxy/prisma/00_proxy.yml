---
# Palo Alto Prisma Access — proxy instance
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: SaasProxy
  data:
    - name: prisma-access
      description: "Palo Alto Prisma Access — SASE for remote users and branch offices"
      status: active
      proxy_type: sase
      vendor: palo_alto_prisma
      cloud_node: prismaaccess.com
      customer: ["Customer 2"]
      provisioning_key_ref: "vault:secret/prisma/access/onboarding_key"
      member_of_groups:
        - ["saas_proxies"]
