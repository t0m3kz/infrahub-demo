---
# C003 (Vaultex Inc.) — Application components

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: AppComponent
  data:

    # ── vault-core / production ───────────────────────────────────────────────

    - name: vault-api
      component_type: backend
      backend_port: 8200
      parent: c003-vault-core-p
      capabilities:
        - C003-VAULT-VM-01
        - C003-VAULT-VM-02
      cluster_capabilities:
        - DC3-VSPHERE-PROD
      network_segment: c003-vault-core-p
      proxy_service: DC3-PRX-HA
      vip_service:
        - c003-vault-api.dc3.internal
        - https
        - "8200"
      member_of_groups:
        - app_components

    - name: vault-db
      component_type: database
      backend_port: 5432
      parent: c003-vault-core-p
      capabilities:
        - C003-VAULT-DB-VM-01
      cluster_capabilities:
        - DC3-VSPHERE-PROD
      network_segment: c003-database-p
      vip_service:
        - c003-vault-db.dc3.internal
        - tcp
        - "5432"
      member_of_groups:
        - app_components

    # ── compliance-portal / production ────────────────────────────────────────

    - name: audit-dashboard
      component_type: frontend
      backend_port: 443
      parent: c003-compliance-portal-p
      capabilities:
        - C003-COMP-WEB-VM-01
      cluster_capabilities:
        - DC3-NUTANIX-PROD
      network_segment: c003-dmz-p
      proxy_service: DC3-PRX-HA
      vip_service:
        - c003-comp-web.dc3.internal
        - https
        - "443"
      member_of_groups:
        - app_components

    - name: policy-engine
      component_type: backend
      backend_port: 8443
      parent: c003-compliance-portal-p
      capabilities:
        - C003-COMP-APP-VM-01
      cluster_capabilities:
        - DC3-NUTANIX-PROD
      network_segment: c003-app-backend-p
      proxy_service: DC3-PRX-HA
      vip_service:
        - c003-comp-api.dc3.internal
        - https
        - "8443"
      member_of_groups:
        - app_components

    - name: audit-db
      component_type: database
      backend_port: 5432
      parent: c003-compliance-portal-p
      capabilities:
        - C003-COMP-DB-VM-01
      cluster_capabilities:
        - DC3-NUTANIX-PROD
      network_segment: c003-database-p
      vip_service:
        - c003-comp-db.dc3.internal
        - tcp
        - "5432"
      member_of_groups:
        - app_components
