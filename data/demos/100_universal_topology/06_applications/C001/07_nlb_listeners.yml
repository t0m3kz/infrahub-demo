---
# Health check: TCP, 2 successes to go UP, 3 failures to go DOWN, 5s timeout
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: LoadbalancerHealthCheck
  data:
    - check: tcp
      rise: 2
      fall: 3
      timeout: 5000

---
# VIP listeners on C001-NLB-APP-EU-CENTRAL-1
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: LoadbalancerVIP
  data:
    - hostname: cnrd-nlb-app.example.com
      protocol: tcp
      port: 443
      status: active
      description: "TCP:443 listener — TLS passthrough to application tier"
      load_balancer: C001-NLB-APP-EU-CENTRAL-1
      load_balancing_algorithm: round_robin
      session_persistence: none
      health_checks:
        - - tcp
          - "2"
          - "3"
          - "5000"

    - hostname: cnrd-nlb-app.example.com
      protocol: tcp
      port: 80
      status: active
      description: "TCP:80 listener — plain HTTP to application tier"
      load_balancer: C001-NLB-APP-EU-CENTRAL-1
      load_balancing_algorithm: round_robin
      session_persistence: none
      health_checks:
        - - tcp
          - "2"
          - "3"
          - "5000"

---
# NLB target groups modelled as AppComponents under the nlb-app application.
# Each component declares its VIP, LB config, health check, and compute members.
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: AppComponent
  data:
    - name: tcp-443-targets
      component_type: backend
      description: "TLS passthrough targets — all 4 EKS app instances"
      parent: c001-nlb-app-p
      vip_service:
        - cnrd-nlb-app.example.com
        - tcp
        - "443"
      cluster_capabilities:
        - C001-EKS-EU-CENTRAL-1

    - name: tcp-80-targets
      component_type: backend
      description: "Plain TCP targets — all 4 EKS app instances"
      parent: c001-nlb-app-p
      vip_service:
        - cnrd-nlb-app.example.com
        - tcp
        - "80"
      cluster_capabilities:
        - C001-EKS-EU-CENTRAL-1
