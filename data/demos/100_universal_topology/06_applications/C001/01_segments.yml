            name: bond0
            lag_id: 1

    - customer_name: "database"
      environment: "n"
      owner: "C001"
      security_tag: database
      arp_suppression: true
      prefix:
        - - "10.1.130.0/24"
          - "C001-NONPROD"
      gateway:
        - "10.1.130.1/24"
        - "C001-NONPROD"
      deployments:
        - DC1
      member_of_groups:
        - vxlan_segments
      interface_capabilities:
        - kind: DcimLAGInterface
          data:
            device: DC1-POD1-SRV-ASS-01
            name: bond0
            lag_id: 1
