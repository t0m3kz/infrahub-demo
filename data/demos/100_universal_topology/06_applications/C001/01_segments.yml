          data:
            device: DC1-POD1-SRV-02
            name: bond0
            lag_id: 1
        - kind: DcimLAGInterface
          data:
            device: DC2-POD1-SRV-02
            name: bond0
            lag_id: 1

    # ── Non-production (DC1 only) ─────────────────────────────────────────────

    - customer_name: "web-frontend"
      environment: "n"
      owner: "C001"
      security_tag: web-tier
      arp_suppression: true
      prefix:
        - - "10.1.110.0/24"
          - "C001-NONPROD"
      gateway:
        - "10.1.110.1/24"
        - "C001-NONPROD"
      deployments:
        - DC1
      member_of_groups:
        - vxlan_segments
      interface_capabilities:
        - kind: DcimLAGInterface
          data:
            device: DC1-POD1-SRV-02
            name: bond0
            lag_id: 1
        - kind: DcimLAGInterface
          data:
            device: DC1-POD1-SRV-ASS-01
            name: bond0
            lag_id: 1

    - customer_name: "app-backend"
      environment: "n"
      owner: "C001"
      security_tag: app-tier
      arp_suppression: true
      prefix:
        - - "10.1.120.0/24"
          - "C001-NONPROD"
      gateway:
        - "10.1.120.1/24"
        - "C001-NONPROD"
      deployments:
        - DC1
      member_of_groups:
        - vxlan_segments
      interface_capabilities:
