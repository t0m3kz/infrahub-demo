---
# AWS eu-central-1: Internet Gateway
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: CloudInternetGateway
  data:
    - name: CNRD-IGW-EU-CENTRAL-1
      account: C001-AWS
      virtual_network: C001-VPC-EU-CENTRAL-1

---
# AWS eu-central-1: NAT Gateway (placed in lb-1a public subnet, serves private app subnets)
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: CloudNATGateway
  data:
    - name: CNRD-NATGW-EU-CENTRAL-1A
      account: C001-AWS
      virtual_network: C001-VPC-EU-CENTRAL-1
      public_ip: "52.28.10.1"
      network_segments:
        - c001-app-1a-p
        - c001-app-1b-p

---
# AWS eu-central-1: Route Tables
#
# private-rt  — app subnets: 10.0.0.0/8 via TGW (on-prem via DX), 0.0.0.0/0 via NAT
# public-rt   — lb subnets:  0.0.0.0/0 via IGW
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: CloudRouteTable
  data:
    - name: CNRD-RT-PRIVATE-EU-CENTRAL-1
      virtual_network: C001-VPC-EU-CENTRAL-1
      is_main: false
      network_segments:
        - c001-app-1a-p
        - c001-app-1b-p

    - name: CNRD-RT-PUBLIC-EU-CENTRAL-1
      virtual_network: C001-VPC-EU-CENTRAL-1
      is_main: false
      network_segments:
        - c001-lb-1a-p
        - c001-lb-1b-p

---
# AWS eu-central-1: Routes
#
# Private subnet routes:
#   10.0.0.0/8  → Transit Gateway (on-prem via Direct Connect; TGW is the next-hop)
#   0.0.0.0/0   → NAT Gateway (internet egress for private instances)
#
# Public subnet routes:
#   0.0.0.0/0   → Internet Gateway
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: CloudRoute
  data:
    # Private: on-prem aggregate via Transit Gateway (Direct Connect attachment)
    - name: CNRD-ROUTE-PRIVATE-ONPREM
      route_table: CNRD-RT-PRIVATE-EU-CENTRAL-1
      destination:
        - "10.0.0.0/8"
        - "C001-AWS-EU-CENTRAL-1"

    # Private: internet egress via NAT Gateway
    - name: CNRD-ROUTE-PRIVATE-DEFAULT
      route_table: CNRD-RT-PRIVATE-EU-CENTRAL-1
      destination:
        - "0.0.0.0/0"
        - "C001-AWS-EU-CENTRAL-1"
      nat_gateway: CNRD-NATGW-EU-CENTRAL-1A

    # Public: internet via Internet Gateway
    - name: CNRD-ROUTE-PUBLIC-DEFAULT
      route_table: CNRD-RT-PUBLIC-EU-CENTRAL-1
      destination:
        - "0.0.0.0/0"
        - "C001-AWS-EU-CENTRAL-1"
      internet_gateway: CNRD-IGW-EU-CENTRAL-1
