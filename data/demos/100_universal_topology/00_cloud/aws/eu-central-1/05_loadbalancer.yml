---
# AWS eu-central-1: NLB spread across both AZs via LB subnets
# Subnet refs use computed names: c001-{customer_name}-p
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: CloudLoadBalancer
  data:
    - name: C001-NLB-APP-EU-CENTRAL-1
      status: active
      member_of_groups:
        - cloud_loadbalancers
      description: "CNRD NLB serving application tier across eu-central-1a/1b"  # yamllint disable-line rule:line-length
      lb_type: l4_cloud
      lb_vendor: aws_nlb
      scheme: internet_facing
      cloud_id: "arn:aws:elasticloadbalancing:eu-central-1:123456789012:loadbalancer/net/cnrd-nlb-app/abcdef1234567890"  # yamllint disable-line rule:line-length
      virtual_network: C001-VPC-EU-CENTRAL-1
      network_segments:
        - c001-lb-1a-p
        - c001-lb-1b-p
