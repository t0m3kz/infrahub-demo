# AWS eu-central-1: EKS cluster + application tier ASG
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtCluster
  data:
    - name: C001-EKS-EU-CENTRAL-1
      platform: eks
      version: "1.31"
      status: active
      ha_enabled: true
      deployment: eu-central-1
      cloud_account: C001-AWS

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtNodePool
  data:
    - name: C001-ASG-APP-EU-CENTRAL-1
      cluster: C001-EKS-EU-CENTRAL-1
      pool_type: worker
      scaling_mode: autoscaling
      status: active
      min_size: 2
      max_size: 10
      desired_capacity: 4
      instance_flavor: t3.medium
      cpu_per_node: 2
      memory_per_node_gb: 4
      storage_per_node_gb: 30
      image: ami-0c55b159cbfafe1f0
      os_type: linux
      network_segments:
        - c001-app-1a-p
        - c001-app-1b-p

# ── C001-EKS-EU-CENTRAL-1 capabilities ──────────────────────────────────────

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtCNI
  data:
    - name: C001-EKS-EU-CENTRAL-1-CNI
      status: active
      plugin: vpc_cni
      version: "1.18.3"
      pod_cidr: "10.0.0.0/16"
      encapsulation: none
      bgp_enabled: false
      cluster_capabilities:
        - C001-EKS-EU-CENTRAL-1

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtStorageBackend
  data:
    - name: C001-EKS-EU-CENTRAL-1-STORAGE
      status: active
      backend_type: cinder
      version: "EBS CSI 1.35.0"
      default_class: true
      reclaim_policy: delete
      cluster_capabilities:
        - C001-EKS-EU-CENTRAL-1

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtIngress
  data:
    - name: C001-EKS-EU-CENTRAL-1-INGRESS
      status: active
      controller: aws_alb
      version: "2.8.3"
      cluster_capabilities:
        - C001-EKS-EU-CENTRAL-1

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtRegistry
  data:
    - name: C001-EKS-EU-CENTRAL-1-REGISTRY
      status: active
      registry_type: ecr
      endpoint: "123456789012.dkr.ecr.eu-central-1.amazonaws.com"
      insecure: false
      cluster_capabilities:
        - C001-EKS-EU-CENTRAL-1

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtManagementPlane
  data:
    - name: C001-EKS-EU-CENTRAL-1-MGMT
      status: active
      endpoint: "https://ABCDEF1234567890.gr7.eu-central-1.eks.amazonaws.com"
      endpoint_access: private
      port: 443
      auth_method: x509
      cluster_capabilities:
        - C001-EKS-EU-CENTRAL-1

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtMonitoring
  data:
    - name: C001-EKS-EU-CENTRAL-1-MONITORING
      status: active
      stack: prometheus_grafana
      version: "kube-prometheus-stack 65.1.0"
      retention_days: 15
      remote_write: "https://aps-workspaces.eu-central-1.amazonaws.com/workspaces/ws-abc123/api/v1/remote_write"  # yamllint disable-line rule:line-length
      cluster_capabilities:
        - C001-EKS-EU-CENTRAL-1
