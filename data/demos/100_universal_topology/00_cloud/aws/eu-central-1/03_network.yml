---
# AWS eu-central-1: VPC
# cidr_blocks references IpamPrefix in C001-AWS-EU-CENTRAL-1 namespace (see 00_i
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: CloudVirtualNetwork
  data:
    - name: C001-VPC-EU-CENTRAL-1
      account: C001-AWS
      region: eu-central-1
      is_default: false
      dns_support: true
      dns_hostnames: true
      cidr_blocks:
        - - "172.16.0.0/16"
          - "C001-AWS-EU-CENTRAL-1"

---
# AWS eu-central-1: subnets
# name is computed: {{owner__org_id__value|lower}}-{{customer_name}}-{{environment}}
# app-1a  → c001-app-1a-p    172.16.10.0/24 (private)
# app-1b  → c001-app-1b-p    172.16.20.0/24 (private)
# lb-1a   → c001-lb-1a-p     172.16.100.0/24 (public)
# lb-1b   → c001-lb-1b-p     172.16.110.0/24 (public)
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: CloudNetworkSegment
  data:
    - customer_name: app-1a
      owner: "C001"
      environment: p
      segment_type: aws_vpc_subnet
      segment_role: server_application
      status: active
      is_public: false
      auto_assign_public_ip: false
      virtual_network: C001-VPC-EU-CENTRAL-1
      availability_zone: ["eu-central-1", "eu-central-1a"]
      cidr_block:
        - "172.16.10.0/24"
        - "C001-AWS-EU-CENTRAL-1"

    - customer_name: app-1b
      owner: "C001"
      environment: p
      segment_type: aws_vpc_subnet
      segment_role: server_application
      status: active
      is_public: false
      auto_assign_public_ip: false
      virtual_network: C001-VPC-EU-CENTRAL-1
      availability_zone: ["eu-central-1", "eu-central-1b"]
      cidr_block:
        - "172.16.20.0/24"
        - "C001-AWS-EU-CENTRAL-1"

    - customer_name: lb-1a
      owner: "C001"
      environment: p
      segment_type: aws_vpc_subnet
      segment_role: dmz
      status: active
      is_public: true
      auto_assign_public_ip: false
      virtual_network: C001-VPC-EU-CENTRAL-1
      availability_zone: ["eu-central-1", "eu-central-1a"]
      cidr_block:
        - "172.16.100.0/24"
        - "C001-AWS-EU-CENTRAL-1"

    - customer_name: lb-1b
      owner: "C001"
      environment: p
      segment_type: aws_vpc_subnet
      segment_role: dmz
      status: active
      is_public: true
      auto_assign_public_ip: false
      virtual_network: C001-VPC-EU-CENTRAL-1
      availability_zone: ["eu-central-1", "eu-central-1b"]
      cidr_block:
        - "172.16.110.0/24"
        - "C001-AWS-EU-CENTRAL-1"

---
# AWS eu-central-1: Transit Gateway
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: CloudTransitGateway
  data:
    - name: C001-TGW-EU-CENTRAL-1
      account: C001-AWS
      region: eu-central-1
      default_route_table: true
      dns_support: true
      vpn_ecmp_support: true
      attached_virtual_networks:
        - C001-VPC-EU-CENTRAL-1
