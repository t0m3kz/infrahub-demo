---
# Azure westeurope: Route Table for AKS node pool subnets
#
# On-prem traffic (10.0.0.0/8) is advertised by the ExpressRoute Gateway
# via BGP and captured here as a static route entry for model completeness.
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: CloudRouteTable
  data:
    - name: CNRD-RT-AKS-WESTEUROPE
      virtual_network: C001-VNET-WESTEUROPE
      is_main: false
      network_segments:
        - c001-aks-zone1-p
        - c001-aks-zone2-p

---
# Azure westeurope: Routes
#
# On-prem aggregate via ExpressRoute Gateway
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: CloudRoute
  data:
    - name: CNRD-ROUTE-AKS-ONPREM
      route_table: CNRD-RT-AKS-WESTEUROPE
      destination:
        - "10.0.0.0/8"
        - "CNRD-AZURE-WESTEUROPE"
