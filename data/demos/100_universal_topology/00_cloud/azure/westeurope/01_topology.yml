---
# Azure westeurope region + availability zones (1, 2)
# westeurope maps to Amsterdam metro (Equinix AM presence)
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: TopologyCloud
  data:
    - name: Azure
      children:
        kind: TopologyCloudRegion
        data:
          - name: westeurope
            status: active
            location: ams
            children:
              kind: TopologyCloudZone
              data:
                - name: westeurope-1
                - name: westeurope-2
