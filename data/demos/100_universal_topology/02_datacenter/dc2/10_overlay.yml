---
# DC2 overlay — iBGP EVPN (AS 65002, L2VPN EVPN AF)
#
# Border-leafs (BL1/BL2) act as EVPN route reflectors.
# All spines and leaves are iBGP EVPN clients toward SS1 and SS2.
# iBGP sessions source from Loopback0 (reachable via OSPF underlay).

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ManagedBGP
  data:
    - name: DC2-BL1-BGP-EVPN
      status: active
      description: "iBGP EVPN process — DC2 border-leaf BL1 (route reflector)"
      multipath: true
      capabilities:
        - DC2-BL1
      router_id:
        - "10.255.12.51/32"
        - FABRIC-DC2
      local_as: "AS65002"
      address_families:
        - - l2vpn
          - evpn

    - name: DC2-BL2-BGP-EVPN
      status: active
      description: "iBGP EVPN process — DC2 border-leaf BL2 (route reflector)"
      multipath: true
      capabilities:
        - DC2-BL2
      router_id:
        - "10.255.12.52/32"
        - FABRIC-DC2
      local_as: "AS65002"
      address_families:
        - - l2vpn
          - evpn

    - name: DC2-POD1-SP1-BGP-EVPN
