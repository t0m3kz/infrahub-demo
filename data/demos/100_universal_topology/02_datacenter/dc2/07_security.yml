---
# DC2 Security — active-active PA-5260 firewall pair (BL → FW)
#
# DC2-FW-01 (active) and DC2-FW-02 (standby) are Palo Alto PA-5260 firewalls.
# Each FW connects to one BL (inside + outside/return) for PBR steering.
# HA sync back-to-back between FW-01 and FW-02.
#
# Port mapping:
#   DC2-FW-01:
#     ethernet1/1  inside  ← DC2-BL1:Ethernet1/5
#     ethernet1/2  outside → DC2-BL1:Ethernet1/6
#     ethernet1/3  HA sync ↔ DC2-FW-02:ethernet1/3
#   DC2-FW-02:
#     ethernet1/1  inside  ← DC2-BL2:Ethernet1/5
#     ethernet1/2  outside → DC2-BL2:Ethernet1/6
#     ethernet1/3  HA sync ↔ DC2-FW-01:ethernet1/3

# ── Physical firewall pair ────────────────────────────────────────────────────
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: DcimPhysicalDevice
  data:
    - name: DC2-FW-01
      object_template: PA-5260_FIREWALL
      role: firewall-active
      status: active
      deployment: DC2
      rack: dc2-s1-r-1
      member_of_groups:
        - firewalls
      interfaces:
        kind: DcimPhysicalInterface
        data:
          - name: ethernet1/1
            interface_type: 10gbase-x-sfpp
            role: uplink
            status: active
            description: "Inside — DC2-BL1:Ethernet1/5"
          - name: ethernet1/2
            interface_type: 10gbase-x-sfpp
            role: uplink
            status: active
            description: "Outside/return — DC2-BL1:Ethernet1/6"
          - name: ethernet1/3
            interface_type: 10gbase-x-sfpp
            role: management
            status: active
            description: "HA sync — back-to-back with DC2-FW-02"

    - name: DC2-FW-02
      object_template: PA-5260_FIREWALL
      role: firewall-passive
      status: active
      deployment: DC2
      rack: dc2-s1-r-2
      member_of_groups:
        - firewalls
      interfaces:
        kind: DcimPhysicalInterface
        data:
          - name: ethernet1/1
            interface_type: 10gbase-x-sfpp
            role: uplink
            status: active
            description: "Inside — DC2-BL2:Ethernet1/5"
          - name: ethernet1/2
            interface_type: 10gbase-x-sfpp
            role: uplink
            status: active
            description: "Outside/return — DC2-BL2:Ethernet1/6"
          - name: ethernet1/3
            interface_type: 10gbase-x-sfpp
            role: management
            status: active
            description: "HA sync — back-to-back with DC2-FW-01"

# ── HA domain ─────────────────────────────────────────────────────────────────
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ManagedFirewallHA
  data:
    - name: DC2-FW-HA
      group_id: 1
      mode: active-passive
      priority: 100
      preempt: false
      ha_timer: aggressive
      capabilities:
        - DC2-FW-01
        - DC2-FW-02

# ── Cables — BL → FW pair + HA sync ──────────────────────────────────────────
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: DcimCable
  data:
    # ── BL1 → DC2-FW-01 ──────────────────────────────────────────────────────────
    - name: CBL-DC2-BL1-FW01-INSIDE
      type: smf
      deployment: DC2
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC2-BL1
            name: Ethernet1/5
        - kind: DcimPhysicalInterface
          data:
            device: DC2-FW-01
            name: ethernet1/1

    - name: CBL-DC2-BL1-FW01-OUTSIDE
      type: smf
      deployment: DC2
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC2-BL1
            name: Ethernet1/6
        - kind: DcimPhysicalInterface
          data:
            device: DC2-FW-01
            name: ethernet1/2

    # ── BL2 → DC2-FW-02 ──────────────────────────────────────────────────────────
    - name: CBL-DC2-BL2-FW02-INSIDE
      type: smf
      deployment: DC2
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC2-BL2
            name: Ethernet1/5
        - kind: DcimPhysicalInterface
          data:
            device: DC2-FW-02
            name: ethernet1/1

    - name: CBL-DC2-BL2-FW02-OUTSIDE
      type: smf
      deployment: DC2
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC2-BL2
            name: Ethernet1/6
        - kind: DcimPhysicalInterface
          data:
            device: DC2-FW-02
            name: ethernet1/2

    # ── HA sync — back-to-back ────────────────────────────────────────────────
    - name: CBL-DC2-FW01-FW02-HA-SYNC
      type: smf
      deployment: DC2
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC2-FW-01
            name: ethernet1/3
        - kind: DcimPhysicalInterface
          data:
            device: DC2-FW-02
            name: ethernet1/3

# ── Security Zones ────────────────────────────────────────────────────────────
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: SecurityZone
  data:
    - name: DC2-PROD-ZONE
      description: "DC2 production workload zone — customer tenant segments"
      trust_level: 70
      zone_type: internal

    - name: DC2-MGMT-ZONE
      description: "DC2 management zone — infrastructure control plane"
      trust_level: 90
      zone_type: management

    - name: DC2-UNTRUSTED-ZONE
      description: "DC2 untrusted zone — internet-facing and external traffic"
      trust_level: 10
      zone_type: external

# ── Security Policies ─────────────────────────────────────────────────────────
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: SecurityPolicy
  data:
    - name: DC2-FABRIC-POLICY
      description: "DC2 fabric policy — active-active FW pair inspection"
      default_action: deny
      enabled: true
      capabilities:
        - DC2-FW-01
        - DC2-FW-02

# ── Firewall association on segments ──────────────────────────────────────────
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ManagedVxlanSegment
  data:
    - customer_name: "web-frontend"
      environment: "p"
      owner: "C001"
      inline_service: DC2-FW-HA
      pbr_enabled: false

    - customer_name: "app-backend"
      environment: "p"
      owner: "C001"
      inline_service: DC2-FW-HA
      pbr_enabled: false

    - customer_name: "web-frontend"
      environment: "p"
      owner: "C002"
      inline_service: DC2-FW-HA
      pbr_enabled: false

    - customer_name: "app-backend"
      environment: "p"
      owner: "C002"
      inline_service: DC2-FW-HA
      pbr_enabled: false

# ── Security Policy Rules ─────────────────────────────────────────────────────
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: SecurityPolicyRule
  data:
    - index: 10
      name: dc2-permit-https-inbound
      description: "Allow HTTPS from untrusted to production"
      action: permit
      protocol: tcp
      port_start: 443
      log: true
      policy: DC2-FABRIC-POLICY
      source_zone: DC2-UNTRUSTED-ZONE
      destination_zone: DC2-PROD-ZONE

    - index: 20
      name: dc2-permit-ssh-mgmt
      description: "Allow SSH from management to production"
      action: permit
      protocol: tcp
      port_start: 22
      log: true
      policy: DC2-FABRIC-POLICY
      source_zone: DC2-MGMT-ZONE
      destination_zone: DC2-PROD-ZONE

    - index: 30
      name: dc2-permit-intra-tenant
      description: "Allow east-west within same production zone"
      action: permit
      protocol: any
      log: false
      policy: DC2-FABRIC-POLICY
      source_zone: DC2-PROD-ZONE
      destination_zone: DC2-PROD-ZONE

    - index: 999
      name: dc2-deny-all
      description: "Default deny — log all unmatched traffic"
      action: deny
      protocol: any
      log: true
      policy: DC2-FABRIC-POLICY
      source_zone: DC2-UNTRUSTED-ZONE
      destination_zone: DC2-PROD-ZONE
