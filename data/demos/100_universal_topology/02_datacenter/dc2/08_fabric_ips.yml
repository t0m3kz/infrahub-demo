---
# DC2 fabric P2P IP addresses on physical interfaces (OSPF numbered links)
#
# All /31 pairs from 10.255.22.0/24 (FABRIC-DC2 namespace).
# Convention: lower address = spine/BL side, higher address = spine/leaf side.
#
# Spine ↔ Leaf links (Ethernet1/11–14 on SP1, Ethernet1/21–24 on SP2):
#   POD1-SP1↔L1: 10.255.22.16/31   POD1-SP2↔L1: 10.255.22.18/31
#   POD1-SP1↔L2: 10.255.22.20/31   POD1-SP2↔L2: 10.255.22.22/31
#   POD1-SP1↔L3: 10.255.22.24/31   POD1-SP2↔L3: 10.255.22.26/31
#   POD1-SP1↔L4: 10.255.22.28/31   POD1-SP2↔L4: 10.255.22.30/31
#   POD2-SP1↔L1: 10.255.22.32/31   POD2-SP2↔L1: 10.255.22.34/31
#   POD2-SP1↔L2: 10.255.22.36/31   POD2-SP2↔L2: 10.255.22.38/31
#   POD2-SP1↔L3: 10.255.22.40/31   POD2-SP2↔L3: 10.255.22.42/31
#   POD2-SP1↔L4: 10.255.22.44/31   POD2-SP2↔L4: 10.255.22.46/31
#
# Inter-pod spine full-mesh (Ethernet1/3–4 on spines):
#   POD1-SP1:Eth1/3 ↔ POD2-SP1:Eth1/3 → 10.255.22.48/31
#   POD1-SP1:Eth1/4 ↔ POD2-SP2:Eth1/3 → 10.255.22.50/31
#   POD1-SP2:Eth1/3 ↔ POD2-SP1:Eth1/4 → 10.255.22.52/31
#   POD1-SP2:Eth1/4 ↔ POD2-SP2:Eth1/4 → 10.255.22.54/31
#
# BL ↔ Spine links (Ethernet1/1–4 on BLs, Ethernet1/5–6 on spines):
#   BL1:Eth1/1 ↔ POD1-SP1:Eth1/5 → 10.255.22.56/31
#   BL1:Eth1/2 ↔ POD1-SP2:Eth1/5 → 10.255.22.58/31
#   BL1:Eth1/3 ↔ POD2-SP1:Eth1/5 → 10.255.22.60/31
#   BL1:Eth1/4 ↔ POD2-SP2:Eth1/5 → 10.255.22.62/31
#   BL2:Eth1/1 ↔ POD1-SP1:Eth1/6 → 10.255.22.64/31
#   BL2:Eth1/2 ↔ POD1-SP2:Eth1/6 → 10.255.22.66/31
#   BL2:Eth1/3 ↔ POD2-SP1:Eth1/6 → 10.255.22.68/31
#   BL2:Eth1/4 ↔ POD2-SP2:Eth1/6 → 10.255.22.70/31

# ── POD1-SP1 interfaces ───────────────────────────────────────────────────────
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: DcimPhysicalInterface
  data:
    # Inter-pod full-mesh uplinks
    - name: Ethernet1/3
      device: DC2-POD1-SP1
      ip_address:
        data:
          address: "10.255.22.48/31"
          ip_namespace: FABRIC-DC2

    - name: Ethernet1/4
      device: DC2-POD1-SP1
      ip_address:
        data:
          address: "10.255.22.50/31"
          ip_namespace: FABRIC-DC2

    # BL uplinks
    - name: Ethernet1/5
      device: DC2-POD1-SP1
      ip_address:
        data:
          address: "10.255.22.57/31"
          ip_namespace: FABRIC-DC2

    - name: Ethernet1/6
      device: DC2-POD1-SP1
      ip_address:
        data:
          address: "10.255.22.65/31"
          ip_namespace: FABRIC-DC2

    # Downlinks to leaves
    - name: Ethernet1/11
      device: DC2-POD1-SP1
      ip_address:
        data:
          address: "10.255.22.16/31"
          ip_namespace: FABRIC-DC2

    - name: Ethernet1/12
      device: DC2-POD1-SP1
      ip_address:
        data:
          address: "10.255.22.20/31"
          ip_namespace: FABRIC-DC2

    - name: Ethernet1/13
      device: DC2-POD1-SP1
      ip_address:
        data:
          address: "10.255.22.24/31"
          ip_namespace: FABRIC-DC2

    - name: Ethernet1/14
      device: DC2-POD1-SP1
      ip_address:
        data:
          address: "10.255.22.28/31"
          ip_namespace: FABRIC-DC2

