---
# Data center DC2 topology with pods
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: TopologyDataCenter
  data:
    - name: DC2
      index: 2
      vlan_pool: DC2-VLAN-POOL
      member_of_groups:
        - topologies_dc
      vni_pool: DC2-VNI-POOL
      l3_vni_pool: GLOBAL-L3VNI
      children:
        kind: TopologyPod
        data:
          - index: 1
            spine_template: N9K-C9336C-FX2_SPINE
          - index: 2
            spine_template: N9K-C9336C-FX2_SPINE
