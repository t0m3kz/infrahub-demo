---
# DC2 infrastructure: spines, border-leaves, leaves, servers
# Underlay: OSPF (area 0, point-to-point, numbered /31 links from 10.255.22.0/24)
# Overlay:  iBGP EVPN (L2VPN-EVPN AF, BL1/BL2 act as EVPN route-reflectors)
# Loopbacks: 10.255.12.0/24 (FABRIC-DC2 namespace)
# P2P links: 10.255.22.0/24 (FABRIC-DC2 namespace)
# Architecture: full-mesh spine inter-pod routing, no super-spines
#
# P2P addressing plan (all /31, .x0/.x1 = spine-side/leaf-side):
#   POD1-SP1↔L1: 10.255.22.16/31    POD1-SP2↔L1: 10.255.22.18/31
#   POD1-SP1↔L2: 10.255.22.20/31    POD1-SP2↔L2: 10.255.22.22/31
#   POD1-SP1↔L3: 10.255.22.24/31    POD1-SP2↔L3: 10.255.22.26/31
#   POD1-SP1↔L4: 10.255.22.28/31    POD1-SP2↔L4: 10.255.22.30/31
#   POD2-SP1↔L1: 10.255.22.32/31    POD2-SP2↔L1: 10.255.22.34/31
#   POD2-SP1↔L2: 10.255.22.36/31    POD2-SP2↔L2: 10.255.22.38/31
#   POD2-SP1↔L3: 10.255.22.40/31    POD2-SP2↔L3: 10.255.22.42/31
#   POD2-SP1↔L4: 10.255.22.44/31    POD2-SP2↔L4: 10.255.22.46/31
#   POD1-SP1↔POD2-SP1 (Eth1/3): 10.255.22.48/31
#   POD1-SP1↔POD2-SP2 (Eth1/3): 10.255.22.50/31
#   POD1-SP2↔POD2-SP1 (Eth1/3): 10.255.22.52/31
#   POD1-SP2↔POD2-SP2 (Eth1/3): 10.255.22.54/31
#   BL1 uplinks Eth1/1-4: 10.255.22.56/31  10.255.22.58/31  10.255.22.60/31  10.255.22.62/31
#   BL2 uplinks Eth1/1-4: 10.255.22.64/31  10.255.22.66/31  10.255.22.68/31  10.255.22.70/31
apiVersion: infrahub.app/v1
kind: Object
