  kind: DcimPhysicalDevice
  data:
    - name: DC2-POD1-SP1
      object_template: N9K-C9336C-FX2_SPINE
      status: active
      deployment: DC2-2-POD-1
      rack: dc2-s1-r-1
      member_of_groups:
        - spines
      interfaces:
        kind: DcimVirtualInterface
        data:
          - name: Loopback0
            role: loopback
            status: active
            description: "Router-ID / OSPF source"
            ip_address:
              data:
                address: "10.255.12.11/32"
                ip_namespace: FABRIC-DC2

