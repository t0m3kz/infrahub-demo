---
# DC2 routing peerings
#
# Underlay: OSPF area 0, point-to-point on numbered /31 links.
# Overlay:  iBGP EVPN, loopback-based. BL1/BL2 are route reflectors.

# ── OSPF area 0 ──────────────────────────────────────────────────────────────
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: RoutingOSPFArea
  data:
    - name: "DC2-AREA-0"
      area: 0
      area_type: standard
      description: "DC2 OSPF backbone area"

