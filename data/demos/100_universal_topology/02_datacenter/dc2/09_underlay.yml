---
# DC2 underlay — OSPF (area 0, point-to-point, numbered /31 links)
#
# All devices run OSPF process 1 in area 0 (backbone).
# BL1/BL2 act as EVPN route-reflectors and are the aggregation points for the fabric.
# Fabric interfaces have numbered /31 IPs from 10.255.22.0/24 (see 08_fabric_ips.yml).
# Router-ID sourced from Loopback0 (10.255.12.x/32).
# reference-bandwidth 100000 (100Gbps) for consistent metric calculation.

# ── DC2 overlay AS ────────────────────────────────────────────────────────────
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: RoutingAutonomousSystem
  data:
    - asn: 65002
      description: "DC2 fabric AS — iBGP EVPN overlay (underlay via OSPF)"

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ManagedOSPF
  data:
    - name: DC2-BL1-OSPF
      status: active
      description: "OSPF process — DC2 border-leaf BL1 (EVPN RR)"
      process_id: "1"
      version: ospf
      router_type: internal
      reference_bandwidth: 100000
      capabilities:
        - DC2-BL1
      router_id:
        - "10.255.12.51/32"
        - FABRIC-DC2

    - name: DC2-BL2-OSPF
