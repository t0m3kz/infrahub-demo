---
# DC1 underlay — iBGP (AS 65001, RFC 5549 unnumbered, IPv6 link-local)
#
# All devices run iBGP in AS 65001.
# Fabric interfaces use IPv6 link-local only (no P2P IPs needed).
# Router-ID sourced from Loopback0 (10.255.11.x/32).
# BL1/BL2 act as EVPN route reflectors for the overlay (see 10_overlay.yml).

# ── DC1 fabric AS ─────────────────────────────────────────────────────────────
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: RoutingAutonomousSystem
  data:
    - asn: 65001
      description: "DC1 fabric AS — iBGP underlay + eBGP EVPN overlay"

# ── Shared BGP address family — IPv4 unicast (underlay reachability) ──────────
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: RoutingBGPAddressFamily
  data:
    - afi: ipv4
      safi: unicast
      description: "IPv4 unicast underlay (loopback reachability)"

    - afi: l2vpn
      safi: evpn
      description: "L2VPN EVPN overlay"
      advertise_all_vni: true
      advertise_default_gw: true

# ── BGP processes — one per network device ────────────────────────────────────
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ManagedBGP
  data:
    - name: DC1-BL1-BGP
      status: active
      description: "iBGP process — DC1 border-leaf BL1 (RR for all spines)"
      multipath: true
      capabilities:
        - DC1-BL1
      router_id:
        - "10.255.11.51/32"
        - FABRIC-DC1
      local_as: "AS65001"
      address_families:
        - - ipv4
          - unicast
        - - l2vpn
          - evpn

    - name: DC1-BL2-BGP
      status: active
      description: "iBGP process — DC1 border-leaf BL2 (RR for all spines)"
      multipath: true
