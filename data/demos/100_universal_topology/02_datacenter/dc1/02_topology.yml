---
# Data center DC1 topology with pods
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: TopologyDataCenter
  data:
    - name: DC1
      index: 1
      vlan_pool: DC1-VLAN-POOL
      member_of_groups:
        - topologies_dc
      vni_pool: DC1-VNI-POOL
      l3_vni_pool: GLOBAL-L3VNI
      children:
        kind: TopologyPod
        data:
          - index: 1
            spine_template: DCS-7050CX3-32C-R_SPINE
          - index: 2
            spine_template: DCS-7050CX3-32C-R_SPINE
