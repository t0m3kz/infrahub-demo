---
# DC1 BGP peerings — iBGP unnumbered (RFC 5549, IPv6 link-local)
#
# All devices share AS65001 (iBGP).
# BL1/BL2 are EVPN route reflectors → route_reflector_client: true on all peers.
# Spines act as hierarchical RRs for their leaves (single-tier RR hierarchy).
# Full-mesh cross-pod spine peerings for inter-pod reachability.
# Underlay: IPv4-unicast + L2VPN-EVPN carried over same unnumbered sessions.
# Interfaces: the physical Ethernet ports on each side of the link.

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ManagedBGPPeering
  data:
    # ── BL1 ↔ spine peerings ──────────────────────────────────────────────────
    - name: DC1-BL1-POD1-SP1-BGP
      description: "iBGP unnumbered — DC1-BL1 (RR) ↔ DC1-POD1-SP1 (RR client)"
      session_type: IBGP
      bfd_enabled: true
      route_reflector_client: true
      bgp_processes:
        - DC1-BL1-BGP
        - DC1-POD1-SP1-BGP
      interface_capabilities:
        - kind: DcimPhysicalInterface
          data:
            device: DC1-BL1
            name: Ethernet1/1
        - kind: DcimPhysicalInterface
          data:
            device: DC1-POD1-SP1
            name: Ethernet5/1

    - name: DC1-BL1-POD1-SP2-BGP
      description: "iBGP unnumbered — DC1-BL1 (RR) ↔ DC1-POD1-SP2 (RR client)"
      session_type: IBGP
      bfd_enabled: true
      route_reflector_client: true
      bgp_processes:
        - DC1-BL1-BGP
        - DC1-POD1-SP2-BGP
      interface_capabilities:
        - kind: DcimPhysicalInterface
          data:
            device: DC1-BL1
            name: Ethernet2/1
        - kind: DcimPhysicalInterface
          data:
            device: DC1-POD1-SP2
            name: Ethernet5/1

    - name: DC1-BL1-POD2-SP1-BGP
      description: "iBGP unnumbered — DC1-BL1 (RR) ↔ DC1-POD2-SP1 (RR client)"
      session_type: IBGP
      bfd_enabled: true
      route_reflector_client: true
      bgp_processes:
