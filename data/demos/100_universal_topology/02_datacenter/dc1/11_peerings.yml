          data:
            device: DC1-BL1
            name: Ethernet3/1
        - kind: DcimPhysicalInterface
          data:
            device: DC1-POD2-SP1
            name: Ethernet5/1

    - name: DC1-BL1-POD2-SP2-BGP
      description: "iBGP unnumbered — DC1-BL1 (RR) ↔ DC1-POD2-SP2 (RR client)"
      session_type: IBGP
      bfd_enabled: true
      route_reflector_client: true
      bgp_processes:
        - DC1-BL1-BGP
        - DC1-POD2-SP2-BGP
