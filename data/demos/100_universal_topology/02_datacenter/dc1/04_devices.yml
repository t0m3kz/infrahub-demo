---
# DC1 infrastructure: border-leafs, spines, leaves, servers
# Underlay: iBGP (RFC 5549 unnumbered, IPv6 link-local on fabric ports)
# Overlay:  iBGP EVPN (L2VPN-EVPN AF, BL1/BL2 act as EVPN route-reflectors)
# Fabric:   Arista DCS-7050CX3-32C-R fabric
# Loopbacks: 10.255.11.0/24 (FABRIC-DC1 namespace)
apiVersion: infrahub.app/v1
kind: Object
