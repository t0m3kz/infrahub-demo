      object_template: DCS-7050CX3-32C-R_SPINE
      status: active
      deployment: DC1-1-POD-1
      rack: dc1-s1-r-1
      member_of_groups:
        - spines
      interfaces:
        kind: DcimVirtualInterface
        data:
          - name: Loopback0
            role: loopback
            status: active
            description: "Router-ID / BGP source"
            ip_address:
              data:
                address: "10.255.11.11/32"
                ip_namespace: FABRIC-DC1

