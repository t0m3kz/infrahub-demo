# DC1 Security — per-customer dedicated physical firewalls via PBR (active-passi
#
# One active-passive SRX-1500 pair per customer VRF (IpamNamespace).
# FW hardware now connects to border-leafs (BL1/BL2), not server-leafs.
#   ge-0/0/0 (inside)  ← BL1/BL2 (PBR redirect target)
#   ge-0/0/1 (outside) → BL1/BL2 (return path after inspection)
#   ge-0/0/2 (HA sync) ↔ peer FW ge-0/0/2 (back-to-back session sync)
#
# Port assignment:
#   CNRD: FW-01 ge-0/0/0 → BL1:Eth5/1 | FW-01 ge-0/0/1 → BL1:Eth6/1
#          FW-02 ge-0/0/0 → BL2:Eth5/1 | FW-02 ge-0/0/1 → BL2:Eth6/1
#   CSWM: FW-01 ge-0/0/0 → BL1:Eth7/1 | FW-01 ge-0/0/1 → BL1:Eth8/1
#          FW-02 ge-0/0/0 → BL2:Eth7/1 | FW-02 ge-0/0/1 → BL2:Eth8/1
#
# Contrast with DC2 which uses a shared active-active inline FW between spines a

# ── Physical firewalls ────────────────────────────────────────────────────────
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: DcimPhysicalDevice
  data:
    # ── CNRD — POD1 ──────────────────────────────────────────────────
    - name: DC1-C001-FW-01
      object_template: SRX-1500_DC_FIREWALL
      role: firewall-active
      status: active
      deployment: DC1
      rack: dc1-s1-r-1
      member_of_groups:
        - firewalls
      interfaces:
        kind: DcimPhysicalInterface
        data:
          - name: ge-0/0/0
            interface_type: 10gbase-x-sfpp
            role: uplink
            status: active
            description: "Inside (PBR) — DC1-BL1"
          - name: ge-0/0/1
            interface_type: 10gbase-x-sfpp
            role: uplink
            status: active
            description: "Outside (return) — DC1-BL1"
          - name: ge-0/0/2
            interface_type: 10gbase-x-sfpp
            role: management
            status: active
            description: "HA sync — DC1-C001-FW-02"

    - name: DC1-C001-FW-02
      object_template: SRX-1500_DC_FIREWALL
      role: firewall-passive
      status: active
      deployment: DC1
      rack: dc1-s1-r-1
      member_of_groups:
        - firewalls
      interfaces:
        kind: DcimPhysicalInterface
        data:
          - name: ge-0/0/0
            interface_type: 10gbase-x-sfpp
            role: uplink
            status: active
            description: "Inside (PBR standby) — DC1-BL2"
          - name: ge-0/0/1
            interface_type: 10gbase-x-sfpp
            role: uplink
            status: active
            description: "Outside (return standby) — DC1-BL2"
          - name: ge-0/0/2
            interface_type: 10gbase-x-sfpp
            role: management
            status: active
            description: "HA sync — DC1-C001-FW-01"

    # ── CSWM — POD2 ────────────────────────────────────────────
    - name: DC1-C002-FW-01
      object_template: SRX-1500_DC_FIREWALL
      role: firewall-active
      status: active
      deployment: DC1
      rack: dc1-s1-r-2
      member_of_groups:
        - firewalls
      interfaces:
        kind: DcimPhysicalInterface
        data:
          - name: ge-0/0/0
            interface_type: 10gbase-x-sfpp
            role: uplink
            status: active
            description: "Inside (PBR) — DC1-BL1"
          - name: ge-0/0/1
            interface_type: 10gbase-x-sfpp
            role: uplink
            status: active
            description: "Outside (return) — DC1-BL1"
          - name: ge-0/0/2
            interface_type: 10gbase-x-sfpp
            role: management
            status: active
            description: "HA sync — DC1-C002-FW-02"

    - name: DC1-C002-FW-02
      object_template: SRX-1500_DC_FIREWALL
      role: firewall-passive
      status: active
      deployment: DC1
      rack: dc1-s1-r-2
      member_of_groups:
        - firewalls
      interfaces:
        kind: DcimPhysicalInterface
        data:
          - name: ge-0/0/0
            interface_type: 10gbase-x-sfpp
            role: uplink
            status: active
            description: "Inside (PBR standby) — DC1-BL2"
          - name: ge-0/0/1
            interface_type: 10gbase-x-sfpp
            role: uplink
            status: active
            description: "Outside (return standby) — DC1-BL2"
          - name: ge-0/0/2
            interface_type: 10gbase-x-sfpp
            role: management
            status: active
            description: "HA sync — DC1-C002-FW-01"

# ── HA domains — one per firewall pair ───────────────────────────────────────
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ManagedFirewallHA
  data:
    - name: DC1-C001-FW-HA
      group_id: 1
      mode: active-passive
      priority: 100
      preempt: false
      ha_timer: standard
      capabilities:
        - DC1-C001-FW-01
        - DC1-C001-FW-02

    - name: DC1-C002-FW-HA
      group_id: 2
      mode: active-passive
      priority: 100
      preempt: false
      ha_timer: standard
      capabilities:
        - DC1-C002-FW-01
        - DC1-C002-FW-02

# ── Virtual firewall instances (tenant FW context, hosted on active chassis) ──
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: DcimVirtualDevice
  data:
    - name: DC1-C001-VFW-01
      role: firewall
      status: active
      device_type: CloudGuard
      platform: checkpoint_gaia
      deployment: DC1
      hosting_device: DC1-C001-FW-01
      member_of_groups:
        - firewalls

    - name: DC1-C002-VFW-01
      role: firewall
      status: active
      device_type: CloudGuard
      platform: checkpoint_gaia
      deployment: DC1
      hosting_device: DC1-C002-FW-01
      member_of_groups:
        - firewalls

# ── Cables ────────────────────────────────────────────────────────────────────
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: DcimCable
  data:
    # ── CNRD — FW-01 (active) ────────────────────────────────────────
    - name: CBL-DC1-C001-FW01-BL1-INSIDE
      type: smf
      deployment: DC1
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC1-C001-FW-01
            name: ge-0/0/0
        - kind: DcimPhysicalInterface
          data:
            device: DC1-BL1
            name: Ethernet5/1

    - name: CBL-DC1-C001-FW01-BL1-OUTSIDE
      type: smf
      deployment: DC1
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC1-C001-FW-01
            name: ge-0/0/1
        - kind: DcimPhysicalInterface
          data:
            device: DC1-BL1
            name: Ethernet6/1

    # ── CNRD — FW-02 (passive) ───────────────────────────────────────
    - name: CBL-DC1-C001-FW02-BL2-INSIDE
      type: smf
      deployment: DC1
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC1-C001-FW-02
            name: ge-0/0/0
        - kind: DcimPhysicalInterface
          data:
            device: DC1-BL2
            name: Ethernet5/1

    - name: CBL-DC1-C001-FW02-BL2-OUTSIDE
      type: smf
      deployment: DC1
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC1-C001-FW-02
            name: ge-0/0/1
        - kind: DcimPhysicalInterface
          data:
            device: DC1-BL2
            name: Ethernet6/1

    # ── CNRD — HA sync ───────────────────────────────────────────────
    - name: CBL-DC1-C001-FW01-FW02-HA-SYNC
      type: smf
      deployment: DC1
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC1-C001-FW-01
            name: ge-0/0/2
        - kind: DcimPhysicalInterface
          data:
            device: DC1-C001-FW-02
            name: ge-0/0/2

    # ── CSWM — FW-01 (active) ──────────────────────────────────
    - name: CBL-DC1-C002-FW01-BL1-INSIDE
      type: smf
      deployment: DC1
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC1-C002-FW-01
            name: ge-0/0/0
        - kind: DcimPhysicalInterface
          data:
            device: DC1-BL1
            name: Ethernet7/1

    - name: CBL-DC1-C002-FW01-BL1-OUTSIDE
      type: smf
      deployment: DC1
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC1-C002-FW-01
            name: ge-0/0/1
        - kind: DcimPhysicalInterface
          data:
            device: DC1-BL1
            name: Ethernet8/1

    # ── CSWM — FW-02 (passive) ─────────────────────────────────
    - name: CBL-DC1-C002-FW02-BL2-INSIDE
      type: smf
      deployment: DC1
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC1-C002-FW-02
            name: ge-0/0/0
        - kind: DcimPhysicalInterface
          data:
            device: DC1-BL2
            name: Ethernet7/1

    - name: CBL-DC1-C002-FW02-BL2-OUTSIDE
      type: smf
      deployment: DC1
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC1-C002-FW-02
            name: ge-0/0/1
        - kind: DcimPhysicalInterface
          data:
            device: DC1-BL2
            name: Ethernet8/1

    # ── CSWM — HA sync ─────────────────────────────────────────
    - name: CBL-DC1-C002-FW01-FW02-HA-SYNC
      type: smf
      deployment: DC1
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC1-C002-FW-01
            name: ge-0/0/2
        - kind: DcimPhysicalInterface
          data:
            device: DC1-C002-FW-02
            name: ge-0/0/2

# ── Security Zones ────────────────────────────────────────────────────────────
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: SecurityZone
  data:
    - name: DC1-C001-WEB-ZONE
      description: "DC1 CNRD web-frontend zone"
      trust_level: 60
      zone_type: dmz

    - name: DC1-C001-APP-ZONE
      description: "DC1 CNRD app-backend zone"
      trust_level: 70
      zone_type: internal

    - name: DC1-C001-DB-ZONE
      description: "DC1 CNRD database zone"
      trust_level: 80
      zone_type: internal

    - name: DC1-C002-WEB-ZONE
      description: "DC1 CSWM web-frontend zone"
      trust_level: 60
      zone_type: dmz

    - name: DC1-C002-APP-ZONE
      description: "DC1 CSWM app-backend zone"
      trust_level: 70
      zone_type: internal

# ── Security Policies ─────────────────────────────────────────────────────────
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: SecurityPolicy
  data:
    - name: DC1-C001-EAST-WEST-POLICY
      description: "CNRD east-west micro-segmentation via PBR"
      default_action: deny
      enabled: true
      capabilities:
        - DC1-C001-FW-01
        - DC1-C001-FW-02

    - name: DC1-C002-EAST-WEST-POLICY
      description: "CSWM east-west micro-segmentation via PBR"
      default_action: deny
      enabled: true
      capabilities:
        - DC1-C002-FW-01
        - DC1-C002-FW-02

# ── Firewall association on segments ──────────────────────────────────────────
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ManagedVxlanSegment
  data:
    # Nordix Ltd. — production
    - customer_name: "web-frontend"
      environment: "p"
      owner: "C001"
      inline_service: DC1-C001-FW-HA
      pbr_enabled: true

    - customer_name: "app-backend"
      environment: "p"
      owner: "C001"
      inline_service: DC1-C001-FW-HA
      pbr_enabled: true

    - customer_name: "database"
      environment: "p"
      owner: "C001"
      inline_service: DC1-C001-FW-HA
      pbr_enabled: true

    # Nordix Ltd. — non-production
    - customer_name: "web-frontend"
      environment: "n"
      owner: "C001"
      inline_service: DC1-C001-FW-HA
      pbr_enabled: true

    - customer_name: "app-backend"
      environment: "n"
      owner: "C001"
      inline_service: DC1-C001-FW-HA
      pbr_enabled: true

    - customer_name: "database"
      environment: "n"
      owner: "C001"
      inline_service: DC1-C001-FW-HA
      pbr_enabled: true

    # CSWM — production
    - customer_name: "web-frontend"
      environment: "p"
      owner: "C002"
      inline_service: DC1-C002-FW-HA
      pbr_enabled: true

    - customer_name: "app-backend"
      environment: "p"
      owner: "C002"
      inline_service: DC1-C002-FW-HA
      pbr_enabled: true

    # CSWM — non-production
    - customer_name: "web-frontend"
      environment: "n"
      owner: "C002"
      inline_service: DC1-C002-FW-HA
      pbr_enabled: true

    - customer_name: "app-backend"
      environment: "n"
      owner: "C002"
      inline_service: DC1-C002-FW-HA
      pbr_enabled: true

# ── Security Policy Rules — CNRD ─────────────────────────────────────
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: SecurityPolicyRule
  data:
    - index: 10
      name: dc1-cnrd-permit-web-to-app
      description: "Allow HTTP/HTTPS from web-frontend to app-backend"
      action: permit
      protocol: tcp
      port_start: 443
      log: true
      policy: DC1-C001-EAST-WEST-POLICY
      source_zone: DC1-C001-WEB-ZONE
      destination_zone: DC1-C001-APP-ZONE

    - index: 11
      name: dc1-cnrd-permit-web-to-app-http
      description: "Allow HTTP from web-frontend to app-backend"
      action: permit
      protocol: tcp
      port_start: 80
      log: false
      policy: DC1-C001-EAST-WEST-POLICY
      source_zone: DC1-C001-WEB-ZONE
      destination_zone: DC1-C001-APP-ZONE

    - index: 20
      name: dc1-cnrd-permit-app-to-db
      description: "Allow database traffic from app-backend to database"
      action: permit
      protocol: tcp
      port_start: 5432
      log: true
      policy: DC1-C001-EAST-WEST-POLICY
      source_zone: DC1-C001-APP-ZONE
      destination_zone: DC1-C001-DB-ZONE

    - index: 999
      name: dc1-cnrd-deny-all
      description: "Default deny — block all other east-west traffic"
      action: deny
      protocol: any
      log: true
      policy: DC1-C001-EAST-WEST-POLICY
      source_zone: DC1-C001-WEB-ZONE
      destination_zone: DC1-C001-APP-ZONE

# ── Security Policy Rules — CSWM ───────────────────────────────
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: SecurityPolicyRule
  data:
    - index: 10
      name: dc1-cswm-permit-web-to-app
      description: "Allow HTTPS from web-frontend to app-backend"
      action: permit
      protocol: tcp
      port_start: 443
      log: true
      policy: DC1-C002-EAST-WEST-POLICY
      source_zone: DC1-C002-WEB-ZONE
      destination_zone: DC1-C002-APP-ZONE

    - index: 999
      name: dc1-cswm-deny-all
      description: "Default deny — block all other east-west traffic"
      action: deny
      protocol: any
      log: true
      policy: DC1-C002-EAST-WEST-POLICY
      source_zone: DC1-C002-WEB-ZONE
      destination_zone: DC1-C002-APP-ZONE
