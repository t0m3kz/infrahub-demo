# IP namespaces (tenant VRFs) — loaded before dc1/dc2/dc3 so that VirtCluster
# ip_namespace references resolve correctly.
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: IpamNamespace
  data:
    - name: "CUST001-PROD"
      description: "Customer 1 production VRF"
      l3_vni: 50001
      status: "active"
      owner: "Customer 1"

    - name: "CUST001-NONPROD"
      description: "Customer 1 non-production VRF (dev/staging)"
      l3_vni: 50002
      status: "active"
      owner: "Customer 1"

    - name: "CUST002-PROD"
      description: "Customer 2 production VRF"
      l3_vni: 50003
      status: "active"
      owner: "Customer 2"

    - name: "CUST002-NONPROD"
      description: "Customer 2 non-production VRF (dev/staging)"
      l3_vni: 50004
      status: "active"
      owner: "Customer 2"

    - name: "SHARED-SERVICES"
      description: "Shared infrastructure services VRF (DNS, NTP, monitoring)"
      l3_vni: 50100
      status: "active"
