# Shared pre-requisites for the datacenter subtree.
# Loads first (00_ prefix) to satisfy hfid lookups in capabilities files.
#
# 1. Shared management IPs — referenced by ManagedNTPServer, ManagedSyslogServer,
#    ManagedAAAServer across DC1, DC2 and all office/colo sites.
# 2. IP namespaces (tenant VRFs) — required by VirtCluster ip_namespace references.
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: IpamIPAddress
  data:
    - address: "162.159.200.1/32"
      ip_namespace: default
    - address: "162.159.200.123/32"
      ip_namespace: default
    - address: "162.159.210.11/32"
      ip_namespace: default
    - address: "10.0.0.100/32"
      ip_namespace: default
    - address: "10.0.0.200/32"
      ip_namespace: default
    - address: "10.0.0.201/32"
      ip_namespace: default
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: IpamNamespace
  data:
    - name: "CUST001-PROD"
      description: "Customer 1 production VRF"
      l3_vni: 50001
      status: "active"
      owner: "Customer 1"

    - name: "CUST001-NONPROD"
      description: "Customer 1 non-production VRF (dev/staging)"
      l3_vni: 50002
      status: "active"
      owner: "Customer 1"

    - name: "CUST002-PROD"
      description: "Customer 2 production VRF"
      l3_vni: 50003
      status: "active"
      owner: "Customer 2"

    - name: "CUST002-NONPROD"
      description: "Customer 2 non-production VRF (dev/staging)"
      l3_vni: 50004
      status: "active"
      owner: "Customer 2"

    - name: "SHARED-SERVICES"
      description: "Shared infrastructure services VRF (DNS, NTP, monitoring)"
      l3_vni: 50100
      status: "active"
