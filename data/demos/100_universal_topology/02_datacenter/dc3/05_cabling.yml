      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD1-K8S-CP-01
            name: eno3
            description: "DC3-POD2-L1 (cross-pod primary)"
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD2-L1
            name: xe1
            description: "DC3-POD1-K8S-CP-01"

    - name: CBL-DC3-K8S-CP01-POD2-L2
      type: copper
      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD1-K8S-CP-01
            name: eno4
            description: "DC3-POD2-L2 (cross-pod secondary)"
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD2-L2
            name: xe1
            description: "DC3-POD1-K8S-CP-01"

