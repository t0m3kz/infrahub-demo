    - name: CBL-DC3-POD1-SP2-L1
      type: smf
      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD1-SP2
            name: Ethernet0
            description: "DC3-POD1-L1"
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD1-L1
            name: xe50
            description: "DC3-POD1-SP2"

    - name: CBL-DC3-POD1-SP1-L2
      type: smf
      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD1-SP1
            name: Ethernet4
            description: "DC3-POD1-L2"
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD1-L2
            name: xe49
            description: "DC3-POD1-SP1"

    - name: CBL-DC3-POD1-SP2-L2
      type: smf
      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD1-SP2
            name: Ethernet4
            description: "DC3-POD1-L2"
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD1-L2
            name: xe50
            description: "DC3-POD1-SP2"

    - name: CBL-DC3-POD1-SP1-L3
      type: smf
      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD1-SP1
            name: Ethernet8
            description: "DC3-POD1-L3"
        - kind: DcimPhysicalInterface
          data:
