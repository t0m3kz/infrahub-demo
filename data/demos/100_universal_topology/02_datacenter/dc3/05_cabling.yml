---
# DC3 cabling
#
# k8s node multi-homing pattern:
#   eno1 → POD1-L1  (primary leaf, same pod)
#   eno2 → POD1-L2  (secondary leaf, same pod — MLAG peer)
#   eno3 → POD2-L1  (primary leaf, cross-pod)
#   eno4 → POD2-L2  (secondary leaf, cross-pod — MLAG peer)
#
# This gives each node 4 uplinks forming two MLAG bond pairs (bond0 within-pod,
# bond1 cross-pod). All four links are LACP-active so the node sees one logical
# fabric interface per bond regardless of which leaf pair is active.
#
# Super-spine and spine cabling mirrors DC1/DC2 exactly.

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: DcimCable
  data:

    # ── Super-spine ↔ spines ──────────────────────────────────────────────────

    - name: CBL-DC3-SS1-POD1-SP1
      type: smf
      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-SS1
            name: Ethernet1/1
            description: "DC3-POD1-SP1"
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD1-SP1
            name: Ethernet1/1
            description: "DC3-SS1"

    - name: CBL-DC3-SS2-POD1-SP1
      type: smf
      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-SS2
            name: Ethernet1/1
            description: "DC3-POD1-SP1"
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD1-SP1
            name: Ethernet1/2
            description: "DC3-SS2"

    - name: CBL-DC3-SS1-POD1-SP2
      type: smf
      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-SS1
            name: Ethernet1/2
            description: "DC3-POD1-SP2"
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD1-SP2
            name: Ethernet1/1
            description: "DC3-SS1"

    - name: CBL-DC3-SS2-POD1-SP2
      type: smf
