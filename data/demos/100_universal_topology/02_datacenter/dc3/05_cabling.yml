            description: "DC3-SS2"

    - name: CBL-DC3-SS1-POD2-SP2
      type: smf
      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-SS1
            name: Ethernet12
            description: "DC3-POD2-SP2"
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD2-SP2
            name: Ethernet112
            description: "DC3-SS1"

    - name: CBL-DC3-SS2-POD2-SP2
      type: smf
      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-SS2
            name: Ethernet12
            description: "DC3-POD2-SP2"
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD2-SP2
            name: Ethernet116
            description: "DC3-SS2"

    # ── Spines ↔ leaves ───────────────────────────────────────────────────────

    - name: CBL-DC3-POD1-SP1-L1
      type: smf
      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD1-SP1
