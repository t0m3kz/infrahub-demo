    # Port allocation on leaf switches:
    #   Eth1/41-44 → CP nodes (3 CP nodes × 1 port each, + 1 spare)
    #   Eth1/45-48 → POD1 worker nodes
    #   Eth1/49-54 → POD2 worker + storage nodes (cross-pod uplinks)
    #
    # Each node:
    #   eno1 → POD1-L1:Eth1/4x  (within-pod primary)
    #   eno2 → POD1-L2:Eth1/4x  (within-pod secondary)
    #   eno3 → POD2-L1:Eth1/4x  (cross-pod primary)
    #   eno4 → POD2-L2:Eth1/4x  (cross-pod secondary)

