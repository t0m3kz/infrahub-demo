          data:
            device: DC3-POD1-K8S-CP-01
            name: eno1
            description: "DC3-POD1-L1 (within-pod primary)"
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD1-L1
            name: Ethernet1/41
            description: "DC3-POD1-K8S-CP-01"

    - name: CBL-DC3-K8S-CP01-POD1-L2
