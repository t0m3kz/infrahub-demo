---
# DC3 cabling
#
# k8s node multi-homing pattern:
#   eno1 → POD1-L1  (primary leaf, same pod)
#   eno2 → POD1-L2  (secondary leaf, same pod — MLAG peer)
#   eno3 → POD2-L1  (primary leaf, cross-pod)
#   eno4 → POD2-L2  (secondary leaf, cross-pod — MLAG peer)
#
# This gives each node 4 uplinks forming two MLAG bond pairs (bond0 within-pod,
# bond1 cross-pod). All four links are LACP-active so the node sees one logical
# fabric interface per bond regardless of which leaf pair is active.
#
# Border-leaf (BL1/BL2) uplinks use SS1/SS2 Eth1/9–10 (previously used for DCI).
# DCI now terminates on BL1/BL2 Eth1/9–10 → Equinix patch panel → PA4/PA6.

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: DcimCable
  data:

    # ── Border-leaf ↔ super-spines ────────────────────────────────────────────
    # BL1 uplinks (AS 65370) — one link per super-spine for redundancy

    - name: CBL-DC3-BL1-SS1
      type: smf
      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-BL1
            name: Ethernet112
            description: "DC3-SS1"
        - kind: DcimPhysicalInterface
          data:
            device: DC3-SS1
            name: Ethernet32
            description: "DC3-BL1"

    - name: CBL-DC3-BL1-SS2
      type: smf
      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-BL1
            name: Ethernet116
            description: "DC3-SS2"
        - kind: DcimPhysicalInterface
          data:
            device: DC3-SS2
            name: Ethernet32
            description: "DC3-BL1"

    # BL2 uplinks (AS 65371)

    - name: CBL-DC3-BL2-SS1
      type: smf
      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-BL2
            name: Ethernet112
            description: "DC3-SS1"
        - kind: DcimPhysicalInterface
          data:
            device: DC3-SS1
            name: Ethernet36
            description: "DC3-BL2"

    - name: CBL-DC3-BL2-SS2
      type: smf
      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-BL2
            name: Ethernet116
            description: "DC3-SS2"
        - kind: DcimPhysicalInterface
          data:
            device: DC3-SS2
            name: Ethernet36
            description: "DC3-BL2"

    # ── Border-leaf ↔ Equinix DC3 patch panel (DCI) ───────────────────────────
    # Circuit path: BL1:Eth1/9 → patch Port1 → PA4-EDGE-01:Eth1/3 (primary)
    #               BL2:Eth1/9 → patch Port2 → PA6-EDGE-01:Eth1/3 (secondary)

    - name: CBL-DC3-BL1-EQX-DC3-PATCH-P1
      type: smf
      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-BL1
            name: Ethernet8
            description: "PA4-EDGE-01 (via EQX-DC3-PATCH-01)"
        - kind: DcimPhysicalInterface
          data:
            device: EQX-DC3-PATCH-01
            name: Port1

    - name: CBL-DC3-BL2-EQX-DC3-PATCH-P2
      type: smf
      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-BL2
            name: Ethernet8
            description: "PA6-EDGE-01 (via EQX-DC3-PATCH-01)"
        - kind: DcimPhysicalInterface
          data:
            device: EQX-DC3-PATCH-01
            name: Port2

    # ── Super-spine ↔ spines ──────────────────────────────────────────────────

    - name: CBL-DC3-SS1-POD1-SP1
      type: smf
      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-SS1
            name: Ethernet0
            description: "DC3-POD1-SP1"
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD1-SP1
            name: Ethernet112
            description: "DC3-SS1"

    - name: CBL-DC3-SS2-POD1-SP1
      type: smf
      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-SS2
            name: Ethernet0
            description: "DC3-POD1-SP1"
