          data:
            device: DC3-SS1
            name: Ethernet1/3
            description: "DC3-POD2-SP1"
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD2-SP1
            name: Ethernet1/1
            description: "DC3-SS1"

    - name: CBL-DC3-SS2-POD2-SP1
