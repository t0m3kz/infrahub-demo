    # ── k8s nodes → leaves (4-NIC cross-pod multi-homing) ────────────────────
    #
    # Port allocation on leaf switches:
    #   Eth1/41-44 → CP nodes (3 CP nodes × 1 port each, + 1 spare)
    #   Eth1/45-48 → POD1 worker nodes
    #   Eth1/49-54 → POD2 worker + storage nodes (cross-pod uplinks)
    #
    # Each node:
    #   eno1 → POD1-L1:Eth1/4x  (within-pod primary)
    #   eno2 → POD1-L2:Eth1/4x  (within-pod secondary)
    #   eno3 → POD2-L1:Eth1/4x  (cross-pod primary)
    #   eno4 → POD2-L2:Eth1/4x  (cross-pod secondary)

    # ── Control-plane node 01 ─────────────────────────────────────────────────
    - name: CBL-DC3-K8S-CP01-POD1-L1
      type: copper
      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD1-K8S-CP-01
            name: eno1
            description: "DC3-POD1-L1 (within-pod primary)"
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD1-L1
            name: xe1
            description: "DC3-POD1-K8S-CP-01"

    - name: CBL-DC3-K8S-CP01-POD1-L2
      type: copper
      deployment: DC3
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD1-K8S-CP-01
            name: eno2
            description: "DC3-POD1-L2 (within-pod secondary)"
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD1-L2
            name: xe1
            description: "DC3-POD1-K8S-CP-01"

    - name: CBL-DC3-K8S-CP01-POD2-L1
