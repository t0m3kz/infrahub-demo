# DC3 cluster capabilities — CNI, storage, ingress, registry, management plane, monitoring
# One set per cluster: DC3-K8S-PROD (Cilium/Rook), DC3-VSPHERE-PROD (DVS/NSX ALB), DC3-NUTANIX-PROD (AHV/Flow)

# ── DC3-K8S-PROD ──────────────────────────────────────────────────────────────

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtCNI
  data:
    - name: DC3-K8S-PROD-CNI
      status: active
      plugin: cilium
      version: "1.16.3"
      pod_cidr: "100.64.0.0/14"
      service_cidr: "100.96.0.0/16"
      encapsulation: geneve
      bgp_enabled: true
      cluster_capabilities:
        - DC3-K8S-PROD

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtStorageBackend
  data:
    - name: DC3-K8S-PROD-STORAGE
      status: active
      backend_type: ceph_rook
      version: "1.15.4"
      default_class: true
      reclaim_policy: retain
      cluster_capabilities:
        - DC3-K8S-PROD

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtIngress
  data:
    - name: DC3-K8S-PROD-INGRESS
      status: active
      controller: metallb
      version: "0.14.8"
      address_pool: "10.3.100.0/24"
      cluster_capabilities:
        - DC3-K8S-PROD

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtRegistry
  data:
    - name: DC3-K8S-PROD-REGISTRY
      status: active
      registry_type: harbor
      endpoint: "harbor.dc3.infra.local"
      insecure: false
      cluster_capabilities:
        - DC3-K8S-PROD

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtManagementPlane
  data:
    - name: DC3-K8S-PROD-MGMT
      status: active
      endpoint: "k8s-api.dc3.infra.local"
      endpoint_access: private
      port: 6443
      auth_method: oidc
      cluster_capabilities:
        - DC3-K8S-PROD

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtMonitoring
  data:
    - name: DC3-K8S-PROD-MONITORING
      status: active
      stack: prometheus_grafana
      version: "kube-prometheus-stack 65.1.0"
      retention_days: 30
      remote_write: "http://thanos.dc3.infra.local:19291/api/v1/receive"
      cluster_capabilities:
        - DC3-K8S-PROD

