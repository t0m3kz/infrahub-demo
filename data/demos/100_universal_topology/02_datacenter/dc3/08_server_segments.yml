---
# DC3 — VXLAN segment assignment to server bond interfaces
#
# All k8s nodes carry the shared-infra segment on bond0 (the primary fabric).
# Worker nodes additionally carry the customer workload segments they host.
# bond1 (cross-pod) carries the same set — both bonds are in the same trunk.
#
# Control-plane nodes: shared-infra only (no workload traffic on CP).
# Worker nodes: customer prod segments.
# Storage nodes: shared-infra only (Ceph OSD, no customer VXLAN needed).
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: DcimLAGInterface
  data:

    # ── Control-plane nodes ───────────────────────────────────────────────────
    - name: bond0
      device: DC3-POD1-K8S-CP-01
      lag_id: 1
      interface_capabilities:
        - kind: ManagedVxlanSegment
          data:
            owner: "Customer 1"
            environment: "production"
            customer_name: "shared-infra"

    - name: bond0
      device: DC3-POD1-K8S-CP-02
      lag_id: 1
      interface_capabilities:
        - kind: ManagedVxlanSegment
          data:
            owner: "Customer 1"
            environment: "production"
            customer_name: "shared-infra"

    - name: bond0
      device: DC3-POD1-K8S-CP-03
      lag_id: 1
      interface_capabilities:
        - kind: ManagedVxlanSegment
          data:
            owner: "Customer 1"
            environment: "production"
            customer_name: "shared-infra"

    # ── POD1 worker nodes ─────────────────────────────────────────────────────
