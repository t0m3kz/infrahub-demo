      device: DC3-POD1-L1
      status: active
      role: lag
      lag_id: 41
      lacp_mode: active
      mtu: 9000
      minimum_links: 1
      mlag_domain: DC3-POD1-L1-L2-MLAG
      member_interfaces:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-POD1-L1
            name: Ethernet1/41

    - name: Port-Channel42
