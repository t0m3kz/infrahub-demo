#   POD1-MLAG:
#     41-43 → CP-01/02/03 bond0 (within-pod primary)
#     45-46 → WRK-01/02 (POD1) bond0 (within-pod)
#     49-52 → WRK-01/02/03/04 (POD2) bond0 (cross-pod to POD1 pair)
#
#   POD2-MLAG:
#     41-43 → CP-01/02/03 bond1 (cross-pod to POD2 pair)
#     45-46 → WRK-01/02 (POD1) bond1 (cross-pod to POD2 pair)
#     49-52 → WRK-01/02/03/04 (POD2) bond1 (within-pod primary)
