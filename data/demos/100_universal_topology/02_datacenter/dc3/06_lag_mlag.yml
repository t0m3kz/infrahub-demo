---
# DC3 MLAG domains — two leaf pairs, one per pod
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ManagedMLAG
  data:
    - name: DC3-POD1-L1-L2-MLAG
      status: active
      domain_id: 1
      reload_delay: 300
      reload_delay_non_mlag: 330
      device_capabilities:
        - DC3-POD1-L1
        - DC3-POD1-L2

    - name: DC3-POD2-L1-L2-MLAG
      status: active
      domain_id: 2
      reload_delay: 300
      reload_delay_non_mlag: 330
      device_capabilities:
        - DC3-POD2-L1
        - DC3-POD2-L2

