---
# DC3 infrastructure: super-spines, border-leafs, spines, leaves, servers
#
# Server layout for k8s cluster nodes:
#   POD1: k8s control-plane nodes (3x) + worker nodes (2x)
#   POD2: worker nodes (4x) + storage nodes (2x)
#
# Each server has 4 NICs (eno1-eno4) dual-homed to BOTH pod leaf pairs
# so k8s nodes can communicate across pods without hair-pinning through spines.
#
# Underlay: eBGP (RFC 5549 unnumbered, IPv6 link-local on fabric ports)
# Overlay:  eBGP EVPN (combined underlay+overlay, per-device unique AS)
# Loopbacks: 10.255.13.0/24 (FABRIC-DC3 namespace)
#
# AS assignment:
#   SS1: 65300 | SS2: 65301
#   BL1: 65370 | BL2: 65371  (border-leafs — EVPN multi-site BGW + DCI termination)
#   POD1-SP1: 65311 | POD1-SP2: 65312
#   POD2-SP1: 65321 | POD2-SP2: 65322
#   POD3-SP1: 65331 | POD3-SP2: 65332
#   POD4-SP1: 65341 | POD4-SP2: 65342
#   Leaves: 65351–65366 (sequential per pod)
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: DcimPhysicalDevice
  data:
    # ── Super-spines ──────────────────────────────────────────────────────────
    - name: DC3-SS1
      object_template: Edgecore-7726-32X-O_SUPER_SPINE
      status: active
      deployment: DC3
      rack: dc3-s1-r-1
      member_of_groups:
        - super-spines
      interfaces:
        kind: DcimVirtualInterface
        data:
          - name: Loopback0
            role: loopback
            status: active
            description: "Router-ID / BGP source — AS 65300"
            ip_address:
              data:
                address: "10.255.13.1/32"
                ip_namespace: FABRIC-DC3

    - name: DC3-SS2
      object_template: Edgecore-7726-32X-O_SUPER_SPINE
      status: active
      deployment: DC3
      rack: dc3-s1-r-2
      member_of_groups:
        - super-spines
      interfaces:
        kind: DcimVirtualInterface
        data:
          - name: Loopback0
            role: loopback
            status: active
            description: "Router-ID / BGP source — AS 65301"
            ip_address:
              data:
                address: "10.255.13.2/32"
                ip_namespace: FABRIC-DC3

    # ── Border-leafs ──────────────────────────────────────────────────────────
    # BL1/BL2 are EVPN multi-site Border-Gateways and DCI termination points.
    # They carry both fabric eBGP (unnumbered to SS1/SS2) and DCI eBGP
    # (numbered to PA4/PA6 Equinix edge routers) on the same box.
    # All customer L3 VNIs (IpamNamespaces) have EVPN presence here —
    # inter-tenant routing and stretched VXLAN to other DCs are handled here.
    # The Check Point VSX chassis are also uplinked here (not to server-leafs).
    #
    # Port layout:
    #   Eth1/1 → DC3-SS1  (fabric uplink, eBGP unnumbered)
    #   Eth1/2 → DC3-SS2  (fabric uplink, eBGP unnumbered)
    #   Eth1/3 → DC3-FW-01 eth1/eth2  (inside/outside to active CP chassis)
    #   Eth1/4 → DC3-FW-02 eth1/eth2  (inside/outside to standby CP chassis)
    #   Eth1/9 → PA4-EDGE-01 Eth1/3   (DCI primary, 10.255.0.8/31)
    #   Eth1/10 → PA6-EDGE-01 Eth1/3  (DCI secondary, 10.255.0.10/31)
    - name: DC3-BL1
      object_template: Edgecore-7726-32X-O_SPINE
      role: border-leaf
      status: active
      deployment: DC3
      rack: dc3-s1-r-1
      member_of_groups:
        - border-leafs
      interfaces:
        kind: DcimVirtualInterface
        data:
          - name: Loopback0
            role: loopback
            status: active
            description: "Router-ID / BGP source — AS 65370"
            ip_address:
              data:
                address: "10.255.13.51/32"
                ip_namespace: FABRIC-DC3
          - name: Loopback1
            role: loopback-vtep
            status: active
            description: "VTEP NVE source — BL1 (independent, no MLAG)"
            ip_address:
              data:
                address: "10.255.13.71/32"
                ip_namespace: FABRIC-DC3

    - name: DC3-BL2
