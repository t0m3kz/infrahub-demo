---
# DC3 topology — 4 pods, one per cluster type
#   POD1: Kubernetes (k8s) — cross-pod multi-homed nodes
#   POD2: Kubernetes (k8s workers/storage) — paired with POD1
#   POD3: VMware vSphere
#   POD4: Nutanix AHV
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: TopologyDataCenter
  data:
    - name: DC3
      index: 1
      amount_of_super_spines: 2
      member_of_groups:
        - topologies_dc
      super_spine_template: Edgecore-7726-32X-O_SUPER_SPINE
      vlan_pool: DC3-VLAN-POOL
      vni_pool: DC3-VNI-POOL
      l3_vni_pool: GLOBAL-L3VNI
      children:
        kind: TopologyPod
        data:
          - index: 1
            spine_template: Edgecore-7726-32X-O_SPINE
          - index: 2
            spine_template: Edgecore-7726-32X-O_SPINE
          - index: 3
            spine_template: Edgecore-7726-32X-O_SPINE
          - index: 4
            spine_template: Edgecore-7726-32X-O_SPINE
