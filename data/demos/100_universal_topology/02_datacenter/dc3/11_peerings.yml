---
# DC3 BGP peerings — eBGP unnumbered (RFC 5549, IPv6 link-local)
#
# Each device has a unique AS (65300–65362, BLs 65370–65371).
# Combined underlay+overlay: same eBGP sessions carry IPv4 unicast + L2VPN EVPN.
# No separate overlay sessions — EVPN runs on the underlay eBGP adjacencies.
# Interfaces: the physical Ethernet ports on each side of the link.
#
# Border-leafs (BL1/BL2) peer with both super-spines for fabric reachability.
# They are also EVPN multi-site BGWs: they re-originate EVPN Type-5 routes
# from the fabric to the DCI (PA4/PA6) and vice versa, enabling stretched
# VXLAN segments across DC1/DC2/DC3. Inter-tenant routing for customer
# namespaces (VRFs) is also handled here via RT import/export policy.

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ManagedBGPPeering
  data:
    # ── Border-leaf ↔ super-spine peerings ────────────────────────────────────
    - name: DC3-BL1-SS1-BGP
      description: "eBGP unnumbered — DC3-BL1 (AS65370) ↔ DC3-SS1 (AS65300)"
      session_type: EBGP_UNNUMBERED
      bfd_enabled: true
      bgp_processes:
        - DC3-BL1-BGP
        - DC3-SS1-BGP
      interface_capabilities:
        - kind: DcimPhysicalInterface
          data:
            device: DC3-BL1
            name: Ethernet112
        - kind: DcimPhysicalInterface
          data:
            device: DC3-SS1
            name: Ethernet32

    - name: DC3-BL1-SS2-BGP
