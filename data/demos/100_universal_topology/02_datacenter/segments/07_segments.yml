---
# Customer VRF namespaces for VXLAN-EVPN multi-tenant fabric
#
# Each namespace maps to one customer VRF with a unique L3 VNI
# for symmetric IRB (inter-VXLAN routing at the leaf).
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: IpamNamespace
  data:
    - name: "CUST001-PROD"
      description: "Customer 1 production VRF"
      l3_vni: 50001
      status: "active"
      owner: "Customer 1"

    - name: "CUST001-NONPROD"
      description: "Customer 1 non-production VRF (dev/staging)"
      l3_vni: 50002
      status: "active"
      owner: "Customer 1"

    - name: "CUST002-PROD"
      description: "Customer 2 production VRF"
      l3_vni: 50003
      status: "active"
      owner: "Customer 2"

    - name: "CUST002-NONPROD"
      description: "Customer 2 non-production VRF (dev/staging)"
      l3_vni: 50004
      status: "active"
      owner: "Customer 2"

    - name: "SHARED-SERVICES"
      description: "Shared infrastructure services VRF (DNS, NTP, monitoring)"
      l3_vni: 50100
      status: "active"

---
# Per-segment IP prefixes in customer namespaces
#
# Gateway IPs (.1) are allocated explicitly below as anycast IPs.
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: IpamPrefix
  data:
    # Customer 1 — production
    - prefix: "10.1.10.0/24"
      description: "Customer 1 prod — web frontend"
      status: active
      ip_namespace: "CUST001-PROD"

    - prefix: "10.1.20.0/24"
      description: "Customer 1 prod — app backend"
      status: active
      ip_namespace: "CUST001-PROD"

    - prefix: "10.1.30.0/24"
      description: "Customer 1 prod — database"
      status: active
      ip_namespace: "CUST001-PROD"

    # Customer 1 — non-production
    - prefix: "10.1.110.0/24"
      description: "Customer 1 dev — web frontend"
      status: active
      ip_namespace: "CUST001-NONPROD"

    # Customer 1 — non-production additional tiers (DC1 only)
    - prefix: "10.1.120.0/24"
      description: "Customer 1 dev — app backend"
      status: active
      ip_namespace: "CUST001-NONPROD"

    - prefix: "10.1.130.0/24"
      description: "Customer 1 dev — database"
      status: active
      ip_namespace: "CUST001-NONPROD"

    # Customer 2 — production
    - prefix: "10.2.10.0/24"
      description: "Customer 2 prod — web frontend"
      status: active
      ip_namespace: "CUST002-PROD"

    - prefix: "10.2.20.0/24"
      description: "Customer 2 prod — app backend"
      status: active
      ip_namespace: "CUST002-PROD"

    # Customer 2 — non-production (DC2 only)
    - prefix: "10.2.110.0/24"
      description: "Customer 2 dev — web frontend"
      status: active
      ip_namespace: "CUST002-NONPROD"

    - prefix: "10.2.120.0/24"
      description: "Customer 2 dev — app backend"
      status: active
      ip_namespace: "CUST002-NONPROD"

    # Shared services
    - prefix: "10.255.1.0/24"
      description: "Shared services — DNS, NTP, monitoring"
      status: active
      ip_namespace: "SHARED-SERVICES"

---
# Anycast gateway IPs — one per segment, shared across all leaves (symmetric IRB)
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: IpamIPAddress
  data:
    - address: "10.1.10.1/24"
      description: "Anycast GW — Customer 1 prod web-frontend"
      ip_namespace: "CUST001-PROD"

    - address: "10.1.20.1/24"
      description: "Anycast GW — Customer 1 prod app-backend"
      ip_namespace: "CUST001-PROD"

    - address: "10.1.30.1/24"
      description: "Anycast GW — Customer 1 prod database"
      ip_namespace: "CUST001-PROD"

    - address: "10.1.110.1/24"
      description: "Anycast GW — Customer 1 dev web-frontend"
      ip_namespace: "CUST001-NONPROD"

    - address: "10.1.120.1/24"
      description: "Anycast GW — Customer 1 dev app-backend"
      ip_namespace: "CUST001-NONPROD"

    - address: "10.1.130.1/24"
      description: "Anycast GW — Customer 1 dev database"
      ip_namespace: "CUST001-NONPROD"

    - address: "10.2.10.1/24"
      description: "Anycast GW — Customer 2 prod web-frontend"
      ip_namespace: "CUST002-PROD"

    - address: "10.2.20.1/24"
      description: "Anycast GW — Customer 2 prod app-backend"
      ip_namespace: "CUST002-PROD"

    - address: "10.2.110.1/24"
      description: "Anycast GW — Customer 2 dev web-frontend"
      ip_namespace: "CUST002-NONPROD"

    - address: "10.2.120.1/24"
      description: "Anycast GW — Customer 2 dev app-backend"
      ip_namespace: "CUST002-NONPROD"

    - address: "10.255.1.1/24"
      description: "Anycast GW — Shared services"
      ip_namespace: "SHARED-SERVICES"

---
# VXLAN segments — EVPN overlay, active in both DC1 and DC2
#
# Each segment is activated in every listed deployment by the add_vxlan_segment
# generator, which allocates a VLAN ID (from the DC's vlan_pool) and a L2 VNI
# (from the DC's vni_pool) and assigns the segment to all leaf/tor customer-
# facing interfaces in each DC.
#
# member_of_groups: [vxlan_segments] makes this node a target for the generator.
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ManagedVxlanSegment
  data:
    # ── Customer 1 — Production ──────────────────────────────────────────────
    - customer_name: "web-frontend"
      environment: "production"
      owner: "Customer 1"
      arp_suppression: true
      prefix:
        - - "10.1.10.0/24"
          - "CUST001-PROD"
      gateway:
        - "10.1.10.1/24"
        - "CUST001-PROD"
      deployments:
        - DC1
        - DC2
        - DC3
      member_of_groups:
        - vxlan_segments

    - customer_name: "app-backend"
      environment: "production"
      owner: "Customer 1"
      arp_suppression: true
      prefix:
        - - "10.1.20.0/24"
          - "CUST001-PROD"
      gateway:
        - "10.1.20.1/24"
        - "CUST001-PROD"
      deployments:
        - DC1
        - DC2
        - DC3
      member_of_groups:
        - vxlan_segments

    - customer_name: "database"
      environment: "production"
      owner: "Customer 1"
      arp_suppression: true
      prefix:
        - - "10.1.30.0/24"
          - "CUST001-PROD"
      gateway:
        - "10.1.30.1/24"
        - "CUST001-PROD"
      deployments:
        - DC1
        - DC2
        - DC3
      member_of_groups:
        - vxlan_segments

    # ── Customer 1 — Non-production (DC1 only) ───────────────────────────────
    - customer_name: "web-frontend"
      environment: "no-production"
      owner: "Customer 1"
      arp_suppression: true
      prefix:
        - - "10.1.110.0/24"
          - "CUST001-NONPROD"
      gateway:
        - "10.1.110.1/24"
        - "CUST001-NONPROD"
      deployments:
        - DC1
      member_of_groups:
        - vxlan_segments

    # ── Customer 2 — Production ──────────────────────────────────────────────
    - customer_name: "web-frontend"
      environment: "production"
      owner: "Customer 2"
      arp_suppression: true
      prefix:
        - - "10.2.10.0/24"
          - "CUST002-PROD"
      gateway:
        - "10.2.10.1/24"
        - "CUST002-PROD"
      deployments:
        - DC1
        - DC2
        - DC3
      member_of_groups:
        - vxlan_segments

    - customer_name: "app-backend"
      environment: "production"
      owner: "Customer 2"
      arp_suppression: true
      prefix:
        - - "10.2.20.0/24"
          - "CUST002-PROD"
      gateway:
        - "10.2.20.1/24"
        - "CUST002-PROD"
      deployments:
        - DC1
        - DC2
        - DC3
      member_of_groups:
        - vxlan_segments

    # ── Customer 1 — Non-production, DC1 only ───────────────────────────────
    - customer_name: "app-backend"
      environment: "no-production"
      owner: "Customer 1"
      arp_suppression: true
      prefix:
        - - "10.1.120.0/24"
          - "CUST001-NONPROD"
      gateway:
        - "10.1.120.1/24"
        - "CUST001-NONPROD"
      deployments:
        - DC1
      member_of_groups:
        - vxlan_segments

    - customer_name: "database"
      environment: "no-production"
      owner: "Customer 1"
      arp_suppression: true
      prefix:
        - - "10.1.130.0/24"
          - "CUST001-NONPROD"
      gateway:
        - "10.1.130.1/24"
        - "CUST001-NONPROD"
      deployments:
        - DC1
      member_of_groups:
        - vxlan_segments

    # ── Customer 2 — Non-production, DC2 only ───────────────────────────────
    - customer_name: "web-frontend"
      environment: "no-production"
      owner: "Customer 2"
      arp_suppression: true
      prefix:
        - - "10.2.110.0/24"
          - "CUST002-NONPROD"
      gateway:
        - "10.2.110.1/24"
        - "CUST002-NONPROD"
      deployments:
        - DC2
      member_of_groups:
        - vxlan_segments

    - customer_name: "app-backend"
      environment: "no-production"
      owner: "Customer 2"
      arp_suppression: true
      prefix:
        - - "10.2.120.0/24"
          - "CUST002-NONPROD"
      gateway:
        - "10.2.120.1/24"
        - "CUST002-NONPROD"
      deployments:
        - DC2
      member_of_groups:
        - vxlan_segments

    # ── Shared Services ───────────────────────────────────────────────────────
    - customer_name: "shared-infra"
      environment: "production"
      owner: "Customer 1"
      arp_suppression: false
      prefix:
        - - "10.255.1.0/24"
          - "SHARED-SERVICES"
      gateway:
        - "10.255.1.1/24"
        - "SHARED-SERVICES"
      deployments:
        - DC1
        - DC2
        - DC3
      member_of_groups:
        - vxlan_segments
