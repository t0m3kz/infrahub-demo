---
# Shared management capability profiles — NTP, Syslog, AAA
# These define DC-wide defaults applied to all capability nodes via profiles.
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ProfileManagedNTP
  data:
    - profile_name: dc-ntp-default
      profile_priority: 100
      description: "Default NTP profile for all DC switches"
      timezone: "UTC"
      status: active

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ProfileManagedSyslog
  data:
    - profile_name: dc-syslog-default
      profile_priority: 100
      description: "Default Syslog profile for all DC switches"
      status: active

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ProfileManagedAAA
  data:
    - profile_name: dc-aaa-default
      profile_priority: 100
      description: "Default AAA profile for all DC switches"
      authentication_order: tacacs_local
      authorization_commands: true
      accounting_enabled: true
      status: active
