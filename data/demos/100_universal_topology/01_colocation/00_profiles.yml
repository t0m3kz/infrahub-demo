---
# Shared management capability profiles for colocation edge devices
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ProfileManagedNTP
  data:
    - profile_name: colo-ntp-default
      profile_priority: 100
      description: "Default NTP profile for colocation edge devices"
      timezone: "UTC"
      status: active

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ProfileManagedSyslog
  data:
    - profile_name: colo-syslog-default
      profile_priority: 100
      description: "Default Syslog profile for colocation edge devices"
      status: active

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ProfileManagedAAA
  data:
    - profile_name: colo-aaa-default
      profile_priority: 100
      description: "Default AAA profile for colocation edge devices"
      authentication_order: tacacs_local
      authorization_commands: true
      accounting_enabled: true
      status: active
