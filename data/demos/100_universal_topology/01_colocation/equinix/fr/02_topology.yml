---
# Frankfurt colocation metro and zones (nested from colocation root)
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: TopologyColocation
  data:
    - name: EQUINIX
      children:
        kind: TopologyColocationMetro
        data:
          - name: FR
            location: ["fra"]
            children:
              kind: TopologyColocationZone
              data:
                - name: FR2
                - name: FR6
