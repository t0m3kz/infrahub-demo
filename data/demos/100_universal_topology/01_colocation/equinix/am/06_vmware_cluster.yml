---
# Equinix Metal + VMware (vSphere) cluster hosted in AM1
# https://www.equinix.com/partners/vmware
#
# Equinix Metal provides dedicated bare-metal servers; VMware vSphere 8 runs on top.
# 4 node pools by role: control-plane (vCenter), compute (ESXi hypervisors),
# storage (vSAN), management (NSX-T managers).

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtCluster
  data:
    - name: EQUINIX-AM1-VSPHERE-01
      description: "VMware vSphere cluster on Equinix Metal (Amsterdam AM1)"
      platform: vmware_vsphere
      version: "vSphere 8.0 U2"
      status: active
      ha_enabled: true
      deployment: AM1
      ip_namespace: default

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtNodePool
  data:

    # vCenter Server Appliance — single management host
    - name: control-plane
      cluster: EQUINIX-AM1-VSPHERE-01
      pool_type: control_plane
      scaling_mode: static
      status: active
      node_count: 1
      instance_flavor: "Equinix Metal s3.xlarge.x86"
      os_type: esxi
      os_version: "ESXi 8.0 U2"
      cpu_per_node: 8
      memory_per_node_gb: 64
      storage_per_node_gb: 480

    # ESXi hypervisor hosts running guest workload VMs
    - name: compute
      cluster: EQUINIX-AM1-VSPHERE-01
      pool_type: hypervisor
      scaling_mode: static
      status: active
      node_count: 4
      instance_flavor: "Equinix Metal m3.large.x86"
      os_type: esxi
      os_version: "ESXi 8.0 U2"
      cpu_per_node: 32
      memory_per_node_gb: 512
      storage_per_node_gb: 3840

    # vSAN storage nodes — all-flash
    - name: storage
      cluster: EQUINIX-AM1-VSPHERE-01
      pool_type: storage
      scaling_mode: static
      status: active
      node_count: 3
      instance_flavor: "Equinix Metal s3.xlarge.x86"
      os_type: esxi
      os_version: "ESXi 8.0 U2"
      cpu_per_node: 16
      memory_per_node_gb: 128
      storage_per_node_gb: 7680

    # NSX-T manager appliances
    - name: management
      cluster: EQUINIX-AM1-VSPHERE-01
      pool_type: management
      scaling_mode: static
      status: active
      node_count: 3
      instance_flavor: "Equinix Metal s3.xlarge.x86"
      os_type: esxi
      os_version: "ESXi 8.0 U2"
      cpu_per_node: 8
      memory_per_node_gb: 64
      storage_per_node_gb: 480

# ── EQUINIX-AM1-VSPHERE-01 capabilities ──────────────────────────────────────

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtCNI
  data:
    - name: EQUINIX-AM1-VSPHERE-01-CNI
      status: active
      plugin: nsx_t
      version: "NSX-T 4.1.2"
      pod_cidr: "192.168.0.0/16"
      service_cidr: "192.168.128.0/17"
      encapsulation: geneve
      bgp_enabled: true
      cluster_capabilities:
        - EQUINIX-AM1-VSPHERE-01

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtStorageBackend
  data:
    - name: EQUINIX-AM1-VSPHERE-01-STORAGE
      status: active
      backend_type: vsan
      version: "vSAN 8.0 U2"
      default_class: true
      reclaim_policy: retain
      cluster_capabilities:
        - EQUINIX-AM1-VSPHERE-01

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtIngress
  data:
    - name: EQUINIX-AM1-VSPHERE-01-INGRESS
      status: active
      controller: nsx_alb
      version: "NSX ALB 22.1.6"
      cluster_capabilities:
        - EQUINIX-AM1-VSPHERE-01

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtRegistry
  data:
    - name: EQUINIX-AM1-VSPHERE-01-REGISTRY
      status: active
      registry_type: content_library
      endpoint: "vcenter.am1.equinix.internal"
      insecure: false
      cluster_capabilities:
        - EQUINIX-AM1-VSPHERE-01

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtManagementPlane
  data:
    - name: EQUINIX-AM1-VSPHERE-01-MGMT
      status: active
      endpoint: "vcenter.am1.equinix.internal"
      endpoint_access: private
      port: 443
      auth_method: saml
      cluster_capabilities:
        - EQUINIX-AM1-VSPHERE-01

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: VirtMonitoring
  data:
    - name: EQUINIX-AM1-VSPHERE-01-MONITORING
      status: active
      stack: prometheus_grafana
      version: "vROps 8.14 / Prometheus exporter 0.12.0"
      retention_days: 30
      cluster_capabilities:
        - EQUINIX-AM1-VSPHERE-01
