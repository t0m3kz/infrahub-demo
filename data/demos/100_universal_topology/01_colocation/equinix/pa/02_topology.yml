---
# Paris colocation metro and zones (nested from colocation root)
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: TopologyColocation
  data:
    - name: EQUINIX
      children:
        kind: TopologyColocationMetro
        data:
          - name: PA
            location: ["par"]
            children:
              kind: TopologyColocationZone
              data:
                - name: PA4
                - name: PA6
