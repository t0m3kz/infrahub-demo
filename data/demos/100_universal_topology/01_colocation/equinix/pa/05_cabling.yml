  data:
    - name: CBL-PA4-EDGE01-EDGE02-01
      type: mmf
      deployment: PA4
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: PA4-EDGE-01
            name: Ethernet1/10
            description: "PA4-EDGE-02"
        - kind: DcimPhysicalInterface
          data:
            device: PA4-EDGE-02
            name: Ethernet1/10
            description: "PA4-EDGE-01"

    - name: CBL-PA6-EDGE01-EDGE02-01
      type: mmf
      deployment: PA6
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: PA6-EDGE-01
            name: Ethernet1/10
            description: "PA6-EDGE-02"
        - kind: DcimPhysicalInterface
          data:
            device: PA6-EDGE-02
            name: Ethernet1/10
            description: "PA6-EDGE-01"
