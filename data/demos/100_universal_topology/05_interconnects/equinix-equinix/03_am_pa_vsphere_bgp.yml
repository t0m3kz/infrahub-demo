---
# AM1 ↔ PA4 iBGP inter-site — vSphere cluster interconnect
#
# Connects the two vSphere clusters across Equinix Fabric so guest VMs can
# communicate between Amsterdam and Paris without hairpinning through the DCs.
#
# VTI pairs:
#   AM1-EDGE-01:VTI-AM1-PA4-VSPHERE-PRI ↔ PA4-EDGE-01:VTI-PA4-AM1-VSPHERE-PRI  → 10.255.0.16/31
#   AM1-EDGE-02:VTI-AM1-PA4-VSPHERE-SEC ↔ PA4-EDGE-02:VTI-PA4-AM1-VSPHERE-SEC  → 10.255.0.18/31
#
# Both edges run AS65000 (company WAN/distribution AS) — iBGP session.

# ── VTIs ──────────────────────────────────────────────────────────────────────

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: DcimVirtualInterface
  data:
    - name: VTI-AM1-PA4-VSPHERE-PRI
      description: "AM1-EDGE-01 VTI — primary Equinix Fabric interconnect to PA4 vSphere"
      role: uplink
      status: active
      device: AM1-EDGE-01

    - name: VTI-PA4-AM1-VSPHERE-PRI
      description: "PA4-EDGE-01 VTI — primary Equinix Fabric interconnect to AM1 vSphere"
      role: uplink
      status: active
      device: PA4-EDGE-01

    - name: VTI-AM1-PA4-VSPHERE-SEC
      description: "AM1-EDGE-02 VTI — secondary Equinix Fabric interconnect to PA4 vSphere"
      role: uplink
      status: active
      device: AM1-EDGE-02

    - name: VTI-PA4-AM1-VSPHERE-SEC
      description: "PA4-EDGE-02 VTI — secondary Equinix Fabric interconnect to AM1 vSphere"
      role: uplink
      status: active
      device: PA4-EDGE-02

---
# ── Virtual circuits ──────────────────────────────────────────────────────────

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: TopologyVirtualCircuit
  data:
    - name: VC-EQX-AM1-PA4-VSPHERE-PRIMARY
      description: "Primary Equinix Fabric inter-site VC — AM1-EDGE-01 to PA4-EDGE-01"
      link_type: equinix_fabric
      bandwidth: 10000
      status: active
      provider: Equinix
      locations:
        - AM1
        - PA4
      interfaces:
        - - AM1-EDGE-01
          - VTI-AM1-PA4-VSPHERE-PRI
        - - PA4-EDGE-01
          - VTI-PA4-AM1-VSPHERE-PRI

    - name: VC-EQX-AM1-PA4-VSPHERE-SECONDARY
      description: "Secondary Equinix Fabric inter-site VC — AM1-EDGE-02 to PA4-EDGE-02"
      link_type: equinix_fabric
      bandwidth: 10000
      status: active
      provider: Equinix
      locations:
        - AM1
        - PA4
      interfaces:
        - - AM1-EDGE-02
          - VTI-AM1-PA4-VSPHERE-SEC
        - - PA4-EDGE-02
          - VTI-PA4-AM1-VSPHERE-SEC

---
# ── P2P IPs (extends 10.255.0.0/24 block, next free after .15) ───────────────

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: DcimVirtualInterface
  data:
    - name: VTI-AM1-PA4-VSPHERE-PRI
      device: AM1-EDGE-01
      ip_address:
        data:
          address: "10.255.0.16/31"
          ip_namespace: default

    - name: VTI-PA4-AM1-VSPHERE-PRI
      device: PA4-EDGE-01
      ip_address:
        data:
          address: "10.255.0.17/31"
          ip_namespace: default

    - name: VTI-AM1-PA4-VSPHERE-SEC
      device: AM1-EDGE-02
      ip_address:
        data:
          address: "10.255.0.18/31"
          ip_namespace: default

    - name: VTI-PA4-AM1-VSPHERE-SEC
      device: PA4-EDGE-02
      ip_address:
        data:
          address: "10.255.0.19/31"
          ip_namespace: default

---
# ── Loopback0 router-ID interfaces for new edge routers ───────────────────────
# Next free /32s after 10.255.0.5 (PA4-EDGE-01 cloud BGP)

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: DcimVirtualInterface
  data:
    - name: Loopback0
      description: "Router-ID loopback — AM1-EDGE-01"
      role: loopback
      status: active
      device: AM1-EDGE-01
      ip_address:
        data:
          address: "10.255.0.6/32"
          ip_namespace: default

    - name: Loopback0
      description: "Router-ID loopback — AM1-EDGE-02"
      role: loopback
      status: active
      device: AM1-EDGE-02
      ip_address:
        data:
          address: "10.255.0.7/32"
          ip_namespace: default

    - name: Loopback0
      description: "Router-ID loopback — PA4-EDGE-02"
      role: loopback
      status: active
      device: PA4-EDGE-02
      ip_address:
        data:
          address: "10.255.0.8/32"
          ip_namespace: default

---
# ── BGP processes (new — PA4-EDGE-01-DCI-BGP already defined in datacenter-equinix/04_dci_bgp.yml) ──

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ManagedBGP
  data:
    - name: AM1-EDGE-01-DCI-BGP
      description: "DCI BGP process — AM1-EDGE-01 (AS65000, Amsterdam vSphere interconnect)"
      status: active
      capabilities:
        - AM1-EDGE-01
      router_id:
        - "10.255.0.6/32"
        - default
      local_as: "AS65000"

    - name: AM1-EDGE-02-DCI-BGP
      description: "DCI BGP process — AM1-EDGE-02 (AS65000, Amsterdam vSphere interconnect)"
      status: active
      capabilities:
        - AM1-EDGE-02
      router_id:
        - "10.255.0.7/32"
        - default
      local_as: "AS65000"

    - name: PA4-EDGE-02-DCI-BGP
      description: "DCI BGP process — PA4-EDGE-02 (AS65000, Paris vSphere interconnect)"
      status: active
      capabilities:
        - PA4-EDGE-02
      router_id:
        - "10.255.0.8/32"
        - default
      local_as: "AS65000"

---
# ── BGP peerings ──────────────────────────────────────────────────────────────

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ManagedBGPPeering
  data:
    - name: AM1-PA4-VSPHERE-BGP-PRIMARY
      description: "iBGP inter-site — AM1-EDGE-01 (AS65000) ↔ PA4-EDGE-01 (AS65000) via Equinix Fabric"
      session_type: IBGP
      bfd_enabled: true
      bgp_processes:
        - AM1-EDGE-01-DCI-BGP
        - PA4-EDGE-01-DCI-BGP
      interface_capabilities:
        - kind: DcimVirtualInterface
          data:
            device: AM1-EDGE-01
            name: VTI-AM1-PA4-VSPHERE-PRI
        - kind: DcimVirtualInterface
          data:
            device: PA4-EDGE-01
            name: VTI-PA4-AM1-VSPHERE-PRI

    - name: AM1-PA4-VSPHERE-BGP-SECONDARY
      description: "iBGP inter-site — AM1-EDGE-02 (AS65000) ↔ PA4-EDGE-02 (AS65000) via Equinix Fabric"
      session_type: IBGP
      bfd_enabled: true
      bgp_processes:
        - AM1-EDGE-02-DCI-BGP
        - PA4-EDGE-02-DCI-BGP
      interface_capabilities:
        - kind: DcimVirtualInterface
          data:
            device: AM1-EDGE-02
            name: VTI-AM1-PA4-VSPHERE-SEC
        - kind: DcimVirtualInterface
          data:
            device: PA4-EDGE-02
            name: VTI-PA4-AM1-VSPHERE-SEC
