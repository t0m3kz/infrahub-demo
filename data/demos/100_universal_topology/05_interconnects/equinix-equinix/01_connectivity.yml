      description: "FR2 VTI for primary Equinix fabric interconnect to AM1"
      role: uplink
      status: active
      device: FR2-EDGE-01

    - name: VTI-AM1-FR2-PRI
      description: "AM1 VTI for primary Equinix fabric interconnect to FR2"
      role: uplink
      status: active
      device: AM1-EDGE-01

