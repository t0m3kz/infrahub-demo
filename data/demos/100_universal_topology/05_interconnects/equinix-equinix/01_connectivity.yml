---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: TopologyVirtualCircuit
  data:
    - name: VC-EQX-FR2-AM1-PRIMARY
      description: "Primary Equinix Fabric interconnect between FR2 and AM1"
      link_type: equinix_fabric
      bandwidth: 10000
      status: active
      provider: Equinix
      locations:
        - FR2
        - AM1
      interfaces:
        - - FR2-EDGE-01
          - VTI-FR2-AM1-PRI
        - - AM1-EDGE-01
          - VTI-AM1-FR2-PRI

    - name: VC-EQX-FR6-AM4-SECONDARY
      description: "Secondary Equinix Fabric interconnect between FR6 and AM4"
      link_type: equinix_fabric
      bandwidth: 10000
      status: active
      provider: Equinix
