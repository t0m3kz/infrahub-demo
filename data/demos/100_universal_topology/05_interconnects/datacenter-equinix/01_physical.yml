      status: active
      provider: Equinix
      member_of_groups:
        - physical_circuits
      locations:
        - DC2
        - PA6
      interfaces:
        - - DC2-BL2
          - Ethernet1/9
        - - PA6-EDGE-01
          - Ethernet1/2
      provider_a:
        - EQX-DC2-PATCH-01
        - Port2
