---
# Azure westeurope: ExpressRoute from Equinix AM1 to VNet Gateway
# Physical path: AM1-EDGE-01 → Equinix cross-connect → Azure ER endpoint at AM1
# AM1 is in Amsterdam, which is the Azure westeurope peering location
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: CloudDirectConnect
  data:
    - name: C001-ER-AM1-WESTEUROPE
      account: CNRD-AZURE
      region: westeurope
      bandwidth: 1Gbps
      connection_type: dedicated
      vlan_id: 200
      location: am1
      physical_devices:
        - AM1-EDGE-01

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: CloudVirtualInterface
  data:
    - name: C001-VIF-PRIVATE-AM1
      vif_type: private
      vlan_id: 200
      direct_connect: C001-ER-AM1-WESTEUROPE

---
# Virtual interface on AM1-EDGE-01 for the Azure ExpressRoute BGP session (sub-i
# Equinix Fabric carries the connection as a virtual circuit — no physical cross
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: DcimVirtualInterface
  data:
    - name: Ethernet1/2.200
      description: "Azure ExpressRoute private peering — VLAN 200 on AM1-EDGE-01"  # yamllint disable-line rule:line-length
      role: uplink
      status: active
      device: AM1-EDGE-01

---
# Virtual Circuit: AM1-EDGE-01 sub-interface ↔ Azure VNet Gateway via ExpressRou
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: TopologyVirtualCircuit
  data:
    - name: VC-CNRD-AM1-AZURE-WESTEUROPE-ER
      description: "CNRD Azure ExpressRoute from Equinix AM1 to westeurope VNet Gateway"  # yamllint disable-line rule:line-length
      link_type: express_route_azure
      bandwidth: 1000
      status: active
      cloud_resource_id: er-cust1am1001
      provider: Azure
      locations:
        - AM1
        - westeurope
      interfaces:
        - - AM1-EDGE-01
          - Ethernet1/2.200
      cloud_endpoints:
        - C001-ER-AM1-WESTEUROPE
        - C001-ERGW-WESTEUROPE

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ManagedExternalPeer
  data:
    - name: AZURE-ER-PEER-AM1
      peer_type: CLOUD
      provider_name: Azure
      circuit_id: C001-ER-AM1-WESTEUROPE
      asn: "AS12076"
