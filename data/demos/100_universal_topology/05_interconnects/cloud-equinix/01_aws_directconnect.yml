---
# AWS eu-central-1: Direct Connect from Equinix FR2 to Transit Gateway
# Physical path: FR2-EDGE-01 → Equinix cross-connect → AWS DX endpoint at FR2
# Virtual interface type: transit (attaches to TGW)
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: CloudDirectConnect
  data:
    - name: C001-DX-FR2-EU-CENTRAL-1
      account: C001-AWS
      region: eu-central-1
      bandwidth: 1Gbps
      connection_type: dedicated
      vlan_id: 100
      location: fr2
      physical_devices:
        - FR2-EDGE-01

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: CloudVirtualInterface
  data:
    - name: C001-VIF-TRANSIT-FR2
      vif_type: transit
      vlan_id: 100
      direct_connect: C001-DX-FR2-EU-CENTRAL-1
      transit_gateway: C001-TGW-EU-CENTRAL-1

---
# Virtual interface on FR2-EDGE-01 for the AWS Direct Connect BGP session (sub-i
# Equinix Fabric carries the connection as a virtual circuit — no physical cross
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: DcimVirtualInterface
  data:
    - name: Ethernet1/2.100
      description: "AWS Direct Connect transit VIF — VLAN 100 on FR2-EDGE-01"
      role: uplink
      status: active
      device: FR2-EDGE-01

---
# Virtual Circuit: FR2-EDGE-01 sub-interface ↔ AWS TGW via Direct Connect
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: TopologyVirtualCircuit
  data:
    - name: VC-CNRD-FR2-AWS-EU-CENTRAL-1-DX
      description: "CNRD AWS Direct Connect from Equinix FR2 to eu-central-1 Transit Gateway"  # yamllint disable-line rule:line-length
      link_type: direct_connect_aws
      bandwidth: 1000
      status: active
      cloud_resource_id: dxcon-cust1fr2001
      provider: AWS
      locations:
        - FR2
        - eu-central-1
      interfaces:
        - - FR2-EDGE-01
          - Ethernet1/2.100
      cloud_endpoints:
        - C001-DX-FR2-EU-CENTRAL-1
        - C001-TGW-EU-CENTRAL-1

---
# ManagedExternalPeer: AWS-side BGP peer reachable over the Direct Connect VIF
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ManagedExternalPeer
  data:
    - name: AWS-DX-TRANSIT-PEER-FR2
      peer_type: CLOUD
      provider_name: AWS
      circuit_id: C001-DX-FR2-EU-CENTRAL-1
      asn: "AS64512"
