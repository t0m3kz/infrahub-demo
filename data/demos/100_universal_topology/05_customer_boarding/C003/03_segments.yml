---
# C003 (Vaultex Inc.) — customer boarding: DC3 VXLAN segments
#
# All segments reference DC3-C003-VSX-01 as the firewall with PBR enabled.
# Inbound traffic on DC3 is redirected by the leaf PBR policy to the
# Check Point VSX virtual system before being forwarded into the
# C003-DC3-PROD namespace (VRF).

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ManagedVxlanSegment
  data:
    - customer_name: "dmz"
      environment: "p"
      owner: "C003"
      arp_suppression: true
      prefix:
        - - "10.3.10.0/24"
          - "C003-DC3-PROD"
      gateway:
        - "10.3.10.1/24"
        - "C003-DC3-PROD"
      deployments:
        - DC3
      inline_service: DC3-FW-HA
      pbr_enabled: true
      member_of_groups:
        - vxlan_segments

    - customer_name: "app-backend"
      environment: "p"
      owner: "C003"
      arp_suppression: true
      prefix:
        - - "10.3.20.0/24"
          - "C003-DC3-PROD"
      gateway:
        - "10.3.20.1/24"
        - "C003-DC3-PROD"
      deployments:
        - DC3
      inline_service: DC3-FW-HA
      pbr_enabled: true
      member_of_groups:
        - vxlan_segments

    - customer_name: "vault-core"
      environment: "p"
      owner: "C003"
      arp_suppression: true
      prefix:
        - - "10.3.30.0/24"
          - "C003-DC3-PROD"
      gateway:
        - "10.3.30.1/24"
        - "C003-DC3-PROD"
      deployments:
        - DC3
      inline_service: DC3-FW-HA
      pbr_enabled: true
      member_of_groups:
        - vxlan_segments

    - customer_name: "database"
      environment: "p"
      owner: "C003"
      arp_suppression: true
      prefix:
        - - "10.3.40.0/24"
          - "C003-DC3-PROD"
      gateway:
        - "10.3.40.1/24"
        - "C003-DC3-PROD"
      deployments:
        - DC3
      inline_service: DC3-FW-HA
      pbr_enabled: true
      member_of_groups:
        - vxlan_segments
