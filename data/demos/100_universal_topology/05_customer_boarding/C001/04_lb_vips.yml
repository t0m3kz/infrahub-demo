---
# C001 (Nordix Ltd.) — DC3 Load Balancer VIP services
# One VIP per AppComponent — no shared hostnames across applications.

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: LoadbalancerVIP
  data:

    # ── trade-portal / production ─────────────────────────────────────────────
    - hostname: c001-trade-web.dc3.internal
      protocol: https
      port: 443
      status: active
      description: "C001 trade-portal web-frontend — HTTPS"
      load_balancer: DC3-LB-HA

    - hostname: c001-trade-web.dc3.internal
      protocol: http
      port: 80
      status: active
      description: "C001 trade-portal web-frontend — HTTP (redirect)"
      load_balancer: DC3-LB-HA

    - hostname: c001-trade-api.dc3.internal
      protocol: https
      port: 8443
      status: active
      description: "C001 trade-portal api-gateway"
      load_balancer: DC3-LB-HA

    - hostname: c001-trade-db.dc3.internal
      protocol: tcp
      port: 5432
      status: active
      description: "C001 trade-portal order-db"
      load_balancer: DC3-LB-HA

    # ── trade-portal / nonprod ────────────────────────────────────────────────
    - hostname: c001-trade-web-n.dc3.internal
      protocol: https
      port: 443
      status: active
      description: "C001 trade-portal web-frontend nonprod — HTTPS"
      load_balancer: DC3-LB-HA

    - hostname: c001-trade-api-n.dc3.internal
      protocol: https
      port: 8443
      status: active
      description: "C001 trade-portal api-gateway nonprod"
      load_balancer: DC3-LB-HA

    - hostname: c001-trade-db-n.dc3.internal
      protocol: tcp
      port: 5432
      status: active
      description: "C001 trade-portal order-db nonprod"
      load_balancer: DC3-LB-HA

    # ── auth-platform / production ────────────────────────────────────────────
    - hostname: c001-auth-api.dc3.internal
      protocol: https
      port: 8443
      status: active
      description: "C001 auth-platform auth-api"
      load_balancer: DC3-LB-HA

    - hostname: c001-auth-db.dc3.internal
      protocol: tcp
      port: 5432
      status: active
      description: "C001 auth-platform identity-db"
      load_balancer: DC3-LB-HA

    # ── risk-engine / production ──────────────────────────────────────────────
    - hostname: c001-risk-api.dc3.internal
      protocol: https
      port: 8443
      status: active
      description: "C001 risk-engine analytics-worker"
      load_balancer: DC3-LB-HA

    - hostname: c001-risk-db.dc3.internal
      protocol: tcp
      port: 5432
      status: active
      description: "C001 risk-engine risk-db"
      load_balancer: DC3-LB-HA

