---
# C001 (Nordix Ltd.) — customer boarding: namespace (VRF)
#
# IpamNamespace maps 1:1 to a VRF on the VXLAN fabric.
# The L3 VNI is allocated from the shared GLOBAL-L3VNI pool and
# distributed via EVPN type-5 routes to all DC3 leafs.
# All customer traffic entering through the virtual firewall
# is forwarded into this namespace after inspection.

apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: IpamNamespace
  data:
    - name: "C001-DC3-PROD"
      description: "Nordix Ltd. production VRF on DC3"
      l3_vni: 50011
      status: "active"
      owner: "C001"
      member_of_groups:
        - vrf_namespaces

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: IpamPrefix
  data:
    - prefix: "10.1.10.0/24"
      description: "C001 prod web-frontend subnet (DC3)"
      status: active
      role: customer
      ip_namespace: "C001-DC3-PROD"

    - prefix: "10.1.20.0/24"
      description: "C001 prod app-backend subnet (DC3)"
      status: active
      role: customer
      ip_namespace: "C001-DC3-PROD"

    - prefix: "10.1.30.0/24"
      description: "C001 prod database subnet (DC3)"
      status: active
      role: customer
      ip_namespace: "C001-DC3-PROD"

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: IpamIPAddress
  data:
    - address: "10.1.10.1/24"
      description: "Anycast GW — C001 prod web-frontend (DC3)"
      ip_namespace: "C001-DC3-PROD"

    - address: "10.1.20.1/24"
      description: "Anycast GW — C001 prod app-backend (DC3)"
      ip_namespace: "C001-DC3-PROD"

    - address: "10.1.30.1/24"
      description: "Anycast GW — C001 prod database (DC3)"
      ip_namespace: "C001-DC3-PROD"
