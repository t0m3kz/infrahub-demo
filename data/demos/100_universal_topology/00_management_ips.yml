# Pre-create shared management IPs referenced by ManagedNTPServer, ManagedSyslogServer, and ManagedAAAServer.
# This file is named 00_ so infrahubctl loads it before any 05_capabilities.yml file.
# The address field on ManagedNTPServer/ManagedSyslogServer/ManagedAAAServer is a relationship
# (hfid lookup) — the IpamIPAddress node must exist before the server entry is created.
---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: IpamIPAddress
  data:
    # ── NTP servers ────────────────────────────────────────────────────────────
    # Cloudflare NTP (used by most sites)
    - address: "162.159.200.1/32"
      ip_namespace: default

    - address: "162.159.200.123/32"
      ip_namespace: default

    # Equinix AM uses a different Cloudflare NTP anycast
    - address: "162.159.210.11/32"
      ip_namespace: default

    # ── Syslog collectors ──────────────────────────────────────────────────────
    - address: "10.0.0.100/32"
      ip_namespace: default

    # ── AAA / TACACS servers ───────────────────────────────────────────────────
    - address: "10.0.0.200/32"
      ip_namespace: default

    - address: "10.0.0.201/32"
      ip_namespace: default
