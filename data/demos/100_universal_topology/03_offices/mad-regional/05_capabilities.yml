---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ManagedNTP
  data:
    - name: OFC-MAD-NTP
      status: active
      profiles:
        - office-ntp-default
      capabilities:
        - OFC-MAD-REGIONAL-EDGE-01
        - OFC-MAD-REGIONAL-EDGE-02
        - OFC-MAD-REGIONAL-ACC-01
        - OFC-MAD-REGIONAL-ACC-02
        - OFC-MAD-REGIONAL-AP-01
        - OFC-MAD-REGIONAL-AP-02
        - OFC-MAD-REGIONAL-AP-03
        - OFC-MAD-REGIONAL-AP-04
        - OFC-MAD-REGIONAL-AP-05
        - OFC-MAD-REGIONAL-AP-06
        - OFC-MAD-REGIONAL-AP-07
        - OFC-MAD-REGIONAL-AP-08
      servers:
        kind: ManagedNTPServer
        data:
          - name: primary
            address:
              - "162.159.200.1/32"
              - "default"
            prefer: true
            version: 4
          - name: secondary
            address:
              - "162.159.200.123/32"
              - "default"
            prefer: false
            version: 4

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ManagedSyslog
  data:
    - name: OFC-MAD-Syslog
      status: active
      profiles:
        - office-syslog-default
      capabilities:
        - OFC-MAD-REGIONAL-EDGE-01
        - OFC-MAD-REGIONAL-EDGE-02
        - OFC-MAD-REGIONAL-ACC-01
        - OFC-MAD-REGIONAL-ACC-02
        - OFC-MAD-REGIONAL-AP-01
        - OFC-MAD-REGIONAL-AP-02
        - OFC-MAD-REGIONAL-AP-03
        - OFC-MAD-REGIONAL-AP-04
        - OFC-MAD-REGIONAL-AP-05
        - OFC-MAD-REGIONAL-AP-06
        - OFC-MAD-REGIONAL-AP-07
        - OFC-MAD-REGIONAL-AP-08
      servers:
        kind: ManagedSyslogServer
