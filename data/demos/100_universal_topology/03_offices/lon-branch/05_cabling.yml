---
# London branch office cabling
# EDGE GE3 → ACC uplink | APs eth0 → ACC Gi1/0/10-11 | Printer eth0 → ACC Gi1/0/20
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: DcimCable
  data:
    - name: CBL-LON-EDGE01-GE3-ACC01-GI1
      type: copper
      deployment: OFC-LON-BRANCH-01
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: OFC-LON-BRANCH-EDGE-01
            name: GE3
            description: "OFC-LON-BRANCH-ACC-01"
        - kind: DcimPhysicalInterface
          data:
            device: OFC-LON-BRANCH-ACC-01
            name: GigabitEthernet1/0/1
            description: "OFC-LON-BRANCH-EDGE-01"

    - name: CBL-LON-AP01-ACC01-GI10
      type: copper
      deployment: OFC-LON-BRANCH-01
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: OFC-LON-BRANCH-AP-01
            name: eth0
            description: "OFC-LON-BRANCH-ACC-01"
        - kind: DcimPhysicalInterface
          data:
            device: OFC-LON-BRANCH-ACC-01
            name: GigabitEthernet1/0/10
            description: "OFC-LON-BRANCH-AP-01"

    - name: CBL-LON-AP02-ACC01-GI11
      type: copper
      deployment: OFC-LON-BRANCH-01
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: OFC-LON-BRANCH-AP-02
            name: eth0
            description: "OFC-LON-BRANCH-ACC-01"
        - kind: DcimPhysicalInterface
          data:
            device: OFC-LON-BRANCH-ACC-01
            name: GigabitEthernet1/0/11
            description: "OFC-LON-BRANCH-AP-02"

    - name: CBL-LON-PRN01-ACC01-GI20
      type: copper
      deployment: OFC-LON-BRANCH-01
      endpoints:
        - kind: DcimPhysicalInterface
          data:
            device: OFC-LON-BRANCH-PRN-01
            name: eth0
            description: "OFC-LON-BRANCH-ACC-01"
        - kind: DcimPhysicalInterface
          data:
            device: OFC-LON-BRANCH-ACC-01
            name: GigabitEthernet1/0/20
            description: "OFC-LON-BRANCH-PRN-01"
