# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/menu/latest.json
---
apiVersion: infrahub.app/v1
kind: Menu
spec:
  data:
    # ===================== ORGANIZATION =====================
    - namespace: Organization
      name: MainMenu
      label: Organization
      icon: "mdi:domain"
      kind: OrganizationGeneric
      children:
        data:
          - namespace: Organization
            name: Manufacturer
            label: Manufacturers
            kind: OrganizationManufacturer
            icon: "mdi:factory"

          - namespace: Organization
            name: Provider
            label: Providers
            kind: OrganizationProvider
            icon: "mdi:cloud-outline"

          - namespace: Organization
            name: Customer
            label: Customers
            kind: OrganizationCustomer
            icon: "mdi:account-group"

          - namespace: Organization
            name: Contact
            label: Contacts
            kind: OrganizationContact
            icon: "mdi:user"

    # ===================== LOCATION =====================
    - namespace: Location
      name: Generic
      label: Location
      kind: LocationGeneric
      icon: "mdi:map-marker"
    # ──────────────────────────────────────────────────────────────────────────
    # TOPOLOGY — deployments and network designs
    # ──────────────────────────────────────────────────────────────────────────
    - namespace: Topology
      name: TopologyMenu
      label: Topology
      icon: "mdi:graph"
      kind: TopologyDeployment

    # ──────────────────────────────────────────────────────────────────────────
    # DESIGN — fabric and pod layout blueprints
    # ──────────────────────────────────────────────────────────────────────────
    - namespace: Topology
      name: DesignMenu
      label: Design
      icon: "mdi:pencil-ruler"
      children:
        data:
          - namespace: Topology
            name: DesignDataCenterItem
            label: Fabric Designs
            kind: TopologyDataCenterDesign
            icon: "mdi:floor-plan"

          - namespace: Topology
            name: DesignPodItem
            label: Pod Designs
            kind: TopologyPodDesign
            icon: "mdi:view-grid-outline"

          - namespace: Topology
            name: DesignElementItem
            label: Network Elements
            kind: TopologyElement
            icon: "mdi:view-grid-outline"

    # ──────────────────────────────────────────────────────────────────────────
    # INVENTORY — physical devices and hardware
    # ──────────────────────────────────────────────────────────────────────────
    - namespace: Inventory
      name: MainMenu
      label: Inventory
      icon: "mdi:warehouse"
      children:
        data:
          # --------- Device Inventory ---------
          - namespace: Dcim
            name: InventoryMenu
            label: Device Inventory
            icon: "mdi:server-plus"
            description: "Hardware devices, interfaces, and modules"
            children:
              data:
                - namespace: Dcim
                  name: Device
                  label: Devices
                  kind: DcimDevice
                  icon: "mdi:server"
                  description: "All physical and virtual devices"

                - name: Interface
                  namespace: Dcim
                  label: Interfaces
                  icon: "mdi:ethernet"
                  kind: DcimInterface
                  description: "Network and management interfaces"

                - name: GenericSFP
                  namespace: Dcim
                  label: SFP Modules
                  icon: "mdi:expansion-card"
                  kind: DcimGenericSFP
                  description: "Optical and network transceiver modules"

                - name: Cables
                  namespace: Dcim
                  label: Cabling & Connections
                  icon: "mdi:cable-data"
                  kind: DcimCable
                  description: "Cabling between devices"
          # --------- Device Catalog ---------
          - namespace: Dcim
            name: CatalogMenu
            label: Device Catalog
            icon: "mdi:package-variant-closed"
            description: "Device types and platform definitions"
            children:
              data:
                - namespace: Dcim
                  name: DeviceType
                  label: Device Types
                  kind: DcimDeviceType
                  icon: "mdi:package-variant"
                  description: "Device model definitions and specifications"

                - namespace: Dcim
                  name: Platform
                  label: Platforms
                  kind: DcimPlatform
                  icon: "mdi:chip"
                  description: "Operating system and firmware platforms"
          # ── Circuits ───────────────────────────────────────────────────────
          - namespace: Topology
            name: CircuitsMenu
            label: Circuits
            icon: "mdi:transit-connection-variant"
            children:
              data:
                - namespace: Topology
                  name: PhysicalCircuitItem
                  label: Physical Circuits
                  kind: TopologyPhysicalCircuit
                  icon: "mdi:cable-data"

                - namespace: Topology
                  name: VirtualCircuitItem
                  label: Virtual Circuits
                  kind: TopologyVirtualCircuit
                  icon: "mdi:cloud-sync"

          # --------- Virtualisation Inventory ---------
          - namespace: Virt
            name: VirtMenu
            label: Virtualisation
            icon: "mdi:server-network"
            description: "On-prem and cloud-managed virtualisation clusters"
            children:
              data:
                - namespace: Virt
                  name: ClusterItem
                  label: Clusters
                  kind: VirtCluster
                  icon: "mdi:server-network"
                  description: "Kubernetes, vSphere, Nutanix, and cloud-managed clusters"

                - namespace: Virt
                  name: NodePoolItem
                  label: Node Pools
                  kind: VirtNodePool
                  icon: "mdi:server-plus"
                  description: "Node groups, ESXi host pools, and cloud ASGs"

          # --------- Cloud Inventory ---------
          - namespace: Cloud
            name: Resource
            label: Public Cloud Resources
            kind: CloudResource
            icon: "mdi:cloud"
            description: "All public cloud resources"

    # ──────────────────────────────────────────────────────────────────────────
    # ROUTING — peerings, protocol configs, static routes
    # ──────────────────────────────────────────────────────────────────────────
    - namespace: Managed
      name: RoutingMenu
      label: Routing
      icon: "mdi:router-network"
      children:
        data:

          # ── All Peerings (generic view) ────────────────────────────────────
          - namespace: Managed
            name: AllPeeringsItem
            label: All Peerings
            kind: ManagedPeering
            icon: "mdi:transit-connection-horizontal"

          # ── BGP ────────────────────────────────────────────────────────────
          - namespace: Managed
            name: BgpMenu
            label: BGP
            icon: "mdi:transit-connection"
            children:
              data:
                - namespace: Managed
                  name: BgpPeeringItem
                  label: BGP Peerings
                  kind: ManagedBGPPeering
                  icon: "mdi:transit-connection"

                - namespace: Routing
                  name: IpAsnItem
                  label: Autonomous Systems
                  kind: RoutingAutonomousSystem
                  icon: "mdi:numeric"

                - namespace: Managed
                  name: ExternalFabricPeeringItem
                  label: External Fabric Peerings
                  kind: ManagedExternalFabricPeering
                  icon: "mdi:wan"

                - namespace: Managed
                  name: ExternalPeerItem
                  label: External Peers
                  kind: ManagedExternalPeer
                  icon: "mdi:account-network"


          # ── OSPF ───────────────────────────────────────────────────────────
          - namespace: Managed
            name: OspfMenu
            label: OSPF
            icon: "mdi:transit-connection-variant"
            children:
              data:
                - namespace: Managed
                  name: OspfPeeringItem
                  label: OSPF Peerings
                  kind: ManagedOSPFPeering
                  icon: "mdi:transit-connection-variant"

                - namespace: Routing
                  name: OspfAreaItem
                  label: OSPF Areas
                  kind: RoutingOSPFArea
                  icon: "mdi:hexagon-outline"

                - namespace: Managed
                  name: OspfLinkItem
                  label: OSPF Link Services
                  kind: ManagedOSPFLinkService
                  icon: "mdi:link-variant"

          # ── Static Routes ───────────────────────────────────────────────────
          - namespace: Cloud
            name: StaticRoutesItem
            label: Static Routes
            kind: CloudRoute
            icon: "mdi:routes"

    # ──────────────────────────────────────────────────────────────────────────
    # SERVICES — network services organised by function
    # ──────────────────────────────────────────────────────────────────────────
    - namespace: Managed
      name: ServicesMenu
      label: Services
      icon: "mdi:cog-transfer"
      children:
        data:
          # ── Network Segments ───────────────────────────────────────────────
          - namespace: Platform
            name: SegmentsItem
            label: Network Segments
            kind: ManagedNetworkSegment
            icon: "mdi:layers-triple"

          # ── Infrastructure Services ────────────────────────────────────────
          - namespace: Managed
            name: InfraServicesMenu
            label: Infrastructure Services
            icon: "mdi:server-plus"
            children:
              data:
                - namespace: Managed
                  name: NtpItem
                  label: NTP
                  kind: ManagedNTP
                  icon: "mdi:clock-outline"

                - namespace: Managed
                  name: SyslogItem
                  label: Syslog
                  kind: ManagedSyslog
                  icon: "mdi:text-box-multiple-outline"

                - namespace: Managed
                  name: SnmpItem
                  label: SNMP
                  kind: ManagedSNMP
                  icon: "mdi:gauge"

                - namespace: Managed
                  name: AaaItem
                  label: AAA
                  kind: ManagedAAA
                  icon: "mdi:shield-account-outline"

          # ── Traffic Management ─────────────────────────────────────────────
          - namespace: Managed
            name: TrafficManagementMenu
            label: Traffic Management
            icon: "mdi:transit-connection-variant"
            children:
              data:
                - namespace: Platform
                  name: LoadBalancerItem
                  label: Load Balancers
                  kind: ManagedLoadBalancer
                  icon: "mdi:scale-balance"

                - namespace: Managed
                  name: ForwardingProxyItem
                  label: Proxy & Forwarding
                  kind: ManagedForwardingProxy
                  icon: "mdi:web"

    # ──────────────────────────────────────────────────────────────────────────
    # SECURITY — zones, profiles, policies
    # ──────────────────────────────────────────────────────────────────────────
    - namespace: Security
      name: SecurityMenu
      label: Security
      icon: "mdi:shield-lock"
      children:
        data:
          - namespace: Security
            name: SecurityZoneItem
            label: Security Zones
            kind: SecurityZone
            icon: "mdi:shield-half-full"

          - namespace: Security
            name: SecurityProfileItem
            label: Security Profiles
            kind: SecuritySecurityProfile
            icon: "mdi:shield-account"

          - namespace: Security
            name: SecurityPolicyItem
            label: Security Policies
            kind: SecurityPolicy
            icon: "mdi:shield-check"

          - namespace: Service
            name: ProxyURLCategoryItem
            label: URL Categories
            kind: ServiceProxyURLCategory
            icon: "mdi:tag-multiple"

          - namespace: Service
            name: ProxyPolicyItem
            label: Proxy Policies
            kind: ServiceProxyPolicy
            icon: "mdi:file-document-outline"

    # ──────────────────────────────────────────────────────────────────────────
    # APPLICATIONS — business applications and virtual clouds
    # ──────────────────────────────────────────────────────────────────────────
    - namespace: App
      name: ApplicationsMenu
      label: Applications
      icon: "mdi:application"
      children:
        data:
          - namespace: App
            name: ApplicationItem
            label: Applications
            kind: AppApplication
            icon: "mdi:application-outline"

          - namespace: App
            name: ComponentItem
            label: Components
            kind: AppComponent
            icon: "mdi:application-brackets"
